<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Pro Web Demo</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

.window {
  position: absolute;
  width: 180px;
  height: 100px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  transition: transform 0.1s;
}

.window.active {
  transform: scale(1.2);
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<div class="window" id="w1" style="top:30%; left:20%">YouTube</div>
<div class="window" id="w2" style="top:50%; left:50%">Browser</div>
<div class="window" id="w3" style="top:70%; left:30%">Settings</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// 📷 Включаем камеру
const video = document.getElementById("camera");

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream);

// ✋ MediaPipe руки
const hands = new Hands({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

// 🪟 окна
const windows = document.querySelectorAll(".window");

let pinch = false;

hands.onResults(results => {
  if (!results.multiHandLandmarks.length) return;

  const landmarks = results.multiHandLandmarks[0];

  // большой палец (4) и указательный (8)
  const dx = landmarks[4].x - landmarks[8].x;
  const dy = landmarks[4].y - landmarks[8].y;

  const distance = Math.sqrt(dx*dx + dy*dy);

  if (distance < 0.05) {
    pinch = true;

    const x = landmarks[8].x * window.innerWidth;
    const y = landmarks[8].y * window.innerHeight;

    windows.forEach(w => {
      const rect = w.getBoundingClientRect();

      if (
        x > rect.left &&
        x < rect.right &&
        y > rect.top &&
        y < rect.bottom
      ) {
        w.style.left = (x - 80) + "px";
        w.style.top = (y - 50) + "px";
        w.classList.add("active");
      } else {
        w.classList.remove("active");
      }
    });

  } else {
    pinch = false;
    windows.forEach(w => w.classList.remove("active"));
  }
});

// 📷 захват кадров
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
