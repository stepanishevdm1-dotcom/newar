<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>META QUEST AR | Окна закреплены в пространстве | Полноценный VR опыт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
            background: #000;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #cameraVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .ar-window {
            position: absolute;
            background: rgba(20, 25, 45, 0.92);
            backdrop-filter: blur(60px);
            border-radius: 32px;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
            min-width: 280px;
            min-height: 240px;
            cursor: pointer;
            will-change: left, top;
        }

        .ar-window.active {
            border-color: #00ffaa;
            box-shadow: 0 0 40px rgba(0, 255, 170, 0.6);
            transform: scale(1.02);
        }

        .window-header {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.2);
            cursor: grab;
        }

        .window-header:active {
            cursor: grabbing;
        }

        .window-title {
            color: white;
            font-weight: 600;
            font-size: 15px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .window-controls {
            display: flex;
            gap: 16px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 18px;
            opacity: 0.8;
            transition: all 0.2s;
        }

        .window-controls span:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .close-btn { color: #ff6b6b; }
        .minimize-btn { color: #ffd93d; }

        .window-content {
            flex: 1;
            padding: 14px;
            overflow: auto;
            min-height: 180px;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.4);
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: #aaffdd;
            padding: 14px;
            border-radius: 20px;
            border: 1px solid rgba(100, 255, 200, 0.3);
            resize: none;
            font-family: monospace;
            font-size: 13px;
        }

        #vrCursor {
            position: fixed;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 200;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 10px #00ffaa);
        }

        .ui-bar {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .ui-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border-radius: 40px;
            padding: 8px 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mode-btn {
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #00aaff;
            box-shadow: 0 0 12px rgba(0, 170, 255, 0.5);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.3s;
        }

        .led.active {
            background: #0f0;
            box-shadow: 0 0 12px #0f0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .action-buttons {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
        }

        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.92);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .status-text {
            position: fixed;
            bottom: 110px;
            left: 30px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 30px;
            color: #aaffdd;
            font-size: 13px;
            z-index: 200;
            pointer-events: none;
            font-weight: 500;
        }

        .calibration-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(30px);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-size: 12px;
            z-index: 200;
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .calibrate-btn {
            background: #00aaff;
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 20px;
        }

        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
            }
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 170, 255, 0.3);
            border-top: 3px solid #00aaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes ripple {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">🔮 Инициализация AR пространства Meta Quest...</div>
    </div>

    <video id="cameraVideo" autoplay playsinline muted></video>
    
    <div class="orientation-warning">
        <div>📱 Поверните телефон горизонтально для AR эффекта</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div class="ar-container" id="arContainer"></div>
    <div id="vrCursor">
        <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="16" stroke="#00ffaa" stroke-width="2.5" fill="rgba(0,255,170,0.2)"/>
            <circle cx="20" cy="20" r="6" fill="#00ffaa" fill-opacity="0.9">
                <animate attributeName="r" values="6;9;6" dur="0.6s" repeatCount="indefinite"/>
            </circle>
        </svg>
    </div>

    <div class="ui-bar">
        <div class="ui-card">🔮 META QUEST AR</div>
        <div class="ui-card">
            <button class="mode-btn active" data-mode="gesture">✋ Жесты</button>
            <button class="mode-btn" data-mode="touch">👆 Тачпад</button>
        </div>
        <div class="ui-card">
            <div class="led" id="handLed"></div>
            <span id="modeText">AR режим: Жесты</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" id="addBrowser">🌐</button>
        <button class="action-btn" id="addVideo">🎬</button>
        <button class="action-btn" id="addNotes">📝</button>
        <button class="action-btn" id="resetView">🔄</button>
    </div>

    <div class="calibration-panel">
        <span>🎯 AR привязка к пространству</span>
        <button class="calibrate-btn" id="calibrateBtn">Калибровать</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⤢</button>
    <div class="status-text" id="statusText">🎯 Двигайте телефон — окна остаются на месте!</div>

    <input type="file" id="videoUpload" accept="video/*" style="display: none">

    <script>
        // ==================== ПОЛНОЦЕННЫЙ AR ЭФФЕКТ ====================
        
        const state = {
            windows: [],
            activeWindowId: null,
            controlMode: 'gesture',
            cursorX: window.innerWidth / 2,
            cursorY: window.innerHeight / 2,
            
            // Данные гироскопа
            orientation: { alpha: 0, beta: 0, gamma: 0 },
            // Калибровка (начальная точка отсчета)
            calibration: { alpha: 0, beta: 0, gamma: 0 },
            isCalibrated: false,
            
            nextId: 1
        };
        
        // ==================== КАМЕРА ====================
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                return true;
            } catch (err) {
                document.getElementById('statusText').innerHTML = '⚠️ Камера недоступна';
                return false;
            }
        }
        
        // ==================== ГИРОСКОП С КАЛИБРОВКОЙ ====================
        function setupGyroscope() {
            // Для iOS нужно разрешение
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const calibrateBtn = document.getElementById('calibrateBtn');
                calibrateBtn.addEventListener('click', () => {
                    DeviceOrientationEvent.requestPermission()
                        .then(response => {
                            if (response === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                calibrate();
                            }
                        })
                        .catch(console.error);
                }, { once: true });
                
                document.body.addEventListener('click', () => {
                    if (!state.gyroRequested) {
                        state.gyroRequested = true;
                        DeviceOrientationEvent.requestPermission()
                            .then(response => {
                                if (response === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                    calibrate();
                                }
                            })
                            .catch(console.error);
                    }
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                setTimeout(() => calibrate(), 1000);
            }
        }
        
        function handleOrientation(e) {
            state.orientation = {
                alpha: e.alpha || 0,
                beta: e.beta || 0,
                gamma: e.gamma || 0
            };
            updateAllWindowsPosition();
        }
        
        function calibrate() {
            state.calibration = { ...state.orientation };
            state.isCalibrated = true;
            
            // Визуальный фидбек
            const flash = document.createElement('div');
            flash.style.cssText = `position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,255,170,0.3); pointer-events:none; z-index:9999; animation:ripple 0.5s ease-out;`;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 500);
            
            document.getElementById('statusText').innerHTML = '✅ Калибровка! Окна закреплены в пространстве';
            setTimeout(() => {
                document.getElementById('statusText').innerHTML = '🎯 Поворачивайте телефон — окна остаются на месте';
            }, 2500);
            
            updateAllWindowsPosition();
        }
        
        // ==================== КЛЮЧЕВАЯ ФУНКЦИЯ: ПРЕОБРАЗОВАНИЕ МИРОВЫХ КООРДИНАТ ====================
        function worldToScreen(worldX, worldY) {
            if (!state.isCalibrated) {
                // До калибровки показываем в центре
                return { x: window.innerWidth / 2 + worldX, y: window.innerHeight / 2 + worldY };
            }
            
            // Вычисляем относительные углы (с учетом калибровки)
            let deltaAlpha = state.orientation.alpha - state.calibration.alpha;
            let deltaBeta = state.orientation.beta - state.calibration.beta;
            let deltaGamma = state.orientation.gamma - state.calibration.gamma;
            
            // Нормализация углов
            if (deltaAlpha > 180) deltaAlpha -= 360;
            if (deltaAlpha < -180) deltaAlpha += 360;
            if (deltaBeta > 90) deltaBeta = 90;
            if (deltaBeta < -90) deltaBeta = -90;
            
            // Чувствительность AR эффекта
            const sensitivity = 3.2;
            
            // Базовый центр экрана
            let screenX = window.innerWidth / 2;
            let screenY = window.innerHeight / 2;
            
            // Мировые координаты окна + поворот телефона
            // Окно "приклеено" к пространству: при повороте телефона оно смещается в противоположную сторону
            screenX += worldX + (deltaAlpha * sensitivity);
            screenY += worldY + (deltaBeta * sensitivity * 1.2);
            
            // Добавляем гамма для горизонтального наклона
            screenX += deltaGamma * 1.8;
            
            return { x: screenX, y: screenY };
        }
        
        // ==================== СОЗДАНИЕ AR ОКНА ====================
        function createARWindow(worldX, worldY, title, content, width = 320, height = 280) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width}px`;
            div.style.height = `${height}px`;
            const windowId = state.nextId;
            div.dataset.id = windowId;
            
            const contentId = `win-${Date.now()}-${windowId}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.getElementById('arContainer').appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.meta.com/experiences/';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.borderRadius = '20px';
                contentDiv.appendChild(iframe);
            } else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.borderRadius = '20px';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            } else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '🔮 META QUEST AR\n\n═══════════════════\n📌 ЭТО ОКНО ЗАКРЕПЛЕНО В ПРОСТРАНСТВЕ!\n\n🔹 Поворачивайте телефон\n🔹 Окно остается на месте\n🔹 Как в настоящих VR очках!\n\n═══════════════════\n✋ Управление:\n• Движение пальца = курсор\n• Pinch/Клик = выбор окна\n\n🎯 Нажмите "Калибровать"\nчтобы зафиксировать начальную точку';
                contentDiv.appendChild(textarea);
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.id !== windowId);
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = {
                id: windowId,
                div,
                worldX, worldY,
                width, height,
                title
            };
            state.windows.push(windowObj);
            state.nextId++;
            
            updateWindowPosition(windowObj);
            
            // Анимация появления
            div.style.opacity = '0';
            div.style.transform = 'scale(0.95)';
            setTimeout(() => {
                div.style.opacity = '1';
                div.style.transform = 'scale(1)';
            }, 50);
            
            return windowObj;
        }
        
        function updateWindowPosition(win) {
            const screenPos = worldToScreen(win.worldX, win.worldY);
            win.div.style.left = `${screenPos.x - win.width/2}px`;
            win.div.style.top = `${screenPos.y - win.height/2}px`;
        }
        
        function updateAllWindowsPosition() {
            state.windows.forEach(win => updateWindowPosition(win));
            requestAnimationFrame(updateAllWindowsPosition);
        }
        
        function selectWindowAtPosition(x, y) {
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindowId) {
                        const prev = state.windows.find(w => w.id === state.activeWindowId);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindowId = win.id;
                    win.div.classList.add('active');
                    document.getElementById('modeText').innerHTML = `✅ ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('modeText').innerHTML = `AR режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                    }, 1500);
                    
                    // Визуальный фидбек выбора
                    const ripple = document.createElement('div');
                    ripple.style.cssText = `position:fixed; left:${x}px; top:${y}px; width:70px; height:70px; border-radius:50%; border:2px solid #0f0; transform:translate(-50%,-50%); pointer-events:none; z-index:1000; animation:ripple 0.3s ease-out;`;
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 300);
                    return;
                }
            }
        }
        
        // ==================== УПРАВЛЕНИЕ ЖЕСТАМИ ====================
        function setupGestures() {
            let touchActive = false;
            let touchX = window.innerWidth / 2;
            let touchY = window.innerHeight / 2;
            
            const cursor = document.getElementById('vrCursor');
            
            function updateCursor(x, y) {
                cursor.style.left = `${x}px`;
                cursor.style.top = `${y}px`;
                state.cursorX = x;
                state.cursorY = y;
            }
            
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    touchActive = true;
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                    updateCursor(touchX, touchY);
                    document.getElementById('handLed').classList.add('active');
                    document.getElementById('statusText').innerHTML = '🎯 Курсор активен | Нажмите для выбора окна';
                    
                    if (e.touches.length >= 2) {
                        selectWindowAtPosition(touchX, touchY);
                    }
                }
            });
            
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                    updateCursor(touchX, touchY);
                }
            });
            
            document.addEventListener('touchend', () => {
                touchActive = false;
                document.getElementById('handLed').classList.remove('active');
                document.getElementById('statusText').innerHTML = '🎯 Поворачивайте телефон — окна закреплены в пространстве';
            });
            
            document.addEventListener('mousemove', (e) => {
                if (state.controlMode === 'gesture') {
                    updateCursor(e.clientX, e.clientY);
                    document.getElementById('handLed').classList.add('active');
                }
            });
            
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'gesture') {
                    selectWindowAtPosition(e.clientX, e.clientY);
                }
            });
        }
        
        // ==================== UI ====================
        function setupUI() {
            document.getElementById('addBrowser').onclick = () => {
                const x = (Math.random() - 0.5) * 600;
                const y = (Math.random() - 0.5) * 450;
                createARWindow(x, y, '🌐 META WORLD', { type: 'browser' }, 380, 340);
            };
            
            document.getElementById('addVideo').onclick = () => {
                const input = document.getElementById('videoUpload');
                input.onchange = (e) => {
                    const x = (Math.random() - 0.5) * 600;
                    const y = (Math.random() - 0.5) * 450;
                    createARWindow(x, y, '🎬 VR Video', { type: 'video', file: e.target.files[0] }, 360, 320);
                };
                input.click();
            };
            
            document.getElementById('addNotes').onclick = () => {
                const x = (Math.random() - 0.5) * 600;
                const y = (Math.random() - 0.5) * 450;
                createARWindow(x, y, '📝 AR Notes', { type: 'notes' }, 340, 300);
            };
            
            document.getElementById('resetView').onclick = () => {
                calibrate();
            };
            
            document.getElementById('calibrateBtn').onclick = () => {
                calibrate();
            };
            
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    state.controlMode = btn.dataset.mode;
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('modeText').innerHTML = `AR режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                });
            });
            
            document.getElementById('fullscreenBtn').onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            };
        }
        
        // ==================== ЗАПУСК С ВИДИМЫМИ ОКНАМИ ====================
        async function init() {
            await setupCamera();
            setupGyroscope();
            setupGestures();
            setupUI();
            updateAllWindowsPosition();
            
            // СОЗДАЕМ ОКНА СРАЗУ ВИДИМЫМИ (НЕ ЗАКРЫТЫМИ)
            setTimeout(() => {
                // Окна расположены вокруг пользователя для полного AR эффекта
                createARWindow(-200, -100, '🌐 META Horizon Worlds', { type: 'browser' }, 380, 340);
                createARWindow(220, -80, '🎬 4K VR Video', { type: 'video' }, 360, 320);
                createARWindow(50, 180, '📝 AR Заметки', { type: 'notes' }, 340, 300);
                createARWindow(-250, 140, '🌐 Explore VR', { type: 'browser' }, 360, 320);
                createARWindow(280, -160, '🎬 Демо трейлер', { type: 'video' }, 350, 310);
                createARWindow(-80, -240, '📝 Быстрые заметки', { type: 'notes' }, 320, 280);
                
                // Скрываем загрузчик
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 500);
                
                document.getElementById('statusText').innerHTML = '✅ AR активирован! Поворачивайте телефон — окна закреплены в пространстве';
            }, 500);
        }
        
        init();
    </script>
</body>
</html>
