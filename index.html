<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BEAT SABER — полный клон</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #000;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .status {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            border-left: 3px solid #0f0;
        }
        .score-board {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
        }
        .score-value {
            color: #ff44cc;
            font-weight: bold;
            font-size: 22px;
            text-shadow: 0 0 5px #ff44cc;
        }
        .combo-value {
            color: #ffaa33;
            font-size: 16px;
        }
        .panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: linear-gradient(135deg, #ff3366, #ff6699);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            margin: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 12px rgba(255,51,102,0.5);
        }
        button:active { transform: scale(0.96); }
        .btn-green { background: linear-gradient(135deg, #33cc66, #66ff99); box-shadow: 0 0 12px rgba(51,204,102,0.5); }
        .btn-blue { background: linear-gradient(135deg, #3399ff, #66ccff); box-shadow: 0 0 12px rgba(51,153,255,0.5); }
        .mode-selector {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            z-index: 300;
        }
        .gyro-value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffaa33, #ffdd88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .device-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            text-align: left;
        }
        .device-item {
            background: #1a1a2e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        .device-item:hover { background: #2a2a4e; }
        .instruction {
            font-size: 11px;
            color: #aaa;
            margin-top: 12px;
        }
        .red-saber-panel, .blue-saber-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 30px;
            padding: 10px;
            font-size: 10px;
            text-align: center;
            z-index: 150;
        }
        .red-saber-panel { border-left: 4px solid #ff3366; bottom: 80px; }
        .blue-saber-panel { border-left: 4px solid #3399ff; bottom: 40px; }
        @media (max-width: 600px) {
            .gyro-value { font-size: 36px; }
            button { padding: 10px 18px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">⚡ BEAT SABER</div>
        <div class="score-board">
            <div class="score-value" id="score">0</div>
            <div class="combo-value" id="combo">COMBO x1</div>
        </div>
    </div>

    <div id="modeSelector" class="mode-selector">
        <button id="screenBtn" class="btn-green">🕶️ ЭКРАН (VR игра)</button>
        <button id="controllerBtn" class="btn-blue">🎮 ПУЛЬТ (гироскоп)</button>
    </div>

    <!-- Панель экрана -->
    <div id="screenPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🕶️ BEAT SABER VR</div>
        <button id="startServerBtn" class="btn-green">🔗 ПОДКЛЮЧИТЬ ПУЛЬТ</button>
        <div id="screenStatus">⏳ Ожидание пульта...</div>
        <div class="instruction">🔹 На пульте нажмите "ПУЛЬТ" → "ПОИСК" и выберите этот телефон</div>
    </div>

    <!-- Панель пульта -->
    <div id="controllerPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🎮 ПУЛЬТ УПРАВЛЕНИЯ</div>
        <button id="scanBtn" class="btn-blue">🔍 ПОИСК BLUETOOTH</button>
        <div id="deviceList" class="device-list" style="display: none;"></div>
        <div id="controllerStatus"></div>
        <div class="gyro-value" id="gyroAngle">0°</div>
        <div class="instruction">📱 НАКЛОНЯЙТЕ ТЕЛЕФОН → МЕЧ ДВИГАЕТСЯ</div>
    </div>

    <div id="redPanel" class="red-saber-panel" style="display: none;">🔴 КРАСНЫЙ МЕЧ — НАКЛОНЯЙТЕ ПУЛЬТ</div>
    <div id="bluePanel" class="blue-saber-panel" style="display: none;">🔵 СИНИЙ МЕЧ — БУДЕТ СО ВТОРЫМ ПУЛЬТОМ</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let mode = null;
        let score = 0;
        let combo = 1;
        let maxCombo = 0;
        let cubes = [];
        let redSaberAngle = 0;
        let blueSaberAngle = 0;
        
        // Bluetooth
        let bluetoothCharacteristic = null;
        let isConnected = false;
        
        // DOM
        const statusDiv = document.getElementById('status');
        const scoreDiv = document.getElementById('score');
        const comboDiv = document.getElementById('combo');
        const modeSelector = document.getElementById('modeSelector');
        const screenPanel = document.getElementById('screenPanel');
        const controllerPanel = document.getElementById('controllerPanel');
        const screenStatus = document.getElementById('screenStatus');
        const controllerStatus = document.getElementById('controllerStatus');
        const gyroAngleSpan = document.getElementById('gyroAngle');
        const scanBtn = document.getElementById('scanBtn');
        const startServerBtn = document.getElementById('startServerBtn');
        const deviceListDiv = document.getElementById('deviceList');
        const redPanel = document.getElementById('redPanel');
        const bluePanel = document.getElementById('bluePanel');
        
        // ========== 3D СЦЕНА (FULL BEAT SABER) ==========
        let scene, camera, renderer, clock;
        let redSaber, blueSaber;
        let leftWall, rightWall;
        let particles = [];
        
        function initGameScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);
            
            // Камера как в Beat Saber
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 5.5);
            camera.lookAt(0, 1.5, -2);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Освещение как в Beat Saber
            const ambient = new THREE.AmbientLight(0x222233);
            scene.add(ambient);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(1, 3, 2);
            mainLight.castShadow = true;
            scene.add(mainLight);
            
            const fillLight = new THREE.PointLight(0x6644aa, 0.5);
            fillLight.position.set(-1, 2, 3);
            scene.add(fillLight);
            
            const backLight = new THREE.PointLight(0xff44aa, 0.4);
            backLight.position.set(0, 2, -4);
            scene.add(backLight);
            
            // Пол с сеткой (арена)
            const grid = new THREE.GridHelper(12, 12, 0xff33cc, 0x33ff66);
            grid.position.y = -1.2;
            grid.material.transparent = true;
            grid.material.opacity = 0.5;
            scene.add(grid);
            
            // Стены (как в Beat Saber)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, emissive: 0x111122, transparent: true, opacity: 0.6 });
            leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 8), wallMat);
            leftWall.position.set(-3.5, 1, -2);
            scene.add(leftWall);
            
            rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 8), wallMat);
            rightWall.position.set(3.5, 1, -2);
            scene.add(rightWall);
            
            // Неоновые кольца по бокам
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff1166, emissiveIntensity: 0.5 });
            for (let i = -3; i <= 3; i+=2) {
                const ring = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.05, 16, 32), ringMat);
                ring.position.set(i, 0.5, -3);
                ring.rotation.x = Math.PI / 2;
                scene.add(ring);
            }
            
            // КРАСНЫЙ МЕЧ (правый)
            const redGroup = new THREE.Group();
            const redBlade = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.1, 1.4, 12),
                new THREE.MeshStandardMaterial({ color: 0xff2266, emissive: 0xff0044, emissiveIntensity: 1.2 })
            );
            redBlade.position.y = 0.7;
            redGroup.add(redBlade);
            
            const redCore = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.06, 1.35, 8),
                new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0xff4400, emissiveIntensity: 1.5 })
            );
            redCore.position.y = 0.7;
            redGroup.add(redCore);
            
            const redHandle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.12, 0.4, 8),
                new THREE.MeshStandardMaterial({ color: 0xcc8866, metalness: 0.7 })
            );
            redHandle.position.y = -0.15;
            redGroup.add(redHandle);
            
            redGroup.position.set(0.6, 0.6, 3.2);
            scene.add(redGroup);
            redSaber = redGroup;
            
            // СИНИЙ МЕЧ (левый)
            const blueGroup = new THREE.Group();
            const blueBlade = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.1, 1.4, 12),
                new THREE.MeshStandardMaterial({ color: 0x3399ff, emissive: 0x2266ff, emissiveIntensity: 1.2 })
            );
            blueBlade.position.y = 0.7;
            blueGroup.add(blueBlade);
            
            const blueCore = new THREE.Mesh(
                new THREE.CylinderGeometry(0.03, 0.06, 1.35, 8),
                new THREE.MeshStandardMaterial({ color: 0xaaccff, emissive: 0x4488ff, emissiveIntensity: 1.2 })
            );
            blueCore.position.y = 0.7;
            blueGroup.add(blueCore);
            
            const blueHandle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.12, 0.4, 8),
                new THREE.MeshStandardMaterial({ color: 0x88aacc, metalness: 0.7 })
            );
            blueHandle.position.y = -0.15;
            blueGroup.add(blueHandle);
            
            blueGroup.position.set(-0.6, 0.6, 3.2);
            scene.add(blueGroup);
            blueSaber = blueGroup;
            
            // Звёздное поле
            const stars = new THREE.Points(
                new THREE.BufferGeometry(),
                new THREE.PointsMaterial({ color: 0xffffff, size: 0.08 })
            );
            const starPos = [];
            for (let i = 0; i < 2000; i++) {
                starPos.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 80 - 40);
            }
            stars.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
            scene.add(stars);
            
            clock = new THREE.Clock();
            
            // Генерация кубов (как в Beat Saber — летят навстречу)
            setInterval(() => {
                if (mode === 'screen') spawnCube();
            }, 550);
            
            // Анимация
            function animate() {
                if (mode !== 'screen') return;
                const delta = Math.min(clock.getDelta(), 0.033);
                updateCubes(delta);
                updateSabers();
                updateParticles(delta);
                
                // Вращаем звёзды
                stars.rotation.y += 0.001;
                stars.rotation.x += 0.0005;
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function spawnCube() {
            // Цвет куба: красный (правый) или синий (левый)
            const isRed = Math.random() > 0.5;
            const color = isRed ? 0xff3366 : 0x3399ff;
            const emissive = isRed ? 0x441111 : 0x112244;
            
            const size = 0.55 + Math.random() * 0.2;
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: color, emissive: emissive, emissiveIntensity: 0.4, metalness: 0.3 })
            );
            
            // Позиция: X в зависимости от цвета, Y случайный, Z далеко
            const xPos = isRed ? (1.5 + Math.random() * 1.5) : (-1.5 - Math.random() * 1.5);
            const yPos = 0.5 + Math.random() * 2.5;
            cube.position.set(xPos, yPos, -8);
            cube.userData = { 
                speed: 4.5 + Math.random() * 2, 
                hit: false, 
                color: isRed ? 'red' : 'blue',
                direction: Math.random() > 0.5 ? 'up' : 'down'
            };
            cube.castShadow = true;
            scene.add(cube);
            cubes.push(cube);
        }
        
        function updateCubes(delta) {
            for (let i = cubes.length-1; i >= 0; i--) {
                const cube = cubes[i];
                cube.position.z += cube.userData.speed * delta;
                cube.rotation.x += 0.05;
                cube.rotation.y += 0.06;
                cube.rotation.z += 0.04;
                
                if (!cube.userData.hit) {
                    let hit = false;
                    let hitAngle = 0;
                    
                    // Проверка попадания красным мечом (правый куб)
                    if (cube.userData.color === 'red') {
                        hitAngle = redSaberAngle;
                        const dx = Math.abs(cube.position.x - 0.6);
                        const dy = Math.abs(cube.position.y - 1);
                        const angleToCube = Math.atan2(cube.position.x - 0.6, 2) * 57.3;
                        if (Math.abs(hitAngle - angleToCube) < 30 && dy < 1.2 && cube.position.z > -2 && cube.position.z < 3) {
                            hit = true;
                        }
                    }
                    
                    // Проверка попадания синим мечом (левый куб)
                    if (cube.userData.color === 'blue') {
                        hitAngle = blueSaberAngle;
                        const dx = Math.abs(cube.position.x + 0.6);
                        const dy = Math.abs(cube.position.y - 1);
                        const angleToCube = Math.atan2(cube.position.x + 0.6, 2) * 57.3;
                        if (Math.abs(hitAngle - angleToCube) < 30 && dy < 1.2 && cube.position.z > -2 && cube.position.z < 3) {
                            hit = true;
                        }
                    }
                    
                    if (hit) {
                        cube.userData.hit = true;
                        score += 10 * combo;
                        combo++;
                        if (combo > maxCombo) maxCombo = combo;
                        scoreDiv.innerHTML = score;
                        comboDiv.innerHTML = `COMBO x${combo}`;
                        statusDiv.innerHTML = `⚡ SLICE! x${combo}`;
                        setTimeout(() => statusDiv.innerHTML = 'BEAT SABER', 300);
                        createSliceEffect(cube.position, cube.userData.color);
                        scene.remove(cube);
                        cubes.splice(i,1);
                        continue;
                    }
                }
                
                // Пропуск куба = сброс комбо
                if (cube.position.z > 4) {
                    scene.remove(cube);
                    cubes.splice(i,1);
                    combo = 1;
                    comboDiv.innerHTML = `COMBO x1`;
                }
            }
        }
        
        function createSliceEffect(position, color) {
            const particleCount = 40;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colorsArr = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.8;
                positions[i*3+1] = (Math.random() - 0.5) * 0.8;
                positions[i*3+2] = (Math.random() - 0.5) * 0.8;
                const col = color === 'red' ? [1, 0.2, 0.4] : [0.2, 0.4, 1];
                colorsArr[i*3] = col[0];
                colorsArr[i*3+1] = col[1];
                colorsArr[i*3+2] = col[2];
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorsArr, 3));
            const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 0.08, vertexColors: true }));
            particles.position.copy(position);
            scene.add(particles);
            particles.push({ mesh: particles, life: 0.3 });
            
            setTimeout(() => scene.remove(particles), 300);
        }
        
        function updateParticles(delta) {
            // Просто очистка старых частиц
        }
        
        function updateSabers() {
            if (redSaber) {
                redSaber.rotation.z = -redSaberAngle * Math.PI / 180 * 0.9;
                redSaber.rotation.x = Math.sin(Date.now() * 0.01) * 0.05;
            }
            if (blueSaber) {
                blueSaber.rotation.z = -blueSaberAngle * Math.PI / 180 * 0.9;
                blueSaber.rotation.x = Math.sin(Date.now() * 0.01 + 2) * 0.05;
            }
        }
        
        // ========== BLUETOOTH ДЛЯ ЭКРАНА ==========
        async function startBluetoothServer() {
            screenStatus.innerHTML = '🔍 Поиск пульта...';
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Saber' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                
                screenStatus.innerHTML = `🔗 Подключение...`;
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;
                    if (value) {
                        const angleByte = value.getUint8(0);
                        const angle = (angleByte / 180) * 100 - 50;
                        redSaberAngle = Math.max(-45, Math.min(45, angle));
                        statusDiv.innerHTML = `🔴 Луч: ${Math.round(redSaberAngle)}°`;
                    }
                });
                
                isConnected = true;
                screenStatus.innerHTML = '✅ ПУЛЬТ ПОДКЛЮЧЁН! Рубите кубы!';
                redPanel.style.display = 'block';
                bluePanel.style.display = 'block';
            } catch (error) {
                screenStatus.innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }
        
        // ========== BLUETOOTH ДЛЯ ПУЛЬТА ==========
        async function startBluetoothController() {
            controllerStatus.innerHTML = '🔍 Поиск экрана...';
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Saber' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                
                controllerStatus.innerHTML = `🔗 Подключение...`;
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                isConnected = true;
                controllerStatus.innerHTML = '✅ ПОДКЛЮЧЕНО! Наклоняйте телефон';
                
                // Запускаем гироскоп
                startGyroForController(characteristic);
            } catch (error) {
                controllerStatus.innerHTML = `❌ Ошибка: ${error.message}`;
            }
        }
        
        function startGyroForController(characteristic) {
            const sendAngle = (angle) => {
                if (characteristic && isConnected) {
                    const byteValue = Math.floor(((angle + 50) / 100) * 180);
                    characteristic.writeValue(new Uint8Array([byteValue])).catch(e => {});
                }
            };
            
            if (typeof DeviceOrientationEvent !== 'undefined') {
                const handleGyro = (e) => {
                    if (!isConnected) return;
                    const gamma = e.gamma || 0;
                    const angle = Math.max(-45, Math.min(45, gamma));
                    gyroAngleSpan.innerHTML = `${Math.round(angle)}°`;
                    sendAngle(angle);
                };
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    controllerStatus.innerHTML = '🎮 Нажмите для разрешения гироскопа';
                    const requestGyro = () => {
                        DeviceOrientationEvent.requestPermission().then(() => {
                            window.addEventListener('deviceorientation', handleGyro);
                            controllerStatus.innerHTML = '✅ ГИРОСКОП АКТИВЕН! Наклоняйте телефон';
                        }).catch(() => {
                            controllerStatus.innerHTML = '❌ Нет доступа к гироскопу';
                        });
                        document.removeEventListener('click', requestGyro);
                    };
                    document.addEventListener('click', requestGyro);
                } else {
                    window.addEventListener('deviceorientation', handleGyro);
                    controllerStatus.innerHTML = '✅ ГИРОСКОП АКТИВЕН! Наклоняйте телефон';
                }
            } else {
                controllerStatus.innerHTML = '❌ Гироскоп не поддерживается';
            }
        }
        
        // ========== ВЫБОР РЕЖИМА ==========
        document.getElementById('screenBtn').onclick = () => {
            mode = 'screen';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'block';
            controllerPanel.style.display = 'none';
            initGameScene();
            statusDiv.innerHTML = '🕶️ BEAT SABER MODE';
        };
        
        document.getElementById('controllerBtn').onclick = () => {
            mode = 'controller';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'none';
            controllerPanel.style.display = 'block';
            statusDiv.innerHTML = '🎮 ПУЛЬТ АКТИВЕН';
            
            scanBtn.onclick = () => {
                startBluetoothController();
            };
        };
        
        startServerBtn.onclick = () => {
            startBluetoothServer();
        };
