<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Игра с управлением от PS4 | Космический сборщик</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
        }
        #controls-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            font-family: monospace;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        #vr-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: #ff6600;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            font-family: inherit;
        }
        #vr-button:active {
            transform: scale(0.95);
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; top: 10px; left: 10px; }
            #controls-status { font-size: 9px; }
            #vr-button { padding: 12px 20px; font-size: 16px; bottom: 20px; right: 20px; }
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #ccc;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        🎮 VR Игра | Собирай кристаллы | Джойстик PS4 подключи по Bluetooth
    </div>
    <div id="controls-status">
        🔌 Геймпад: не найден...
    </div>
    <button id="vr-button">🔘 Войти в VR</button>
    <div class="instruction">
        Левый стик: движение | Правый стик: поворот | Кнопка X (Квадрат) или A: рывок
    </div>

    <!-- Подключаем Three.js и дополнительные библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- Инициализация сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // Туман для глубины

        // Камера: будет двигаться и вращаться от геймпада
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);
        camera.rotation.order = 'YXZ'; // чтобы корректно работал поворот

        // Рендерер с поддержкой WebXR
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true; // Включаем VR режим
        document.body.appendChild(renderer.domElement);
        
        // Добавляем кнопку входа в VR (Three.js стандартная)
        document.getElementById('vr-button').onclick = () => {
            renderer.xr.isPresenting ? renderer.xr.exitVR() : renderer.xr.requestSession();
        };
        // Стилизуем кнопку (скрываем старую, если она появилась, но мы используем свою)
        // Но VRButton создает свою, поэтому лучше отключить её авто-стили, но мы оставим свою кнопку
        // Просто добавим поддержку вызова
        
        // Освещение
        // Амбиентный свет
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // Основной направленный свет
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);
        // Динамический свет сзади
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // Добавим звездное небо (частицы)
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 500;
            starPositions[i*3+2] = (Math.random() - 0.5) * 500 - 200;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Платформа/пол (прозрачная сетка для ориентира)
        const gridHelper = new THREE.GridHelper(100, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        // --- Игровые объекты ---
        // Коллекционируемые кристаллы
        const crystals = [];
        const crystalColors = [0xff44aa, 0x44ffaa, 0xffaa44, 0xaa44ff];
        
        function createCrystal(x, z, colorIndex) {
            const geometry = new THREE.ConeGeometry(0.25, 0.6, 8);
            const material = new THREE.MeshStandardMaterial({ color: crystalColors[colorIndex % crystalColors.length], emissive: 0x331133, emissiveIntensity: 0.4 });
            const crystal = new THREE.Mesh(geometry, material);
            crystal.position.set(x, 0.2, z);
            crystal.userData = { collected: false, floatOffset: Math.random() * Math.PI * 2 };
            scene.add(crystal);
            crystals.push(crystal);
            return crystal;
        }
        
        // Создаем кристаллы вокруг
        const positions = [
            [-3, -2], [2, -3], [4, 1], [-1, 4], [-4, 3], [0, 5], [5, 0], [-5, -1], [3, -4], [-3, 5], [1, -4], [4, -2], [-2, -4], [0, -3]
        ];
        positions.forEach((pos, idx) => createCrystal(pos[0], pos[1], idx));
        
        // Добавим врагов (простые сферы, которых нужно избегать или они отнимают очки)
        const enemies = [];
        const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0x330000 });
        const enemyPositions = [[-2, -1], [3, 2], [-3, -2], [2, 3], [0, -2], [4, -1]];
        enemyPositions.forEach(pos => {
            const enemy = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), enemyMat);
            enemy.position.set(pos[0], 0.3, pos[1]);
            scene.add(enemy);
            enemies.push(enemy);
        });
        
        // Счет
        let score = 0;
        const scoreDiv = document.createElement('div');
        scoreDiv.style.position = 'absolute';
        scoreDiv.style.top = '20px';
        scoreDiv.style.right = '20px';
        scoreDiv.style.backgroundColor = 'rgba(0,0,0,0.6)';
        scoreDiv.style.color = 'gold';
        scoreDiv.style.padding = '8px 16px';
        scoreDiv.style.borderRadius = '20px';
        scoreDiv.style.fontFamily = 'monospace';
        scoreDiv.style.fontSize = '20px';
        scoreDiv.style.fontWeight = 'bold';
        scoreDiv.style.zIndex = '10';
        scoreDiv.innerText = `✨ ${score}`;
        document.body.appendChild(scoreDiv);
        
        // --- Управление с геймпада PS4 ---
        let gamepadConnected = false;
        let leftStickX = 0, leftStickY = 0;
        let rightStickX = 0, rightStickY = 0;
        let boostPressed = false;
        
        // Скорость движения
        let moveSpeed = 3.5;
        let rotationSpeed = 1.8;
        
        // Обновление статуса геймпада
        const statusEl = document.getElementById('controls-status');
        
        function updateGamepadStatus() {
            const gamepads = navigator.getGamepads();
            let activePad = null;
            for (let i = 0; i < gamepads.length; i++) {
                const pad = gamepads[i];
                if (pad && (pad.id.includes('PS4') || pad.id.includes('DualShock') || pad.mapping === 'standard')) {
                    activePad = pad;
                    break;
                }
            }
            
            if (activePad) {
                gamepadConnected = true;
                statusEl.innerHTML = `🎮 Геймпад: PS4 подключен | Счет: ${score}`;
                statusEl.style.color = '#aaffaa';
                
                // Чтение осей: стандартный маппинг для DualShock 4 в Chrome/Android
                // Оси: 0 - левый стик X, 1 - левый стик Y, 2 - правый стик X, 3 - правый стик Y
                const axes = activePad.axes;
                if (axes.length >= 4) {
                    leftStickX = axes[0];
                    leftStickY = axes[1];
                    rightStickX = axes[2];
                    rightStickY = axes[3];
                }
                // Кнопки: индекс 0 - X (квадрат) или A на Xbox стиле, но для PS4 X это обычно кнопка 0 или 1? Проверим: 
                // В стандартном маппинге: 0 - X (Square?), но для буста используем кнопку 0 (крестик) или 1 (круг). Для простоты - кнопка 0
                if (activePad.buttons.length > 0) {
                    boostPressed = activePad.buttons[0]?.pressed || activePad.buttons[2]?.pressed || false;
                }
                
                // Дополнительно: если хотим рывок при нажатии R2? Можно расширить
                if (activePad.buttons[7]?.pressed) { // R2 обычно индекс 7
                    moveSpeed = 7.0;
                } else {
                    moveSpeed = 3.5;
                }
            } else {
                gamepadConnected = false;
                statusEl.innerHTML = `⚠️ Геймпад PS4 не найден. Подключите по Bluetooth и нажмите любую кнопку.`;
                statusEl.style.color = '#ffaa66';
                leftStickX = leftStickY = rightStickX = rightStickY = 0;
            }
        }
        
        // --- Логика движения и поворота камеры ---
        // Вектор движения в плоскости XZ
        function updateMovement(deltaTime) {
            if (!deltaTime || deltaTime > 0.033) deltaTime = 0.016;
            
            // Движение относительно направления камеры (вид от первого лица)
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            right.normalize();
            
            let move = new THREE.Vector3(0, 0, 0);
            // Левый стик: вперед/назад (Y), влево/вправо (X)
            // Инвертируем Y, так как в геймпаде вверх = -1
            const stickForward = -leftStickY;
            const stickRight = leftStickX;
            
            move.x = stickRight * moveSpeed * deltaTime;
            move.z = stickForward * moveSpeed * deltaTime;
            
            // Преобразуем в мировые координаты
            const worldMove = new THREE.Vector3(0, 0, 0);
            worldMove.addScaledVector(right, move.x);
            worldMove.addScaledVector(forward, move.z);
            
            // Обновляем позицию камеры
            let newPos = camera.position.clone().add(worldMove);
            // Ограничиваем перемещение в зоне от -12 до 12 по X и Z
            newPos.x = Math.max(-12, Math.min(12, newPos.x));
            newPos.z = Math.max(-12, Math.min(12, newPos.z));
            camera.position.copy(newPos);
            
            // Поворот камеры правым стиком (Yaw и Pitch)
            // Yaw (поворот влево-вправо) - правый стик X
            // Pitch (наклон вверх-вниз) - правый стик Y, с ограничением
            const yawDelta = -rightStickX * rotationSpeed * deltaTime;
            const pitchDelta = -rightStickY * rotationSpeed * deltaTime;
            
            camera.rotation.y += yawDelta;
            // Ограничиваем наклон камеры, чтобы не переворачиваться
            let newPitch = camera.rotation.x + pitchDelta;
            newPitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, newPitch));
            camera.rotation.x = newPitch;
        }
        
        // --- Сбор кристаллов и столкновения ---
        function checkCollectibles() {
            const camPos = camera.position;
            for (let i = 0; i < crystals.length; i++) {
                const c = crystals[i];
                if (c.userData.collected) continue;
                const dist = camPos.distanceTo(c.position);
                if (dist < 1.2) {
                    c.userData.collected = true;
                    scene.remove(c);
                    score++;
                    scoreDiv.innerText = `✨ ${score}`;
                    // Визуальный фидбек: частицы
                    createPickupEffect(c.position);
                }
            }
        }
        
        function checkEnemies() {
            const camPos = camera.position;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                const dist = camPos.distanceTo(e.position);
                if (dist < 0.9) {
                    // Штраф: отнимаем одно очко, отбрасываем назад
                    score = Math.max(0, score - 1);
                    scoreDiv.innerText = `✨ ${score}`;
                    // Отброс назад
                    const pushDir = camPos.clone().sub(e.position).normalize();
                    camera.position.add(pushDir.multiplyScalar(1.5));
                    // Визуальный эффект
                    createHitEffect(e.position);
                    // Небольшая задержка, чтобы избежать множественных штрафов за раз
                    e.userData.lastHit = Date.now();
                }
            }
        }
        
        // Простые эффекты частиц
        function createPickupEffect(pos) {
            const geom = new THREE.SphereGeometry(0.1, 4, 4);
            const material = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4400 });
            for (let i = 0; i < 6; i++) {
                const particle = new THREE.Mesh(geom, material);
                particle.position.copy(pos);
                scene.add(particle);
                const vel = new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 1.5, (Math.random() - 0.5) * 2);
                let life = 0.5;
                const interval = setInterval(() => {
                    if (!particle.parent) return clearInterval(interval);
                    particle.position.add(vel.clone().multiplyScalar(0.05));
                    life -= 0.03;
                    if (life <= 0) {
                        scene.remove(particle);
                        clearInterval(interval);
                    }
                }, 30);
            }
        }
        
        function createHitEffect(pos) {
            const ringGeom = new THREE.RingGeometry(0.2, 0.6, 8);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide, transparent: true });
            const ring = new THREE.Mesh(ringGeom, ringMat);
            ring.position.copy(pos);
            scene.add(ring);
            let scale = 1;
            const animate = setInterval(() => {
                scale += 0.2;
                ring.scale.set(scale, scale, 1);
                ring.material.opacity -= 0.1;
                if (ring.material.opacity <= 0) {
                    scene.remove(ring);
                    clearInterval(animate);
                }
            }, 50);
        }
        
        // Анимация парящих кристаллов
        let timeAcc = 0;
        function animateCrystals(delta) {
            timeAcc += delta;
            crystals.forEach(c => {
                if (!c.userData.collected) {
                    c.position.y = 0.2 + Math.sin(timeAcc * 3 + c.userData.floatOffset) * 0.15;
                    c.rotation.y += 0.02;
                    c.rotation.x = Math.sin(timeAcc) * 0.2;
                }
            });
        }
        
        // --- VR сессия и основной цикл ---
        renderer.xr.addEventListener('sessionstart', () => {
            console.log('VR session started');
            // В VR режиме управление остается таким же
        });
        
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Обновляем статус геймпада и читаем оси
            updateGamepadStatus();
            
            if (gamepadConnected) {
                updateMovement(delta);
            }
            
            // Логика игры
            checkCollectibles();
            checkEnemies();
            animateCrystals(delta);
            
            // Вращаем звезды слегка для эффекта
            stars.rotation.y += 0.0005;
            
            // Обновляем статус счет на геймпад виджете
            if (gamepadConnected) {
                statusEl.innerHTML = `🎮 PS4 | Счет: ${score} | Лев.стик: ${leftStickX.toFixed(2)},${leftStickY.toFixed(2)}`;
            }
            
            // Рендерим сцену через WebXR
            renderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Запускаем цикл
        animate();
        
        // События для определения подключения геймпада (для активации Gamepad API)
        window.addEventListener("gamepadconnected", (e) => {
            console.log("Gamepad connected:", e.gamepad);
            statusEl.innerHTML = `✅ PS4 подключен! Играйте стиками.`;
            statusEl.style.color = '#aaffaa';
        });
        window.addEventListener("gamepaddisconnected", () => {
            statusEl.innerHTML = `❌ Геймпад отключен. Подключите снова.`;
            statusEl.style.color = '#ff8888';
            gamepadConnected = false;
        });
        
        // Обработка изменения размера окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Небольшая инструкция в консоль
        console.log('Игра запущена. Подключите DualShock 4 через Bluetooth. Для входа в VR нажмите кнопку на экране.');
        
        // Добавим небольшой индикатор центра для удобства прицеливания в VR (необязательно)
        const centerDot = document.createElement('div');
        centerDot.style.position = 'absolute';
        centerDot.style.width = '4px';
        centerDot.style.height = '4px';
        centerDot.style.backgroundColor = 'white';
        centerDot.style.borderRadius = '50%';
        centerDot.style.top = '50%';
        centerDot.style.left = '50%';
        centerDot.style.transform = 'translate(-50%, -50%)';
        centerDot.style.zIndex = '100';
        centerDot.style.pointerEvents = 'none';
        centerDot.style.opacity = '0.7';
        document.body.appendChild(centerDot);
        
        // Скрываем точку в VR? Она останется, но не мешает.
    </script>
</body>
</html>
