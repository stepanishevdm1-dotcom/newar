<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision Pro AR | Жесты руками + AR пространство</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
            background: #000;
        }

        /* Загрузочный экран */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0,170,255,0.3);
            border-top: 3px solid #00aaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00aaff;
            transition: width 0.3s;
        }

        /* Главный UI */
        .vision-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 200;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            pointer-events: auto;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .vision-card {
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 8px 16px;
            border: 0.5px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-selector {
            display: flex;
            gap: 6px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 4px;
        }

        .mode-btn {
            padding: 5px 14px;
            border-radius: 30px;
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: rgba(0,170,255,0.6);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.3s;
        }

        .led.active {
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* AR Окна */
        .ar-window {
            position: absolute;
            background: rgba(20,20,35,0.9);
            backdrop-filter: blur(50px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .ar-window.active {
            border-color: #00aaff;
            box-shadow: 0 0 30px rgba(0,170,255,0.4);
            transform: scale(1.02);
        }

        .window-header {
            padding: 12px 16px;
            background: rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .window-title {
            color: white;
            font-weight: 600;
            font-size: 13px;
        }

        .window-controls {
            display: flex;
            gap: 12px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .window-controls span:hover {
            opacity: 1;
        }

        .close-btn { color: #ff6b6b; }
        .minimize-btn { color: #ffd93d; }

        .window-content {
            flex: 1;
            padding: 10px;
            overflow: auto;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            background: rgba(0,0,0,0.3);
        }

        video {
            object-fit: contain;
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 12px;
            border-radius: 16px;
            border: 0.5px solid rgba(0,255,0,0.3);
            resize: none;
            font-family: monospace;
            font-size: 12px;
        }

        /* Canvas для скелета руки */
        #hand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        /* Кнопки */
        .action-buttons {
            position: fixed;
            bottom: 25px;
            left: 25px;
            display: flex;
            gap: 10px;
            z-index: 200;
            pointer-events: auto;
        }

        .action-btn, .fullscreen-btn {
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: rgba(30,30,40,0.85);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            left: auto;
        }

        .action-btn:active, .fullscreen-btn:active {
            transform: scale(0.92);
        }

        .hand-status {
            position: fixed;
            bottom: 100px;
            left: 25px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 6px 14px;
            border-radius: 20px;
            color: #0f0;
            font-size: 11px;
            font-family: monospace;
            z-index: 200;
            pointer-events: none;
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 20px;
            text-align: center;
        }

        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
            }
        }

        .camera-control {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            z-index: 200;
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        .zoom-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-text">Инициализация AR пространства...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div class="orientation-warning">
        <div>📱 Поверните устройство горизонтально</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div class="vision-ui">
        <div class="top-bar">
            <div class="vision-card">
                <span>👓 VISION PRO AR</span>
            </div>
            <div class="mode-selector" id="mode-selector">
                <button class="mode-btn active" data-mode="gesture">✋ Жесты</button>
                <button class="mode-btn" data-mode="touch">👆 Тачпад</button>
            </div>
            <div class="vision-card status-indicator">
                <div class="led" id="hand-led"></div>
                <span id="status-text">Режим: Жесты</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="add-browser">🌐</button>
            <button class="action-btn" id="add-video">🎬</button>
            <button class="action-btn" id="add-notes">📝</button>
            <button class="action-btn" id="reset-view">🔄</button>
        </div>

        <div class="camera-control">
            <span>📷 Зум:</span>
            <button class="zoom-btn" id="zoom-out">− 0.6x</button>
            <button class="zoom-btn" id="zoom-in">+ 1x</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreen-btn">⤢</button>
    <div class="hand-status" id="hand-status">🤚 Ожидание руки...</div>
    <canvas id="hand-canvas"></canvas>
    <input type="file" id="video-upload" accept="video/*" style="display: none">

    <script>
        // ==================== ПРОГРЕСС ====================
        let progress = 0;
        const progressFill = document.getElementById('progress-fill');
        const loaderText = document.getElementById('loader-text');
        const texts = [
            'Запуск AR движка...',
            'Активация камеры...',
            'Настройка отслеживания жестов...',
            'Закрепление окон в пространстве...',
            'Готово!'
        ];
        
        const progressInterval = setInterval(() => {
            progress += 12;
            progressFill.style.width = Math.min(100, progress) + '%';
            const idx = Math.min(Math.floor(progress / 20), texts.length - 1);
            loaderText.textContent = texts[idx];
            
            if (progress >= 100) {
                clearInterval(progressInterval);
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 400);
            }
        }, 180);

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            controlMode: 'gesture',
            windows: [],
            activeWindow: null,
            cursorPosition: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
            cameraPosition: { x: 0, y: 0 },
            cameraZoom: 0.6,
            videoElement: null,
            handTracked: false,
            isPinching: false,
            nextWindowId: 1
        };

        // ==================== КАМЕРА С ЗУМОМ ====================
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.zIndex = '-1';
                video.style.transition = 'transform 0.3s ease';
                document.body.insertBefore(video, document.body.firstChild);
                
                state.videoElement = video;
                
                // Применяем начальный зум 0.6x
                setTimeout(() => {
                    updateCameraZoom(0.6);
                }, 100);
                
                return video;
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('hand-status').innerHTML = '⚠️ Камера недоступна';
                document.getElementById('hand-led').style.background = '#ff4444';
                return null;
            }
        }
        
        function updateCameraZoom(zoom) {
            state.cameraZoom = zoom;
            if (state.videoElement) {
                // 0.6x = увеличение поля зрения (уменьшение масштаба)
                const scale = 1 / zoom;
                state.videoElement.style.transform = `scale(${scale})`;
                state.videoElement.style.transformOrigin = 'center center';
            }
        }

        // ==================== ЖЕСТЫ РУК (СИМУЛЯЦИЯ ДЛЯ ТЕЛЕФОНА) ====================
        function setupHandTracking() {
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            let handX = window.innerWidth / 2;
            let handY = window.innerHeight / 2;
            let handVisible = false;
            
            // Отслеживание движения пальца на экране (для телефона)
            document.addEventListener('touchmove', (e) => {
                if (e.touches[0]) {
                    handX = e.touches[0].clientX;
                    handY = e.touches[0].clientY;
                    handVisible = true;
                    state.cursorPosition = { x: handX, y: handY };
                    document.getElementById('hand-led').classList.add('active');
                    document.getElementById('hand-status').innerHTML = '✋ Палец отслеживается | Сведите пальцы для выбора';
                }
            });
            
            document.addEventListener('touchstart', (e) => {
                if (e.touches[0] && state.controlMode === 'gesture') {
                    handVisible = true;
                    state.cursorPosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    
                    // Симуляция pinch жеста (два пальца)
                    if (e.touches.length >= 2) {
                        handlePinchGesture(e.touches[0].clientX, e.touches[0].clientY);
                    }
                }
            });
            
            document.addEventListener('touchend', (e) => {
                if (e.touches.length === 0) {
                    handVisible = false;
                    document.getElementById('hand-led').classList.remove('active');
                    document.getElementById('hand-status').innerHTML = '🤚 Рука не обнаружена';
                }
            });
            
            // Для ПК - мышь
            document.addEventListener('mousemove', (e) => {
                if (state.controlMode === 'gesture') {
                    handX = e.clientX;
                    handY = e.clientY;
                    handVisible = true;
                    state.cursorPosition = { x: handX, y: handY };
                    document.getElementById('hand-led').classList.add('active');
                    document.getElementById('hand-status').innerHTML = '✋ Курсор активен | Клик для выбора';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'gesture') {
                    handlePinchGesture(e.clientX, e.clientY);
                }
            });
            
            function handlePinchGesture(x, y) {
                if (!state.isPinching) {
                    state.isPinching = true;
                    document.getElementById('hand-status').innerHTML = '🤏 PINCH! Выбор объекта';
                    selectWindowAtPosition(x, y);
                    
                    // Визуальный эффект
                    const ripple = document.createElement('div');
                    ripple.style.position = 'fixed';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.style.width = '50px';
                    ripple.style.height = '50px';
                    ripple.style.borderRadius = '50%';
                    ripple.style.border = '2px solid #0f0';
                    ripple.style.transform = 'translate(-50%, -50%)';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.zIndex = '1000';
                    ripple.style.animation = 'rippleAnim 0.3s ease-out';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 300);
                    
                    setTimeout(() => {
                        state.isPinching = false;
                        document.getElementById('hand-status').innerHTML = '✋ Жест завершен';
                        setTimeout(() => {
                            if (handVisible) {
                                document.getElementById('hand-status').innerHTML = '✋ Палец отслеживается';
                            }
                        }, 1000);
                    }, 300);
                }
            }
            
            // Отрисовка скелета руки
            function drawSkeleton() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (handVisible && state.controlMode === 'gesture') {
                    const x = state.cursorPosition.x;
                    const y = state.cursorPosition.y;
                    
                    // Рисуем красивый скелет руки
                    ctx.save();
                    
                    // Ладонь
                    ctx.beginPath();
                    ctx.ellipse(x - 5, y + 15, 20, 28, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,170,255,0.2)';
                    ctx.fill();
                    ctx.strokeStyle = '#00aaff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Пальцы
                    const fingers = [
                        { angle: -0.3, length: 45, offset: -12 },
                        { angle: -0.1, length: 50, offset: -5 },
                        { angle: 0, length: 48, offset: 0 },
                        { angle: 0.1, length: 45, offset: 5 },
                        { angle: 0.25, length: 40, offset: 10 }
                    ];
                    
                    fingers.forEach((finger, i) => {
                        ctx.beginPath();
                        ctx.moveTo(x + finger.offset, y + 10);
                        const endX = x + finger.offset + Math.sin(finger.angle) * finger.length;
                        const endY = y + 10 - Math.cos(finger.angle) * finger.length;
                        ctx.lineTo(endX, endY);
                        ctx.strokeStyle = '#00aaff';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        
                        // Суставы
                        for (let j = 1; j <= 3; j++) {
                            const jointX = x + finger.offset + Math.sin(finger.angle) * (finger.length * j / 3);
                            const jointY = y + 10 - Math.cos(finger.angle) * (finger.length * j / 3);
                            ctx.beginPath();
                            ctx.arc(jointX, jointY, j === 3 ? 6 : 4, 0, Math.PI * 2);
                            ctx.fillStyle = j === 3 ? '#ffaa44' : '#00aaff';
                            ctx.fill();
                            ctx.shadowBlur = 8;
                            ctx.shadowColor = '#00aaff';
                        }
                    });
                    
                    // Указательный палец с эффектом курсора
                    const indexTip = {
                        x: x - 5 + Math.sin(-0.1) * 50,
                        y: y + 10 - Math.cos(-0.1) * 50
                    };
                    
                    ctx.beginPath();
                    ctx.arc(indexTip.x, indexTip.y, 14, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,255,136,0.4)';
                    ctx.fill();
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.arc(indexTip.x, indexTip.y, 6, 0, Math.PI * 2);
                    ctx.fillStyle = '#0f0';
                    ctx.fill();
                    
                    ctx.restore();
                }
                
                requestAnimationFrame(drawSkeleton);
            }
            
            drawSkeleton();
        }
        
        function selectWindowAtPosition(x, y) {
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindow) {
                        const prev = state.windows.find(w => w.id === state.activeWindow);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindow = win.id;
                    win.div.classList.add('active');
                    document.getElementById('status-text').innerHTML = `✅ Выбрано: ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('status-text').innerHTML = `Режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                    }, 1500);
                    return;
                }
            }
        }

        // ==================== AR ОКНА В ПРОСТРАНСТВЕ ====================
        function createARWindow(x, y, title, content, width = 300, height = 260) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width}px`;
            div.style.height = `${height}px`;
            
            const contentId = `win-${Date.now()}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.body.appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.apple.com/visionos/';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.borderRadius = '14px';
                contentDiv.appendChild(iframe);
            } 
            else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.borderRadius = '14px';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            }
            else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '✨ AR Заметки\n\n• Окна закреплены в пространстве\n• Управляйте жестами рук\n• Камера с зумом 0.6x\n• Полное AR погружение';
                contentDiv.appendChild(textarea);
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.div !== div);
                if (state.activeWindow === div.id) state.activeWindow = null;
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = {
                id: state.nextWindowId,
                div,
                title,
                x, y,
                width, height
            };
            state.windows.push(windowObj);
            state.nextWindowId++;
            
            // Позиционирование
            updateWindowPosition(windowObj);
            
            // Анимация появления
            div.style.opacity = '0';
            div.style.transform = 'scale(0.8)';
            setTimeout(() => {
                div.style.opacity = '1';
                div.style.transform = 'scale(1)';
            }, 10);
            
            return windowObj;
        }
        
        function updateWindowPosition(win) {
            // Окна закреплены в пространстве - не двигаются при перемещении камеры
            const screenX = window.innerWidth / 2 + (win.x - state.cameraPosition.x);
            const screenY = window.innerHeight / 2 + (win.y - state.cameraPosition.y);
            win.div.style.left = `${screenX}px`;
            win.div.style.top = `${screenY}px`;
        }
        
        function updateAllWindowPositions() {
            state.windows.forEach(win => {
                const screenX = window.innerWidth / 2 + (win.x - state.cameraPosition.x);
                const screenY = window.innerHeight / 2 + (win.y - state.cameraPosition.y);
                win.div.style.left = `${screenX}px`;
                win.div.style.top = `${screenY}px`;
            });
            requestAnimationFrame(updateAllWindowPositions);
        }

        // ==================== ТАЧПАД ====================
        function setupTouchControl() {
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'touch') {
                    selectWindowAtPosition(e.clientX, e.clientY);
                }
            });
            
            document.addEventListener('touchstart', (e) => {
                if (state.controlMode === 'touch' && e.touches[0]) {
                    selectWindowAtPosition(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
        }

        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        function setupModeSwitching() {
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    state.controlMode = mode;
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('status-text').innerHTML = `Режим: ${mode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                });
            });
        }

        // ==================== FULLSCREEN ====================
        function setupFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            btn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    btn.innerHTML = '✕';
                } else {
                    document.exitFullscreen();
                    btn.innerHTML = '⤢';
                }
            });
            document.addEventListener('fullscreenchange', () => {
                btn.innerHTML = document.fullscreenElement ? '✕' : '⤢';
            });
        }

        // ==================== УПРАВЛЕНИЕ ЗУМОМ ====================
        function setupZoomControls() {
            document.getElementById('zoom-out').addEventListener('click', () => {
                updateCameraZoom(0.6);
                document.getElementById('zoom-out').style.background = 'rgba(0,170,255,0.5)';
                setTimeout(() => {
                    document.getElementById('zoom-out').style.background = '';
                }, 200);
            });
            
            document.getElementById('zoom-in').addEventListener('click', () => {
                updateCameraZoom(1.0);
                document.getElementById('zoom-in').style.background = 'rgba(0,170,255,0.5)';
                setTimeout(() => {
                    document.getElementById('zoom-in').style.background = '';
                }, 200);
            });
        }

        // ==================== UI КНОПКИ ====================
        function setupUI() {
            document.getElementById('add-browser').onclick = () => {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 300;
                createARWindow(x, y, '🌐 Vision Browser', { type: 'browser' }, 340, 300);
            };
            
            document.getElementById('add-video').onclick = () => {
                const input = document.getElementById('video-upload');
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const x = (Math.random() - 0.5) * 400;
                        const y = (Math.random() - 0.5) * 300;
                        createARWindow(x, y, '🎬 Видео', { type: 'video', file: e.target.files[0] }, 320, 280);
                    } else {
                        const x = (Math.random() - 0.5) * 400;
                        const y = (Math.random() - 0.5) * 300;
                        createARWindow(x, y, '🎬 Демо видео', { type: 'video' }, 320, 280);
                    }
                };
                input.click();
            };
            
            document.getElementById('add-notes').onclick = () => {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 300;
                createARWindow(x, y, '📝 AR Заметки', { type: 'notes' }, 300, 260);
            };
            
            document.getElementById('reset-view').onclick = () => {
                state.cameraPosition = { x: 0, y: 0 };
                // Эффект сброса
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = '0';
                flash.style.left = '0';
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.background = 'rgba(0,170,255,0.3)';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '1000';
                flash.style.animation = 'fadeOut 0.3s ease-out';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 300);
            };
        }

        // Добавляем CSS анимации
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; }
                100% { opacity: 0; }
            }
            @keyframes rippleAnim {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await setupCamera();
            setupHandTracking();
            setupTouchControl();
            setupModeSwitching();
            setupFullscreen();
            setupZoomControls();
            setupUI();
            updateAllWindowPositions();
            
            // Создаем окна, закрепленные в пространстве
            setTimeout(() => {
                createARWindow(-180, -80, '🌐 Apple Vision Pro', { type: 'browser' }, 360, 320);
                createARWindow(200, -60, '🎬 Демо ролик', { type: 'video' }, 340, 300);
                createARWindow(50, 150, '📝 AR Заметки', { type: 'notes' }, 320, 280);
                createARWindow(-220, 120, '🌐 Wikipedia', { type: 'browser' }, 340, 300);
                createARWindow(250, -150, '🎬 Видеоплеер', { type: 'video' }, 330, 290);
            }, 1000);
            
            // Проверка ориентации
            function checkOrientation() {
                const warning = document.querySelector('.orientation-warning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            checkOrientation();
        }
        
        init();
    </script>
</body>
</html>
