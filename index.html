<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>V6 MAX AR - PS4 Джойстик | Полный AR интерфейс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000;
            touch-action: none;
        }

        /* Загрузочный экран с таймером */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.5s;
        }

        .loader-content {
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin: 20px auto;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff88;
            transition: width 0.3s;
        }

        .loader-text {
            font-size: 14px;
            color: #88aaff;
            margin-top: 10px;
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        .ui-panel {
            position: fixed;
            z-index: 200;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 10px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            font-size: 11px;
            font-family: monospace;
        }

        #info-panel {
            top: 20px;
            left: 20px;
            color: #0f0;
        }

        #gesture-status {
            top: 20px;
            right: 20px;
            color: #ffaa44;
        }

        #controller-status {
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            color: #ffaa44;
        }

        .controls-panel {
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        .touch-joystick {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            z-index: 200;
        }

        .joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #fff, #88aaff);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 15px rgba(100,100,255,0.5);
        }

        #hand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        .ar-window {
            position: absolute;
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .ar-window.active {
            border-color: #00ff88;
            box-shadow: 0 0 25px rgba(0,255,136,0.4);
        }

        .window-header {
            padding: 10px 12px;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .window-title {
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        .window-controls {
            display: flex;
            gap: 10px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 16px;
        }

        .close-btn { color: #ff5555; }
        .minimize-btn { color: #ffaa44; }

        .window-content {
            flex: 1;
            padding: 8px;
            overflow: auto;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            background: white;
        }

        video {
            background: #000;
            object-fit: contain;
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            resize: none;
            font-family: monospace;
            font-size: 12px;
        }

        .game-canvas {
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            border-radius: 8px;
        }

        #custom-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,0,0.6), rgba(255,0,0,0.2));
            border: 2px solid red;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: all 0.05s linear;
        }

        #custom-cursor.active {
            border-color: #00ff00;
            background: radial-gradient(circle, rgba(0,255,0,0.6), rgba(0,255,0,0.2));
            transform: translate(-50%, -50%) scale(0.8);
        }

        @keyframes cursor-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <div style="font-size: 20px; margin: 10px 0;">🚀 V6 MAX AR</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="loader-text" id="loader-text">Инициализация...</div>
        </div>
    </div>

    <div class="orientation-warning">
        <div>📱 Поверните телефон в горизонтальную ориентацию</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div id="info-panel" class="ui-panel">
        🚀 V6 MAX AR<br>
        🎮 Левый стик - движение<br>
        🎮 Правый стик - курсор<br>
        ✕ - выбор | □ - закрыть<br>
        △ - браузер | ○ - видео
    </div>

    <div id="gesture-status" class="ui-panel">
        ✋ Жесты активны
    </div>

    <div id="controller-status" class="ui-panel">
        🎮 Поиск PS4...
    </div>

    <div class="controls-panel ui-panel">
        <button id="add-browser">🌐 Браузер</button>
        <button id="add-video">🎬 Видео</button>
        <button id="add-game">🎮 Игра</button>
        <button id="reset-cam">🔄 Сброс</button>
    </div>

    <div class="touch-joystick" id="touch-joystick">
        <div class="joystick-thumb" id="joystick-thumb"></div>
    </div>

    <div id="custom-cursor"></div>
    <canvas id="hand-canvas"></canvas>
    <input type="file" id="video-upload" accept="video/*" style="display: none">

    <script>
        // Простой прогресс-бар без загрузки внешних библиотек
        let progress = 0;
        const progressInterval = setInterval(() => {
            progress += 10;
            document.getElementById('progress-fill').style.width = progress + '%';
            const texts = [
                'Инициализация...',
                'Настройка 3D сцены...',
                'Запуск камеры...',
                'Активация AR режима...',
                'Поиск PS4 контроллера...',
                'Готово!'
            ];
            const idx = Math.min(Math.floor(progress / 17), texts.length - 1);
            document.getElementById('loader-text').textContent = texts[idx];
            
            if (progress >= 100) {
                clearInterval(progressInterval);
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 200);
            }
        }, 150);

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            videoStream: null,
            threeScene: null,
            threeCamera: null,
            threeRenderer: null,
            windows: [],
            activeWindow: null,
            joystickMove: { x: 0, y: 0 },
            joystickCursor: { x: 0, y: 0 },
            cursorPosition: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
            cameraPosition: { x: 0, y: 1.5, z: 5 },
            gamepad: null,
            gamepadConnected: false,
            nextWindowId: 1,
            lastButtons: {}
        };

        // ==================== THREE.JS ЛОКАЛЬНО ====================
        function setupThree() {
            const container = document.createElement('div');
            container.style.position = 'fixed';
            container.style.top = '0';
            container.style.left = '0';
            container.style.width = '100%';
            container.style.height = '100%';
            container.style.zIndex = '1';
            container.style.pointerEvents = 'none';
            document.body.appendChild(container);

            // Создаем сцену вручную без импортов
            const scene = {
                children: [],
                background: null
            };
            
            // Простая реализация для демонстрации
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '1';
            canvas.style.pointerEvents = 'none';
            container.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            
            function drawScene() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем сетку пола
                ctx.strokeStyle = 'rgba(136,170,255,0.3)';
                ctx.lineWidth = 1;
                const gridSize = 20;
                const step = 50;
                const offsetX = canvas.width / 2 + state.cameraPosition.x * 30;
                const offsetY = canvas.height / 2 + state.cameraPosition.z * 20;
                
                for (let i = -gridSize; i <= gridSize; i++) {
                    ctx.beginPath();
                    ctx.moveTo(offsetX + i * step, 0);
                    ctx.lineTo(offsetX + i * step, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, offsetY + i * step);
                    ctx.lineTo(canvas.width, offsetY + i * step);
                    ctx.stroke();
                }
                
                // Рисуем окна в 3D перспективе
                state.windows.forEach(win => {
                    const scale = 200 / (win.z + 5);
                    const screenX = canvas.width / 2 + (win.x - state.cameraPosition.x) * 80 * scale;
                    const screenY = canvas.height / 2 + (win.y - 1.5) * 80 * scale;
                    const w = win.width * 80 * scale;
                    const h = win.height * 80 * scale;
                    
                    if (screenX > -w && screenX < canvas.width + w && screenY > -h && screenY < canvas.height + h) {
                        ctx.save();
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = win.id === state.activeWindow ? '#00ff88' : 'rgba(0,0,0,0.5)';
                        ctx.fillStyle = 'rgba(30,30,50,0.85)';
                        ctx.fillRect(screenX - w/2, screenY - h/2, w, h);
                        ctx.strokeStyle = win.id === state.activeWindow ? '#00ff88' : 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(screenX - w/2, screenY - h/2, w, h);
                        
                        ctx.fillStyle = 'white';
                        ctx.font = `${12 * scale}px Arial`;
                        ctx.fillText(win.title, screenX - w/2 + 10, screenY - h/2 + 20);
                        ctx.restore();
                    }
                });
                
                // Рисуем частицы
                for (let i = 0; i < 100; i++) {
                    const x = (Math.sin(Date.now() * 0.001 + i) * 100 + canvas.width / 2) % canvas.width;
                    const y = (Math.cos(Date.now() * 0.0008 + i) * 80 + canvas.height / 2) % canvas.height;
                    ctx.fillStyle = `rgba(136,170,255,${0.3 + Math.sin(Date.now() * 0.002 + i) * 0.2})`;
                    ctx.fillRect(x, y, 2, 2);
                }
                
                requestAnimationFrame(drawScene);
            }
            
            drawScene();
        }

        // ==================== AR ОКНА ====================
        function createARWindow(x, y, z, title, content, width = 2.8, height = 2) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width * 110}px`;
            div.style.height = `${height * 110}px`;
            div.style.left = '50%';
            div.style.top = '50%';
            div.style.transform = 'translate(-50%, -50%)';
            
            const contentId = `win-${Date.now()}-${Math.random()}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.body.appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.wikipedia.org';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.style.borderRadius = '8px';
                contentDiv.appendChild(iframe);
            } 
            else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'contain';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            }
            else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '📝 AR Заметки\n\n• Окна закреплены в пространстве\n• Управляйте курсором правым стиком\n• PS4 контроллер полностью поддерживается\n• Жесты также доступны';
                contentDiv.appendChild(textarea);
            }
            else if (content.type === 'game') {
                const gameCanvas = document.createElement('canvas');
                gameCanvas.width = 400;
                gameCanvas.height = 300;
                gameCanvas.style.width = '100%';
                gameCanvas.style.height = '100%';
                gameCanvas.style.borderRadius = '8px';
                gameCanvas.style.cursor = 'pointer';
                contentDiv.appendChild(gameCanvas);
                
                let score = 0;
                const ctx = gameCanvas.getContext('2d');
                
                function drawGame() {
                    ctx.fillStyle = '#667eea';
                    ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Arial';
                    ctx.fillText(`Score: ${score}`, 20, 50);
                    ctx.fillStyle = '#ffaa44';
                    ctx.fillRect(gameCanvas.width/2 - 50, gameCanvas.height/2 - 50, 100, 100);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText('CLICK!', gameCanvas.width/2 - 28, gameCanvas.height/2);
                }
                drawGame();
                
                gameCanvas.addEventListener('click', () => {
                    score++;
                    drawGame();
                });
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.div !== div);
                if (state.activeWindow === div.id) state.activeWindow = null;
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = { 
                id: state.nextWindowId, 
                div, 
                title, 
                x, y, z, 
                width, height,
                element: div
            };
            state.windows.push(windowObj);
            state.nextWindowId++;
            
            return windowObj;
        }

        // ==================== КАМЕРА ====================
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.zIndex = '0';
                video.style.pointerEvents = 'none';
                document.body.insertBefore(video, document.body.firstChild);
                return true;
            } catch (err) {
                console.log('Camera not available');
                return false;
            }
        }

        // ==================== PS4 ДЖОЙСТИК ====================
        function setupGamepad() {
            let cursorSpeed = 8;
            
            function updateGamepad() {
                const gamepads = navigator.getGamepads();
                let found = false;
                
                for (let i = 0; i < gamepads.length; i++) {
                    const gp = gamepads[i];
                    if (gp && (gp.id.includes('PS4') || gp.id.includes('Wireless') || gp.id.includes('DualShock') || gp.id.includes('Xbox'))) {
                        found = true;
                        if (!state.gamepadConnected) {
                            state.gamepadConnected = true;
                            document.getElementById('controller-status').innerHTML = '🎮 PS4 подключен ✅';
                            document.getElementById('controller-status').style.color = '#0f0';
                        }
                        state.gamepad = gp;
                        
                        // Левый стик - перемещение камеры
                        const leftX = gp.axes[0] || 0;
                        const leftY = gp.axes[1] || 0;
                        if (Math.abs(leftX) > 0.1 || Math.abs(leftY) > 0.1) {
                            state.cameraPosition.x += leftX * 0.1;
                            state.cameraPosition.z += leftY * 0.1;
                            state.cameraPosition.x = Math.max(-6, Math.min(6, state.cameraPosition.x));
                            state.cameraPosition.z = Math.max(2, Math.min(10, state.cameraPosition.z));
                        }
                        
                        // Правый стик - перемещение курсора
                        const rightX = gp.axes[2] || 0;
                        const rightY = gp.axes[3] || 0;
                        if (Math.abs(rightX) > 0.1 || Math.abs(rightY) > 0.1) {
                            state.cursorPosition.x += rightX * cursorSpeed;
                            state.cursorPosition.y += rightY * cursorSpeed;
                            state.cursorPosition.x = Math.max(0, Math.min(window.innerWidth, state.cursorPosition.x));
                            state.cursorPosition.y = Math.max(0, Math.min(window.innerHeight, state.cursorPosition.y));
                            
                            const cursor = document.getElementById('custom-cursor');
                            cursor.style.left = state.cursorPosition.x + 'px';
                            cursor.style.top = state.cursorPosition.y + 'px';
                        }
                        
                        // Кнопки
                        const buttons = gp.buttons;
                        
                        // X (индекс 0) - выбор окна
                        if (buttons[0] && buttons[0].pressed && !state.lastButtons[0]) {
                            selectWindowAtPosition(state.cursorPosition.x, state.cursorPosition.y);
                        }
                        state.lastButtons[0] = buttons[0] && buttons[0].pressed;
                        
                        // Square (индекс 2) - закрыть окно
                        if (buttons[2] && buttons[2].pressed && !state.lastButtons[2]) {
                            if (state.activeWindow) {
                                const win = state.windows.find(w => w.id === state.activeWindow);
                                if (win) {
                                    win.div.remove();
                                    state.windows = state.windows.filter(w => w.id !== state.activeWindow);
                                    state.activeWindow = null;
                                }
                            }
                        }
                        state.lastButtons[2] = buttons[2] && buttons[2].pressed;
                        
                        // Triangle (индекс 3) - добавить браузер
                        if (buttons[3] && buttons[3].pressed && !state.lastButtons[3]) {
                            const randomX = (Math.random() - 0.5) * 5;
                            const randomZ = (Math.random() - 0.5) * 3 - 1;
                            createARWindow(randomX, 1.2, randomZ, '🌐 Браузер', { type: 'browser' }, 3, 2.4);
                        }
                        state.lastButtons[3] = buttons[3] && buttons[3].pressed;
                        
                        // Circle (индекс 1) - добавить видео
                        if (buttons[1] && buttons[1].pressed && !state.lastButtons[1]) {
                            const randomX = (Math.random() - 0.5) * 5;
                            const randomZ = (Math.random() - 0.5) * 3 - 1;
                            createARWindow(randomX, 1, randomZ, '🎬 Видео', { type: 'video' }, 2.8, 2.2);
                        }
                        state.lastButtons[1] = buttons[1] && buttons[1].pressed;
                        
                        // R1 (индекс 5) - увеличить скорость курсора
                        if (buttons[5] && buttons[5].pressed) {
                            cursorSpeed = 15;
                        } else {
                            cursorSpeed = 8;
                        }
                        
                        break;
                    }
                }
                
                if (!found && state.gamepadConnected) {
                    state.gamepadConnected = false;
                    document.getElementById('controller-status').innerHTML = '🎮 Джойстик не найден';
                    document.getElementById('controller-status').style.color = '#ffaa44';
                }
                
                requestAnimationFrame(updateGamepad);
            }
            
            updateGamepad();
            
            window.addEventListener('gamepadconnected', (e) => {
                console.log('Gamepad:', e.gamepad.id);
                document.getElementById('controller-status').innerHTML = `🎮 ${e.gamepad.id.substring(0, 20)}`;
            });
        }
        
        function selectWindowAtPosition(x, y) {
            const cursor = document.getElementById('custom-cursor');
            cursor.classList.add('active');
            setTimeout(() => cursor.classList.remove('active'), 200);
            
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindow) {
                        const prev = state.windows.find(w => w.id === state.activeWindow);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindow = win.id;
                    win.div.classList.add('active');
                    document.getElementById('gesture-status').innerHTML = `✅ Выбрано: ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('gesture-status').innerHTML = `✋ Жесты активны`;
                    }, 1500);
                    return;
                }
            }
        }

        // ==================== ТАЧ ДЖОЙСТИК ====================
        function setupTouchJoystick() {
            const container = document.getElementById('touch-joystick');
            const thumb = document.getElementById('joystick-thumb');
            let active = false;
            let startX = 0, startY = 0;
            
            const onStart = (e) => {
                e.preventDefault();
                active = true;
                const rect = container.getBoundingClientRect();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                startX = clientX;
                startY = clientY;
            };
            
            const onMove = (e) => {
                if (!active) return;
                e.preventDefault();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                let deltaX = clientX - startX;
                let deltaY = clientY - startY;
                const maxMove = 45;
                deltaX = Math.max(-maxMove, Math.min(maxMove, deltaX));
                deltaY = Math.max(-maxMove, Math.min(maxMove, deltaY));
                
                thumb.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                state.joystickMove.x = deltaX / maxMove;
                state.joystickMove.y = deltaY / maxMove;
                
                state.cameraPosition.x += state.joystickMove.x * 0.08;
                state.cameraPosition.z += state.joystickMove.y * 0.08;
            };
            
            const onEnd = () => {
                active = false;
                thumb.style.transform = 'translate(-50%, -50%)';
                state.joystickMove.x = 0;
                state.joystickMove.y = 0;
            };
            
            container.addEventListener('touchstart', onStart);
            container.addEventListener('mousedown', onStart);
            window.addEventListener('touchmove', onMove);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchend', onEnd);
            window.addEventListener('mouseup', onEnd);
        }

        // ==================== UI ====================
        function setupUI() {
            document.getElementById('add-browser').onclick = () => {
                const randomX = (Math.random() - 0.5) * 5;
                const randomZ = (Math.random() - 0.5) * 3 - 1;
                createARWindow(randomX, 1.2, randomZ, '🌐 Браузер', { type: 'browser' }, 3, 2.4);
            };
            
            document.getElementById('add-video').onclick = () => {
                const input = document.getElementById('video-upload');
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const randomX = (Math.random() - 0.5) * 5;
                        const randomZ = (Math.random() - 0.5) * 3 - 1;
                        createARWindow(randomX, 1, randomZ, '🎬 Видео', { type: 'video', file: e.target.files[0] }, 2.8, 2.2);
                    }
                };
                input.click();
            };
            
            document.getElementById('add-game').onclick = () => {
                const randomX = (Math.random() - 0.5) * 5;
                const randomZ = (Math.random() - 0.5) * 3 - 1;
                createARWindow(randomX, 0.5, randomZ, '🎮 Игра', { type: 'game' }, 2.6, 2);
            };
            
            document.getElementById('reset-cam').onclick = () => {
                state.cameraPosition = { x: 0, y: 1.5, z: 5 };
            };
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            setupThree();
            await setupCamera();
            setupGamepad();
            setupTouchJoystick();
            setupUI();
            
            // Создание окон
            setTimeout(() => {
                createARWindow(-2, 1.2, -1.5, '🌐 Wikipedia', { type: 'browser' }, 3, 2.4);
                createARWindow(2, 1, -1.8, '🎬 Демо видео', { type: 'video' }, 2.8, 2.2);
                createARWindow(0, 1.5, -2.2, '📝 AR Заметки', { type: 'notes' }, 2.6, 2);
                createARWindow(0, -0.2, -3, '🎮 Кликер', { type: 'game' }, 2.6, 2);
            }, 500);
            
            // Курсор мыши
            document.addEventListener('mousemove', (e) => {
                if (!state.gamepadConnected || (Math.abs(state.gamepad?.axes[2] || 0) < 0.1 && Math.abs(state.gamepad?.axes[3] || 0) < 0.1)) {
                    state.cursorPosition.x = e.clientX;
                    state.cursorPosition.y = e.clientY;
                    const cursor = document.getElementById('custom-cursor');
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                }
            });
            
            // Ориентация
            function checkOrientation() {
                const warning = document.querySelector('.orientation-warning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            checkOrientation();
        }
        
        init();
    </script>
</body>
