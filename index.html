<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saber over Wi-Fi — просто и надёжно</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .status, .score {
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
        }
        .score { color: #ffaa33; }
        button {
            pointer-events: auto;
            background: #ff3366;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
        }
        .panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            z-index: 200;
        }
        .ip-box {
            background: #1a1a2e;
            color: #33ff66;
            padding: 15px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 20px;
            margin: 10px 0;
        }
        .gyro-value {
            font-size: 32px;
            color: #ffaa33;
            margin: 10px 0;
        }
        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 30px;
            width: 80%;
            margin: 10px 0;
            text-align: center;
        }
        .connected { color: #33ff66; }
        @media (max-width: 600px) {
            .ip-box { font-size: 14px; }
            .gyro-value { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">⚡ Выберите режим</div>
        <div class="score" id="score">Счёт: 0</div>
    </div>

    <div id="hostPanel" class="panel" style="display: none;">
        <h3>🖥️ ТЕЛЕФОН-ЭКРАН</h3>
        <button id="startHotspotBtn" class="btn-green" style="background:#33cc66;">📡 РАЗДАТЬ WI-FI</button>
        <div id="hotspotHelp" style="font-size:12px; margin:10px; color:#aaa;"></div>
        <button id="showIpBtn" style="background:#3399ff;">🔍 ПОКАЗАТЬ IP</button>
        <div id="ipDisplay" class="ip-box" style="display: none;"></div>
        <div id="hostMsg"></div>
        <div id="hostConnectedMsg" style="display: none;" class="connected">✅ Контроллер подключён!</div>
    </div>

    <div id="joinPanel" class="panel" style="display: none;">
        <h3>🎮 ТЕЛЕФОН-КОНТРОЛЛЕР</h3>
        <div>Введите IP экрана:</div>
        <input type="text" id="serverIp" placeholder="192.168.43.1">
        <button id="connectWsBtn" style="background:#3399ff;">🔗 ПОДКЛЮЧИТЬСЯ</button>
        <div id="joinMsg"></div>
        <div class="gyro-value" id="gyroDisplay">0°</div>
        <div style="font-size:12px;">Наклоняйте телефон → управляет лучом</div>
    </div>

    <div id="modeSelector" style="position: absolute; bottom: 30px; left: 20px; right: 20px; display: flex; gap: 15px; z-index: 300;">
        <button id="chooseHostBtn" style="background:#33cc66;">🖥️ Я ЭКРАН</button>
        <button id="chooseJoinBtn" style="background:#ff3366;">🎮 Я КОНТРОЛЛЕР</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let mode = null;
        let score = 0;
        let cubes = [];
        let saberAngle = 0;
        let ws = null;
        let isConnected = false;

        // DOM
        const statusDiv = document.getElementById('status');
        const scoreDiv = document.getElementById('score');
        const modeSelector = document.getElementById('modeSelector');
        const hostPanel = document.getElementById('hostPanel');
        const joinPanel = document.getElementById('joinPanel');
        const ipDisplay = document.getElementById('ipDisplay');
        const hostMsg = document.getElementById('hostMsg');
        const hostConnectedMsg = document.getElementById('hostConnectedMsg');
        const joinMsg = document.getElementById('joinMsg');
        const gyroDisplay = document.getElementById('gyroDisplay');
        const serverIpInput = document.getElementById('serverIp');
        const connectWsBtn = document.getElementById('connectWsBtn');
        const showIpBtn = document.getElementById('showIpBtn');
        const startHotspotBtn = document.getElementById('startHotspotBtn');

        // === 3D СЦЕНА ===
        let scene, camera, renderer, clock, saberLine;

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.005);
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 8);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(3, 5, 2);
            scene.add(light);

            const grid = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
            grid.position.y = -1.8;
            scene.add(grid);

            // Луч
            const saberGroup = new THREE.Group();
            const bladeGeo = new THREE.CylinderGeometry(0.05, 0.08, 1.5, 8);
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff2200 });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.y = 0.75;
            saberGroup.add(blade);
            saberGroup.position.set(0, 0.5, 4.5);
            scene.add(saberGroup);
            saberLine = saberGroup;

            clock = new THREE.Clock();
            setInterval(() => { if (mode === 'host') spawnCube(); }, 800);
            
            function animate() {
                if (mode !== 'host') return;
                const delta = Math.min(clock.getDelta(), 0.033);
                updateCubes(delta);
                if (saberLine) {
                    const limited = Math.max(-50, Math.min(50, saberAngle));
                    saberLine.rotation.z = limited * Math.PI / 180;
                }
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function spawnCube() {
            const size = 0.6 + Math.random() * 0.3;
            const colors = [0xff3366, 0x33ff66, 0xffaa33, 0xaa44ff];
            const material = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
            const cube = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), material);
            cube.position.set((Math.random() - 0.5) * 4.5, (Math.random() - 0.5) * 3, -12);
            cube.userData = { speed: 4 + Math.random() * 2.5, hit: false };
            scene.add(cube);
            cubes.push(cube);
        }

        function updateCubes(delta) {
            for (let i = cubes.length-1; i >= 0; i--) {
                const cube = cubes[i];
                cube.position.z += cube.userData.speed * delta;
                if (!cube.userData.hit) {
                    const cubeAngle = Math.atan2(cube.position.x, 4.5) * 57.3;
                    if (Math.abs(saberAngle - cubeAngle) < 25 && Math.abs(cube.position.z + 3) < 1.2) {
                        cube.userData.hit = true;
                        score += 10;
                        scoreDiv.innerHTML = `Счёт: ${score}`;
                        scene.remove(cube);
                        cubes.splice(i,1);
                        statusDiv.innerHTML = `⚡ РАЗРУБ! +10`;
                        setTimeout(() => statusDiv.innerHTML = '🖥️ Экран', 500);
                        continue;
                    }
                }
                if (cube.position.z > 4.5) {
                    scene.remove(cube);
                    cubes.splice(i,1);
                }
            }
        }

        // === РЕЖИМ ЭКРАНА (НЕ сервер, а клиент, который слушает WebSocket) ===
        function startScreenMode() {
            mode = 'host';
            init3D();
            hostPanel.style.display = 'block';
            
            startHotspotBtn.onclick = () => {
                hostMsg.innerHTML = '📱 Включите "Точку доступа" в настройках телефона, затем нажмите "Показать IP"';
                hostMsg.style.color = '#ffaa33';
            };
            
            showIpBtn.onclick = async () => {
                // Получаем IP в локальной сети
                const ip = await getLocalIP();
                ipDisplay.innerHTML = `📡 IP адрес экрана:<br><span style="font-size:24px;">${ip}</span><br><span style="font-size:12px;">Введите этот IP на втором телефоне</span>`;
                ipDisplay.style.display = 'block';
                hostMsg.innerHTML = 'Теперь включите WebSocket сервер или используйте приложение "WebSocket Server"';
                
                // Запускаем WebSocket клиент (экран будет получать данные)
                startWebSocketClient(ip);
            };
        }
        
        async function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (event) => {
                    if (event && event.candidate && event.candidate.candidate) {
                        const ip = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/)?.[0];
                        if (ip && !ip.startsWith('0.0.0.0')) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => {
                    resolve('192.168.43.1 (адрес точки доступа)');
                    pc.close();
                }, 2000);
            });
        }
        
        function startWebSocketClient(ip) {
            // Пытаемся подключиться к WebSocket серверу на том же телефоне
            const wsUrl = `ws://${ip}:8080`;
            hostMsg.innerHTML = `🔄 Подключение к ${wsUrl}...`;
            
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                hostConnectedMsg.style.display = 'block';
                hostMsg.innerHTML = '✅ Контроллер подключён! Ждём данные...';
                isConnected = true;
            };
            ws.onmessage = (e) => {
                const angle = parseFloat(e.data);
                if (!isNaN(angle)) {
                    saberAngle = angle;
                    statusDiv.innerHTML = `📡 Угол: ${Math.round(angle)}°`;
                }
            };
            ws.onerror = () => {
                hostMsg.innerHTML = '⚠️ Нужен WebSocket сервер! Установите приложение "WebSocket Server" из Play Market/RuStore и запустите на порту 8080';
                hostMsg.style.color = '#ff6666';
            };
        }
        
        // === РЕЖИМ КОНТРОЛЛЕРА (отправляет гироскоп) ===
        function startControllerMode() {
            mode = 'join';
            joinPanel.style.display = 'block';
            
            // Гироскоп
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const requestGyro = async () => {
                    try {
                        await DeviceOrientationEvent.requestPermission();
                        window.addEventListener('deviceorientation', handleGyro);
                        joinMsg.innerHTML = '✅ Гироскоп активен';
                    } catch(e) { joinMsg.innerHTML = '❌ Нет доступа к гироскопу'; }
                    document.removeEventListener('click', requestGyro);
                };
                document.addEventListener('click', requestGyro);
            } else {
                window.addEventListener('deviceorientation', handleGyro);
                joinMsg.innerHTML = '✅ Гироскоп активен';
            }
            
            connectWsBtn.onclick = () => {
                const serverIp = serverIpInput.value;
                if (!serverIp) {
                    joinMsg.innerHTML = '❌ Введите IP экрана';
                    return;
                }
                joinMsg.innerHTML = `🔄 Подключение к ${serverIp}:8080...`;
                
                ws = new WebSocket(`ws://${serverIp}:8080`);
                ws.onopen = () => {
                    joinMsg.innerHTML = '✅ Подключено! Наклоняйте телефон';
                    joinMsg.style.color = '#33ff66';
                    isConnected = true;
                    startSendingAngle();
                };
                ws.onerror = () => {
                    joinMsg.innerHTML = '❌ Не удалось подключиться. Убедитесь, что на экране запущен WebSocket сервер (порт 8080)';
                };
            };
        }
        
        let lastAngle = 0;
        function handleGyro(e) {
            if (mode !== 'join') return;
            const gamma = e.gamma || 0;
            const angle = Math.max(-60, Math.min(60, gamma));
            gyroDisplay.innerHTML = `${Math.round(angle)}°`;
            lastAngle = angle;
        }
        
        function startSendingAngle() {
            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN && mode === 'join') {
                    ws.send(lastAngle.toString());
                }
            }, 30);
        }
        
        // === ВЫБОР ===
        document.getElementById('chooseHostBtn').onclick = () => {
            modeSelector.style.display = 'none';
            joinPanel.style.display = 'none';
            startScreenMode();
            statusDiv.innerHTML = '🖥️ Режим экрана';
        };
        document.getElementById('chooseJoinBtn').onclick = () => {
            modeSelector.style.display = 'none';
            hostPanel.style.display = 'none';
            startControllerMode();
            statusDiv.innerHTML = '🎮 Режим контроллера';
        };
        
        console.log('=== ИНСТРУКЦИЯ ===');
        console.log('1. На телефоне-ЭКРАНЕ нажмите "Я ЭКРАН"');
        console.log('2. Нажмите "РАЗДАТЬ WI-FI" и включите точку доступа в настройках');
        console.log('3. Нажмите "ПОКАЗАТЬ IP" и запомните адрес');
        console.log('4. На телефоне-КОНТРОЛЛЕРЕ подключитесь к Wi-Fi экрана');
        console.log('5. На контроллере нажмите "Я КОНТРОЛЛЕР" и введите IP экрана');
        console.log('');
        console.log('⚠️ ВАЖНО: Для работы нужен WebSocket сервер!');
        console.log('Установите на телефон-ЭКРАН приложение "WebSocket Server" из магазина');
        console.log('Запустите его на порту 8080 и нажмите "Start Server"');
    </script>
</body>
</html>
