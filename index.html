<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vision Pro AR | Жесты руками + Закрепленные окна в комнате</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #000;
            touch-action: none;
        }

        /* Загрузочный экран */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            backdrop-filter: blur(40px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 1s;
        }

        .vision-logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .progress-ring {
            width: 80px;
            height: 80px;
            margin: 20px;
        }

        .loader-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
        }

        /* Главный UI */
        .vision-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 200;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            pointer-events: auto;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .vision-card {
            background: rgba(30,30,40,0.7);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 10px 20px;
            border: 0.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 5px;
        }

        .mode-btn {
            padding: 6px 16px;
            border-radius: 30px;
            background: transparent;
            border: none;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .mode-btn.active {
            background: rgba(0,170,255,0.5);
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* AR Окна в стиле Vision Pro */
        .ar-window {
            position: absolute;
            background: rgba(20,20,30,0.85);
            backdrop-filter: blur(60px);
            border-radius: 32px;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.1) inset;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform;
        }

        .ar-window.active {
            border-color: #00aaff;
            box-shadow: 0 0 40px rgba(0,170,255,0.3), 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(1.02);
        }

        .window-header {
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .window-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.3px;
        }

        .window-controls {
            display: flex;
            gap: 14px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .window-controls span:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .close-btn { color: #ff6b6b; }
        .minimize-btn { color: #ffd93d; }

        .window-content {
            flex: 1;
            padding: 12px;
            overflow: auto;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        video {
            object-fit: contain;
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 14px;
            border-radius: 20px;
            border: 0.5px solid rgba(255,255,255,0.2);
            resize: none;
            font-family: monospace;
            font-size: 13px;
        }

        /* Canvas для скелета руки */
        #hand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        /* Кнопка fullscreen */
        .fullscreen-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .fullscreen-btn:active {
            transform: scale(0.9);
        }

        .action-buttons {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
        }

        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 26px;
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
            }
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        .hand-status {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 20px;
            color: #0f0;
            font-size: 12px;
            font-family: monospace;
            z-index: 200;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="vision-logo">VISION PRO AR</div>
        <div class="progress-ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                <circle id="progress-circle" cx="40" cy="40" r="35" fill="none" stroke="#00aaff" stroke-width="2" stroke-dasharray="220" stroke-dashoffset="220" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="loader-text" id="loader-text">Загрузка AR пространства...</div>
        <div class="loader-text" style="font-size: 11px; margin-top: 10px;">🔍 Калибровка камеры 0.6x...</div>
    </div>

    <div class="orientation-warning">
        <div>👓 Поверните устройство горизонтально</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div class="vision-ui">
        <div class="top-bar">
            <div class="vision-card">
                <span>👓 VISION PRO AR</span>
            </div>
            <div class="mode-selector" id="mode-selector">
                <button class="mode-btn active" data-mode="gesture">✋ Жесты руками</button>
                <button class="mode-btn" data-mode="touch">👆 Тачпад</button>
            </div>
            <div class="vision-card status-indicator">
                <div class="led" id="hand-led"></div>
                <span id="status-text">Режим: Жесты руками</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="add-browser">🌐</button>
            <button class="action-btn" id="add-video">🎬</button>
            <button class="action-btn" id="add-notes">📝</button>
            <button class="action-btn" id="reset-view">🔄</button>
        </div>
    </div>

    <div class="fullscreen-btn" id="fullscreen-btn">⤢</div>
    <div class="hand-status" id="hand-status">🤚 Ожидание руки...</div>
    <canvas id="hand-canvas"></canvas>
    <input type="file" id="video-upload" accept="video/*" style="display: none">

    <script type="importmap">
        {
            "imports": {
                "@mediapipe/hands": "https://unpkg.com/@mediapipe/hands@0.4.1646424915/hands.js",
                "@mediapipe/camera_utils": "https://unpkg.com/@mediapipe/camera_utils@0.3.1675465740/camera_utils.js"
            }
        }
    </script>

    <script type="module">
        import { Hands } from '@mediapipe/hands';
        import { Camera as MediaCamera } from '@mediapipe/camera_utils';

        // ==================== ПРОГРЕСС ЗАГРУЗКИ ====================
        let progress = 0;
        const circle = document.getElementById('progress-circle');
        const texts = [
            'Калибровка AR пространства...',
            'Активация камеры 0.6x...',
            'Загрузка MediaPipe Hands...',
            'Настройка жестов...',
            'Закрепление окон в комнате...',
            'Готово!'
        ];
        
        const interval = setInterval(() => {
            progress += 7;
            const dashoffset = 220 - (220 * progress / 100);
            circle.style.strokeDashoffset = dashoffset;
            const idx = Math.min(Math.floor(progress / 17), texts.length - 1);
            document.getElementById('loader-text').textContent = texts[idx];
            
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').remove(), 800);
                }, 300);
            }
        }, 140);

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            controlMode: 'gesture',
            windows: [],
            activeWindow: null,
            cursorPosition: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
            cameraPosition: { x: 0, y: 0, z: 0 },
            handLandmarks: null,
            isPinching: false,
            pinchStartTime: 0,
            nextWindowId: 1,
            lastPinchPosition: null,
            videoElement: null
        };

        // ==================== AR ОКНА В ПРОСТРАНСТВЕ КОМНАТЫ ====================
        function createARWindow(x, y, z, title, content, width = 320, height = 280) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width}px`;
            div.style.height = `${height}px`;
            div.style.left = '50%';
            div.style.top = '50%';
            div.style.transform = 'translate(-50%, -50%)';
            
            const contentId = `win-${Date.now()}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.body.appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.apple.com/visionos/';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.borderRadius = '16px';
                contentDiv.appendChild(iframe);
            } 
            else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.borderRadius = '16px';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            }
            else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '✨ Vision Pro AR Заметки\n\n• Окна закреплены в пространстве комнаты\n• Управляйте жестами рук в воздухе\n• Камера показывает скелет руки\n• Полное AR погружение';
                contentDiv.appendChild(textarea);
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.div !== div);
                if (state.activeWindow === div.id) state.activeWindow = null;
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = {
                id: state.nextWindowId,
                div,
                title,
                x, y, z,
                width, height,
                screenX: window.innerWidth / 2 + x * 2,
                screenY: window.innerHeight / 2 + y * 2
            };
            state.windows.push(windowObj);
            state.nextWindowId++;
            
            // Анимация появления
            div.style.opacity = '0';
            div.style.transform = 'translate(-50%, -50%) scale(0.8)';
            setTimeout(() => {
                div.style.opacity = '1';
                div.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 10);
            
            return windowObj;
        }

        // Обновление позиций окон в 3D пространстве
        function updateWindowPositions() {
            state.windows.forEach(win => {
                // Окна остаются закрепленными в пространстве комнаты
                const screenX = window.innerWidth / 2 + (win.x - state.cameraPosition.x) * 3;
                const screenY = window.innerHeight / 2 + (win.y - state.cameraPosition.y) * 2.5;
                const scale = 1 / (1 + Math.abs(win.z - state.cameraPosition.z) * 0.15);
                
                win.div.style.transform = `translate(${screenX - win.width/2}px, ${screenY - win.height/2}px) scale(${Math.max(0.6, Math.min(1.2, scale))})`;
                win.div.style.opacity = Math.min(1, scale * 1.2);
            });
            requestAnimationFrame(updateWindowPositions);
        }

        // ==================== КАМЕРА 0.6x ====================
        async function setupCamera() {
            try {
                // Запрос камеры с увеличенным полем зрения (эквивалент 0.6x)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.zIndex = '-1';
                video.style.transform = 'scale(0.9)'; // Эффект 0.6x увеличения
                document.body.insertBefore(video, document.body.firstChild);
                
                state.videoElement = video;
                return video;
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('hand-status').innerHTML = '⚠️ Камера недоступна';
                return null;
            }
        }

        // ==================== MEDIAPIPE HANDS - ЖЕСТЫ РУК В ВОЗДУХЕ ====================
        function setupHandTracking(videoElement) {
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            const hands = new Hands({
                locateFile: (file) => `https://unpkg.com/@mediapipe/hands@0.4.1646424915/${file}`
            });
            
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            
            hands.onResults((results) => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const landmarks = results.multiHandLandmarks[0];
                    state.handLandmarks = landmarks;
                    
                    document.getElementById('hand-led').style.background = '#0f0';
                    document.getElementById('hand-led').style.boxShadow = '0 0 8px #0f0';
                    document.getElementById('hand-status').innerHTML = '✋ Рука обнаружена | 👆 Палец управляет курсором';
                    
                    // Получаем координаты кончика указательного пальца (индекс 8)
                    const indexTip = landmarks[8];
                    const thumbTip = landmarks[4];
                    
                    // Преобразование в экранные координаты
                    const cursorX = (1 - indexTip.x) * canvas.width;
                    const cursorY = indexTip.y * canvas.height;
                    
                    state.cursorPosition = { x: cursorX, y: cursorY };
                    
                    // Отрисовка скелета руки
                    const connections = [
                        [0,1], [1,2], [2,3], [3,4],
                        [0,5], [5,6], [6,7], [7,8],
                        [0,9], [9,10], [10,11], [11,12],
                        [0,13], [13,14], [14,15], [15,16],
                        [0,17], [17,18], [18,19], [19,20],
                        [5,9], [9,13], [13,17]
                    ];
                    
                    ctx.strokeStyle = '#00aaff';
                    ctx.lineWidth = 3;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#00aaff';
                    
                    for (let conn of connections) {
                        const start = landmarks[conn[0]];
                        const end = landmarks[conn[1]];
                        const startX = (1 - start.x) * canvas.width;
                        const startY = start.y * canvas.height;
                        const endX = (1 - end.x) * canvas.width;
                        const endY = end.y * canvas.height;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(endX, endY);
                        ctx.stroke();
                    }
                    
                    // Отрисовка суставов
                    for (let i = 0; i < landmarks.length; i++) {
                        const x = (1 - landmarks[i].x) * canvas.width;
                        const y = landmarks[i].y * canvas.height;
                        
                        ctx.beginPath();
                        ctx.arc(x, y, i === 8 ? 10 : 6, 0, 2 * Math.PI);
                        
                        if (i === 8) {
                            ctx.fillStyle = '#ffaa44';
                            ctx.shadowColor = '#ffaa44';
                        } else {
                            ctx.fillStyle = '#00aaff';
                            ctx.shadowColor = '#00aaff';
                        }
                        ctx.fill();
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                    
                    // Определение жеста pinch (расстояние между указательным и большим)
                    const distance = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                    const isPinching = distance < 0.06;
                    
                    // Визуализация курсора
                    ctx.beginPath();
                    ctx.arc(cursorX, cursorY, 18, 0, 2 * Math.PI);
                    ctx.fillStyle = isPinching ? 'rgba(0,255,136,0.5)' : 'rgba(0,170,255,0.4)';
                    ctx.fill();
                    ctx.strokeStyle = isPinching ? '#0f0' : '#00aaff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Дополнительный эффект для указательного пальца
                    ctx.beginPath();
                    ctx.arc(cursorX, cursorY, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = isPinching ? '#0f0' : '#00aaff';
                    ctx.fill();
                    
                    // Обработка жеста pinch для выбора окна
                    if (isPinching && !state.isPinching) {
                        state.isPinching = true;
                        state.pinchStartTime = Date.now();
                        document.getElementById('hand-status').innerHTML = '🤏 PINCH! Выбор объекта';
                        selectWindowAtPosition(cursorX, cursorY);
                        
                        setTimeout(() => {
                            state.isPinching = false;
                            document.getElementById('hand-status').innerHTML = '✋ Рука обнаружена | 👆 Палец управляет курсором';
                        }, 400);
                    }
                    
                } else {
                    state.handLandmarks = null;
                    document.getElementById('hand-led').style.background = '#ff4444';
                    document.getElementById('hand-led').style.boxShadow = '0 0 8px #ff4444';
                    document.getElementById('hand-status').innerHTML = '🤚 Рука не обнаружена | Покажите руку камере';
                }
            });
            
            if (videoElement) {
                const camera = new MediaCamera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 1280,
                    height: 720
                });
                camera.start();
            }
        }
        
        function selectWindowAtPosition(x, y) {
            // Визуальный эффект выбора
            const cursorDiv = document.createElement('div');
            cursorDiv.style.position = 'fixed';
            cursorDiv.style.left = x + 'px';
            cursorDiv.style.top = y + 'px';
            cursorDiv.style.width = '60px';
            cursorDiv.style.height = '60px';
            cursorDiv.style.borderRadius = '50%';
            cursorDiv.style.border = '2px solid #0f0';
            cursorDiv.style.transform = 'translate(-50%, -50%)';
            cursorDiv.style.pointerEvents = 'none';
            cursorDiv.style.zIndex = '1000';
            cursorDiv.style.animation = 'pulse 0.3s ease-out';
            document.body.appendChild(cursorDiv);
            setTimeout(() => cursorDiv.remove(), 300);
            
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindow) {
                        const prev = state.windows.find(w => w.id === state.activeWindow);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindow = win.id;
                    win.div.classList.add('active');
                    document.getElementById('status-text').innerHTML = `✅ Выбрано: ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('status-text').innerHTML = `Режим: ${state.controlMode === 'gesture' ? 'Жесты руками' : 'Тачпад'}`;
                    }, 1500);
                    return;
                }
            }
        }

        // ==================== ТАЧПАД ДЛЯ ТЕЛЕФОНА ====================
        function setupTouchControl() {
            let touchActive = false;
            
            document.addEventListener('touchmove', (e) => {
                if (state.controlMode === 'touch' && e.touches[0]) {
                    e.preventDefault();
                    state.cursorPosition = {
                        x: e.touches[0].clientX,
                        y: e.touches[0].clientY
                    };
                }
            });
            
            document.addEventListener('touchstart', (e) => {
                if (state.controlMode === 'touch' && e.touches[0]) {
                    selectWindowAtPosition(e.touches[0].clientX, e.touches[0].clientY);
                }
            });
            
            document.addEventListener('mousemove', (e) => {
                if (state.controlMode === 'touch') {
                    state.cursorPosition = { x: e.clientX, y: e.clientY };
                }
            });
            
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'touch') {
                    selectWindowAtPosition(e.clientX, e.clientY);
                }
            });
        }

        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        function setupModeSwitching() {
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    state.controlMode = mode;
                    
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.getElementById('status-text').innerHTML = `Режим: ${mode === 'gesture' ? 'Жесты руками' : 'Тачпад'}`;
                });
            });
        }

        // ==================== FULLSCREEN ====================
        function setupFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            btn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    btn.innerHTML = '✕';
                } else {
                    document.exitFullscreen();
                    btn.innerHTML = '⤢';
                }
            });
            
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    btn.innerHTML = '✕';
                } else {
                    btn.innerHTML = '⤢';
                }
            });
        }

        // ==================== UI КНОПКИ ====================
        function setupUI() {
            document.getElementById('add-browser').onclick = () => {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;
                createARWindow(x, y, z, '🌐 Vision Browser', { type: 'browser' }, 360, 320);
            };
            
            document.getElementById('add-video').onclick = () => {
                const input = document.getElementById('video-upload');
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const x = (Math.random() - 0.5) * 400;
                        const y = (Math.random() - 0.5) * 200;
                        const z = (Math.random() - 0.5) * 200;
                        createARWindow(x, y, z, '🎬 Видео', { type: 'video', file: e.target.files[0] }, 340, 300);
                    }
                };
                input.click();
            };
            
            document.getElementById('add-notes').onclick = () => {
                const x = (Math.random() - 0.5) * 400;
                const y = (Math.random() - 0.5) * 200;
                const z = (Math.random() - 0.5) * 200;
                createARWindow(x, y, z, '📝 AR Заметки', { type: 'notes' }, 320, 280);
            };
            
            document.getElementById('reset-view').onclick = () => {
                state.cameraPosition = { x: 0, y: 0, z: 0 };
                // Эффект сброса
                const overlay = document.createElement('div');
                overlay.style.position = 'fixed';
                overlay.style.top = '0';
                overlay.style.left = '0';
                overlay.style.width = '100%';
                overlay.style.height = '100%';
                overlay.style.background = 'rgba(0,170,255,0.2)';
                overlay.style.pointerEvents = 'none';
                overlay.style.zIndex = '1000';
                overlay.style.animation = 'fadeOut 0.5s ease-out';
                document.body.appendChild(overlay);
                setTimeout(() => overlay.remove(), 500);
            };
        }

        // Добавляем CSS анимацию
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; }
                100% { opacity: 0; }
            }
            @keyframes pulse {
                0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            const video = await setupCamera();
            if (video) {
                setupHandTracking(video);
            }
            setupTouchControl();
            setupModeSwitching();
            setupFullscreen();
            setupUI();
            updateWindowPositions();
            
            // Создаем окна, закрепленные в пространстве комнаты
            setTimeout(() => {
                createARWindow(-150, 80, -50, '🌐 Apple Vision', { type: 'browser' }, 360, 320);
                createARWindow(180, 60, -80, '🎬 Демо видео', { type: 'video' }, 340, 300);
                createARWindow(50, -120, -100, '📝 AR Заметки', { type: 'notes' }, 320, 280);
                createARWindow(-200, -50, -120, '🌐 Wikipedia', { type: 'browser' }, 340, 300);
                createARWindow(250, 150, -150, '🎬 Трейлер', { type: 'video' }, 330, 290);
            }, 800);
            
            // Ориентация
            function checkOrientation() {
                const warning = document.querySelector('.orientation-warning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            checkOrientation();
        }
        
        init();
    </script>
</body>
</html>
