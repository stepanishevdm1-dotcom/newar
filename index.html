<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apple Vision Pro Style AR Interface | Жесты + PS4 Джойстик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #000;
        }

        /* Загрузочный экран */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(40px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .vision-logo {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .progress-ring {
            width: 80px;
            height: 80px;
            margin: 20px;
        }

        .loader-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
        }

        /* Главный UI */
        .vision-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 200;
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: auto;
        }

        .vision-card {
            background: rgba(30,30,40,0.7);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 12px 24px;
            border: 0.5px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 6px;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 30px;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* AR Окна в стиле Vision Pro */
        .ar-window {
            position: absolute;
            background: rgba(20,20,30,0.75);
            backdrop-filter: blur(60px);
            border-radius: 32px;
            overflow: hidden;
            border: 0.5px solid rgba(255,255,255,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.1) inset;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .ar-window:hover {
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.5);
        }

        .ar-window.active {
            border-color: #00aaff;
            box-shadow: 0 0 40px rgba(0,170,255,0.3), 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .window-header {
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
        }

        .window-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.3px;
        }

        .window-controls {
            display: flex;
            gap: 16px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .window-controls span:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .close-btn { color: #ff6b6b; }
        .minimize-btn { color: #ffd93d; }

        .window-content {
            flex: 1;
            padding: 16px;
            overflow: auto;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }

        video {
            object-fit: contain;
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 16px;
            border-radius: 20px;
            border: 0.5px solid rgba(255,255,255,0.2);
            resize: none;
            font-family: -apple-system, monospace;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .game-canvas {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            cursor: pointer;
        }

        /* Курсор в стиле Vision Pro */
        #vision-cursor {
            position: fixed;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,170,255,0.4), rgba(0,170,255,0));
            border: 2px solid rgba(0,170,255,0.8);
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: all 0.05s linear;
            box-shadow: 0 0 20px rgba(0,170,255,0.5);
        }

        #vision-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            background: #00aaff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        #vision-cursor.active {
            transform: translate(-50%, -50%) scale(0.7);
            background: radial-gradient(circle, rgba(0,255,136,0.6), rgba(0,255,136,0));
            border-color: #0f0;
        }

        #vision-cursor.selecting {
            animation: cursorSelect 0.2s ease-out;
        }

        @keyframes cursorSelect {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* Скелет руки */
        #hand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 150;
        }

        /* Контроллер джойстика */
        .joystick-area {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 140px;
            height: 140px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(40px);
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 200;
            pointer-events: auto;
        }

        .joystick-thumb {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(100,100,255,0.8));
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(100,100,255,0.5);
        }

        .right-joystick {
            left: auto;
            right: 30px;
        }

        /* Кнопки действий */
        .action-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
        }

        .action-btn {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: rgba(30,30,40,0.8);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:active {
            transform: scale(0.9);
        }

        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
            }
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="vision-logo">VISION PRO</div>
        <div class="progress-ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
                <circle id="progress-circle" cx="40" cy="40" r="35" fill="none" stroke="#00aaff" stroke-width="2" stroke-dasharray="220" stroke-dashoffset="220" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="loader-text" id="loader-text">Загрузка AR пространства...</div>
    </div>

    <div class="orientation-warning">
        <div>👓 Поверните устройство горизонтально</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div class="vision-ui">
        <div class="top-bar">
            <div class="vision-card">
                <span>👓 VISION PRO AR</span>
            </div>
            <div class="mode-selector" id="mode-selector">
                <button class="mode-btn active" data-mode="gesture">✋ Жесты</button>
                <button class="mode-btn" data-mode="gamepad">🎮 Джойстик</button>
            </div>
            <div class="vision-card status-indicator">
                <div class="led"></div>
                <span id="status-text">Режим: Жесты</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" id="add-browser">🌐</button>
            <button class="action-btn" id="add-video">🎬</button>
            <button class="action-btn" id="add-notes">📝</button>
            <button class="action-btn" id="reset-view">🔄</button>
        </div>
    </div>

    <div id="vision-cursor"></div>
    <canvas id="hand-canvas"></canvas>
    <input type="file" id="video-upload" accept="video/*" style="display: none">

    <script>
        // ==================== ПРОГРЕСС ЗАГРУЗКИ ====================
        let progress = 0;
        const circle = document.getElementById('progress-circle');
        const texts = [
            'Калибровка AR пространства...',
            'Активация камеры...',
            'Загрузка нейросети жестов...',
            'Поиск контроллеров...',
            'Готово к работе!'
        ];
        
        const interval = setInterval(() => {
            progress += 8;
            const dashoffset = 220 - (220 * progress / 100);
            circle.style.strokeDashoffset = dashoffset;
            const idx = Math.min(Math.floor(progress / 20), texts.length - 1);
            document.getElementById('loader-text').textContent = texts[idx];
            
            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').remove(), 1000);
                }, 300);
            }
        }, 120);

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            controlMode: 'gesture',
            cameraActive: false,
            windows: [],
            activeWindow: null,
            cursorPosition: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
            cameraPosition: { x: 0, y: 1.5, z: 5 },
            gamepad: null,
            gamepadConnected: false,
            handLandmarks: null,
            isPinching: false,
            nextWindowId: 1,
            lastButtons: {}
        };

        // ==================== AR ОКНА В СТИЛЕ VISION PRO ====================
        function createARWindow(x, y, z, title, content, width = 320, height = 280) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width}px`;
            div.style.height = `${height}px`;
            div.style.left = '50%';
            div.style.top = '50%';
            div.style.transform = 'translate(-50%, -50%)';
            div.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            
            const contentId = `win-${Date.now()}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.body.appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.apple.com/visionos/';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.borderRadius = '16px';
                contentDiv.appendChild(iframe);
            } 
            else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.borderRadius = '16px';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            }
            else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '✨ Vision Pro AR Заметки\n\n• Окна парят в пространстве\n• Управляйте жестами или джойстиком\n• Как в Apple Vision Pro\n• Полное погружение в AR';
                contentDiv.appendChild(textarea);
            }
            else if (content.type === 'game') {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 300;
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.borderRadius = '16px';
                canvas.style.cursor = 'pointer';
                contentDiv.appendChild(canvas);
                
                let score = 0;
                const ctx = canvas.getContext('2d');
                
                function drawGame() {
                    const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                    grad.addColorStop(0, '#667eea');
                    grad.addColorStop(1, '#764ba2');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 28px -apple-system';
                    ctx.fillText(`${score}`, canvas.width/2 - 15, 60);
                    ctx.font = '16px -apple-system';
                    ctx.fillText('очков', canvas.width/2 - 28, 95);
                    
                    ctx.fillStyle = '#ffd93d';
                    ctx.shadowBlur = 20;
                    ctx.fillRect(canvas.width/2 - 45, canvas.height/2 - 45, 90, 90);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 18px -apple-system';
                    ctx.fillText('КЛИК', canvas.width/2 - 20, canvas.height/2 + 5);
                    ctx.shadowBlur = 0;
                }
                drawGame();
                
                canvas.addEventListener('click', () => {
                    score++;
                    drawGame();
                });
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.div !== div);
                if (state.activeWindow === div.id) state.activeWindow = null;
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = {
                id: state.nextWindowId,
                div,
                title,
                x, y, z,
                width, height,
                element: div
            };
            state.windows.push(windowObj);
            state.nextWindowId++;
            
            // Анимация появления
            div.style.opacity = '0';
            div.style.transform = 'translate(-50%, -50%) scale(0.9)';
            setTimeout(() => {
                div.style.opacity = '1';
                div.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 10);
            
            return windowObj;
        }

        // ==================== КАМЕРА AR ФОН ====================
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                video.style.position = 'fixed';
                video.style.top = '0';
                video.style.left = '0';
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'cover';
                video.style.zIndex = '-1';
                document.body.insertBefore(video, document.body.firstChild);
                state.cameraActive = true;
                return true;
            } catch (err) {
                console.log('Camera not available');
                return false;
            }
        }

        // ==================== ОТСЛЕЖИВАНИЕ ЖЕСТОВ (MediaPipe стиль) ====================
        function setupHandTracking() {
            const canvas = document.getElementById('hand-canvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Симуляция отслеживания руки через мышь/тач (для демо)
            // В реальном проекте здесь был бы MediaPipe
            let handX = 0, handY = 0;
            let handVisible = false;
            
            document.addEventListener('mousemove', (e) => {
                if (state.controlMode === 'gesture') {
                    handX = e.clientX;
                    handY = e.clientY;
                    handVisible = true;
                    state.cursorPosition = { x: handX, y: handY };
                    updateCursorPosition(handX, handY);
                }
            });
            
            document.addEventListener('touchmove', (e) => {
                if (state.controlMode === 'gesture' && e.touches[0]) {
                    handX = e.touches[0].clientX;
                    handY = e.touches[0].clientY;
                    handVisible = true;
                    state.cursorPosition = { x: handX, y: handY };
                    updateCursorPosition(handX, handY);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'gesture') {
                    selectWindowAtPosition(e.clientX, e.clientY);
                }
            });
            
            function drawSkeleton() {
                if (!handVisible || state.controlMode !== 'gesture') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    requestAnimationFrame(drawSkeleton);
                    return;
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем красивый скелет руки в стиле Vision Pro
                const fingers = [
                    [[-15, -20], [-10, -35], [-5, -45], [0, -50]],
                    [[-5, -15], [0, -30], [5, -40], [10, -45]],
                    [[5, -12], [10, -25], [15, -35], [20, -38]],
                    [[12, -8], [18, -18], [24, -28], [28, -30]],
                    [[18, -5], [24, -12], [30, -20], [35, -22]]
                ];
                
                ctx.save();
                ctx.translate(handX, handY);
                ctx.scale(0.8, 0.8);
                
                // Ладонь
                ctx.beginPath();
                ctx.ellipse(0, 0, 25, 35, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,170,255,0.3)';
                ctx.fill();
                ctx.strokeStyle = '#00aaff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Пальцы
                fingers.forEach(finger => {
                    ctx.beginPath();
                    ctx.moveTo(finger[0][0], finger[0][1]);
                    for (let i = 1; i < finger.length; i++) {
                        ctx.lineTo(finger[i][0], finger[i][1]);
                    }
                    ctx.strokeStyle = '#00aaff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Суставы
                    finger.forEach(point => {
                        ctx.beginPath();
                        ctx.arc(point[0], point[1], 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#00aaff';
                        ctx.fill();
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = '#00aaff';
                    });
                });
                
                // Кончик указательного пальца - курсор
                const indexTip = fingers[1][3];
                ctx.beginPath();
                ctx.arc(indexTip[0], indexTip[1], 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,255,136,0.8)';
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0f0';
                
                ctx.restore();
                requestAnimationFrame(drawSkeleton);
            }
            
            drawSkeleton();
        }
        
        function updateCursorPosition(x, y) {
            const cursor = document.getElementById('vision-cursor');
            cursor.style.left = x + 'px';
            cursor.style.top = y + 'px';
        }
        
        function selectWindowAtPosition(x, y) {
            const cursor = document.getElementById('vision-cursor');
            cursor.classList.add('selecting');
            setTimeout(() => cursor.classList.remove('selecting'), 200);
            
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindow) {
                        const prev = state.windows.find(w => w.id === state.activeWindow);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindow = win.id;
                    win.div.classList.add('active');
                    document.getElementById('status-text').innerHTML = `✅ Выбрано: ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('status-text').innerHTML = `Режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Джойстик'}`;
                    }, 1500);
                    return;
                }
            }
        }

        // ==================== PS4 ДЖОЙСТИК ====================
        function setupGamepad() {
            function updateGamepad() {
                const gamepads = navigator.getGamepads();
                let found = false;
                
                for (let i = 0; i < gamepads.length; i++) {
                    const gp = gamepads[i];
                    if (gp && (gp.id.includes('PS4') || gp.id.includes('Wireless') || gp.id.includes('DualShock') || gp.id.includes('Xbox'))) {
                        found = true;
                        if (!state.gamepadConnected) {
                            state.gamepadConnected = true;
                            document.getElementById('status-text').innerHTML = '🎮 PS4 подключен';
                        }
                        state.gamepad = gp;
                        
                        if (state.controlMode === 'gamepad') {
                            // Левый стик - перемещение камеры
                            const leftX = gp.axes[0] || 0;
                            const leftY = gp.axes[1] || 0;
                            if (Math.abs(leftX) > 0.1 || Math.abs(leftY) > 0.1) {
                                state.cameraPosition.x += leftX * 0.08;
                                state.cameraPosition.z += leftY * 0.08;
                                state.cameraPosition.x = Math.max(-5, Math.min(5, state.cameraPosition.x));
                                state.cameraPosition.z = Math.max(2, Math.min(8, state.cameraPosition.z));
                            }
                            
                            // Правый стик - курсор
                            const rightX = gp.axes[2] || 0;
                            const rightY = gp.axes[3] || 0;
                            if (Math.abs(rightX) > 0.1 || Math.abs(rightY) > 0.1) {
                                state.cursorPosition.x += rightX * 12;
                                state.cursorPosition.y += rightY * 12;
                                state.cursorPosition.x = Math.max(0, Math.min(window.innerWidth, state.cursorPosition.x));
                                state.cursorPosition.y = Math.max(0, Math.min(window.innerHeight, state.cursorPosition.y));
                                updateCursorPosition(state.cursorPosition.x, state.cursorPosition.y);
                            }
                            
                            // Кнопки
                            const buttons = gp.buttons;
                            
                            if (buttons[0] && buttons[0].pressed && !state.lastButtons[0]) {
                                selectWindowAtPosition(state.cursorPosition.x, state.cursorPosition.y);
                            }
                            state.lastButtons[0] = buttons[0] && buttons[0].pressed;
                            
                            if (buttons[2] && buttons[2].pressed && !state.lastButtons[2]) {
                                if (state.activeWindow) {
                                    const win = state.windows.find(w => w.id === state.activeWindow);
                                    if (win) {
                                        win.div.remove();
                                        state.windows = state.windows.filter(w => w.id !== state.activeWindow);
                                        state.activeWindow = null;
                                    }
                                }
                            }
                            state.lastButtons[2] = buttons[2] && buttons[2].pressed;
                            
                            if (buttons[3] && buttons[3].pressed && !state.lastButtons[3]) {
                                const x = (Math.random() - 0.5) * 400;
                                const y = (Math.random() - 0.5) * 200;
                                createARWindow(x, 0, y, '🌐 Браузер', { type: 'browser' }, 340, 300);
                            }
                            state.lastButtons[3] = buttons[3] && buttons[3].pressed;
                            
                            if (buttons[1] && buttons[1].pressed && !state.lastButtons[1]) {
                                const x = (Math.random() - 0.5) * 400;
                                const y = (Math.random() - 0.5) * 200;
                                createARWindow(x, 0, y, '🎬 Видео', { type: 'video' }, 320, 280);
                            }
                            state.lastButtons[1] = buttons[1] && buttons[1].pressed;
                        }
                        break;
                    }
                }
                
                if (!found && state.gamepadConnected) {
                    state.gamepadConnected = false;
                    if (state.controlMode === 'gamepad') {
                        document.getElementById('status-text').innerHTML = 'Джойстик не найден';
                    }
                }
                
                requestAnimationFrame(updateGamepad);
            }
            
            updateGamepad();
            
            window.addEventListener('gamepadconnected', (e) => {
                console.log('Gamepad connected:', e.gamepad.id);
                if (state.controlMode === 'gamepad') {
                    document.getElementById('status-text').innerHTML = `🎮 ${e.gamepad.id.substring(0, 20)}`;
                }
            });
        }

        // ==================== ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ ====================
        function setupModeSwitching() {
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const mode = btn.dataset.mode;
                    state.controlMode = mode;
                    
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    document.getElementById('status-text').innerHTML = `Режим: ${mode === 'gesture' ? '✋ Жесты' : '🎮 Джойстик'}`;
                    
                    if (mode === 'gesture') {
                        document.getElementById('vision-cursor').style.display = 'block';
                    } else {
                        document.getElementById('vision-cursor').style.display = 'block';
                    }
                });
            });
        }

        // ==================== UI КНОПКИ ====================
        function setupUI() {
            document.getElementById('add-browser').onclick = () => {
                const x = (Math.random() - 0.5) * 500;
                const y = (Math.random() - 0.5) * 300;
                createARWindow(x, 0, y, '🌐 Safari Style', { type: 'browser' }, 360, 320);
            };
            
            document.getElementById('add-video').onclick = () => {
                const input = document.getElementById('video-upload');
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const x = (Math.random() - 0.5) * 500;
                        const y = (Math.random() - 0.5) * 300;
                        createARWindow(x, 0, y, '🎬 Видео', { type: 'video', file: e.target.files[0] }, 340, 300);
                    }
                };
                input.click();
            };
            
            document.getElementById('add-notes').onclick = () => {
                const x = (Math.random() - 0.5) * 500;
                const y = (Math.random() - 0.5) * 300;
                createARWindow(x, 0, y, '📝 AR Заметки', { type: 'notes' }, 300, 280);
            };
            
            document.getElementById('reset-view').onclick = () => {
                state.cameraPosition = { x: 0, y: 1.5, z: 5 };
                // Анимация сброса
                const cursor = document.getElementById('vision-cursor');
                cursor.style.transform = 'translate(-50%, -50%) scale(1.2)';
                setTimeout(() => cursor.style.transform = 'translate(-50%, -50%)', 200);
            };
        }

        // ==================== 3D ПЕРСПЕКТИВА ====================
        function setup3DPerspective() {
            const update3DPosition = () => {
                state.windows.forEach(win => {
                    const scale = 200 / (win.z + 8);
                    const screenX = window.innerWidth / 2 + (win.x - state.cameraPosition.x) * 60 * scale;
                    const screenY = window.innerHeight / 2 + (win.y - state.cameraPosition.y) * 60 * scale;
                    
                    win.div.style.transform = `translate(${screenX - win.width/2}px, ${screenY - win.height/2}px) scale(${scale})`;
                    win.div.style.opacity = Math.min(1, scale * 1.2);
                });
                requestAnimationFrame(update3DPosition);
            };
            update3DPosition();
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await setupCamera();
            setupHandTracking();
            setupGamepad();
            setupModeSwitching();
            setupUI();
            setup3DPerspective();
            
            // Создаем начальные окна в стиле Vision Pro
            setTimeout(() => {
                createARWindow(-180, 0, -2, '🌐 Apple Vision', { type: 'browser' }, 360, 320);
                createARWindow(180, 0, -2.5, '🎬 Демо ролик', { type: 'video' }, 340, 300);
                createARWindow(0, -80, -3, '📝 AR Заметки', { type: 'notes' }, 320, 280);
                createARWindow(-200, 120, -4, '🎮 Игра', { type: 'game' }, 300, 280);
                createARWindow(200, 100, -3.5, '🌐 Википедия', { type: 'browser', url: 'https://wikipedia.org' }, 340, 300);
            }, 500);
            
            // Ориентация
            function checkOrientation() {
                const warning = document.querySelector('.orientation-warning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            checkOrientation();
            
            // Инициализация курсора
            updateCursorPosition(window.innerWidth / 2, window.innerHeight / 2);
        }
        
        init();
    </script>
</body>
