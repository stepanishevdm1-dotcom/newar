<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BEAT SABER — второй телефон как гироскоп</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; z-index: 100; display: flex; justify-content: space-between; pointer-events: none; }
        .status { background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 30px; color: #0f0; font-size: 12px; }
        .score { background: rgba(0,0,0,0.8); padding: 8px 16px; border-radius: 30px; color: #ff44cc; font-weight: bold; font-size: 22px; }
        .panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.95);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            z-index: 200;
        }
        button {
            background: linear-gradient(135deg, #ff3366, #ff6699);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
        }
        .btn-green { background: linear-gradient(135deg, #33cc66, #66ff99); }
        .qr {
            background: white;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 15px auto;
        }
        .gyro-value { font-size: 48px; font-weight: bold; color: #ffaa33; margin: 10px 0; }
        .instruction { font-size: 12px; color: #aaa; }
        .mode-selector {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            z-index: 300;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">⚡ BEAT SABER</div>
        <div class="score" id="score">0</div>
    </div>

    <div id="modeSelector" class="mode-selector">
        <button id="screenBtn" class="btn-green">🖥️ ЭКРАН</button>
        <button id="controllerBtn">🎮 ПУЛЬТ</button>
    </div>

    <div id="screenPanel" class="panel" style="display: none;">
        <div style="font-size: 20px;">🖥️ ОТСКАНИРУЙ QR ПУЛЬТОМ</div>
        <div id="qrContainer" class="qr"></div>
        <div id="screenStatus">⏳ Ожидание подключения...</div>
        <div class="instruction">🔹 На пульте нажми "ПУЛЬТ" и наведи камеру на QR</div>
    </div>

    <div id="controllerPanel" class="panel" style="display: none;">
        <div style="font-size: 20px;">🎮 НАВЕДИ КАМЕРУ НА QR</div>
        <div id="controllerStatus"></div>
        <div class="gyro-value" id="gyroAngle">0°</div>
        <div class="instruction">📱 НАКЛОНЯЙ ТЕЛЕФОН → МЕЧ ДВИГАЕТСЯ</div>
        <button id="scanQrBtn" class="btn-green">📷 ОТКРЫТЬ КАМЕРУ ДЛЯ QR</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let mode = null;
        let score = 0;
        let cubes = [];
        let saberAngle = 0;
        let ws = null;
        let roomId = Math.random().toString(36).substring(2, 8);

        // DOM
        const statusDiv = document.getElementById('status');
        const scoreDiv = document.getElementById('score');
        const modeSelector = document.getElementById('modeSelector');
        const screenPanel = document.getElementById('screenPanel');
        const controllerPanel = document.getElementById('controllerPanel');
        const screenStatus = document.getElementById('screenStatus');
        const controllerStatus = document.getElementById('controllerStatus');
        const gyroAngleSpan = document.getElementById('gyroAngle');
        const qrContainer = document.getElementById('qrContainer');

        // === 3D СЦЕНА ===
        function init3D() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.02);

            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.8, 6);
            camera.lookAt(0, 1.5, -2);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Свет
            const ambient = new THREE.AmbientLight(0x222233);
            scene.add(ambient);
            const light = new THREE.PointLight(0xff66cc, 0.8);
            light.position.set(2, 4, 3);
            scene.add(light);

            // Пол
            const grid = new THREE.GridHelper(12, 12, 0xff33cc, 0x33ff66);
            grid.position.y = -1.2;
            scene.add(grid);

            // МЕЧ
            const saberGroup = new THREE.Group();
            const blade = new THREE.Mesh(
                new THREE.CylinderGeometry(0.07, 0.12, 1.6, 12),
                new THREE.MeshStandardMaterial({ color: 0xff2266, emissive: 0xff0044, emissiveIntensity: 1.2 })
            );
            blade.position.y = 0.8;
            saberGroup.add(blade);
            
            const handle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.14, 0.14, 0.5, 8),
                new THREE.MeshStandardMaterial({ color: 0xccaa88 })
            );
            handle.position.y = -0.15;
            saberGroup.add(handle);
            
            saberGroup.position.set(0, 0.8, 3.5);
            scene.add(saberGroup);

            // Звёзды
            const stars = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
            const starPos = [];
            for (let i = 0; i < 1500; i++) starPos.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 80 - 40);
            stars.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
            scene.add(stars);

            // Генерация кубов
            setInterval(() => {
                if (mode === 'screen') {
                    const size = 0.55;
                    const cube = new THREE.Mesh(
                        new THREE.BoxGeometry(size, size, size),
                        new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0x441111 })
                    );
                    cube.position.set((Math.random() - 0.5) * 4, 0.5 + Math.random() * 2.5, -8);
                    cube.userData = { speed: 5 };
                    scene.add(cube);
                    cubes.push(cube);
                }
            }, 600);

            function animate() {
                if (mode !== 'screen') return;
                for (let i = cubes.length-1; i >= 0; i--) {
                    const cube = cubes[i];
                    cube.position.z += cube.userData.speed * 0.035;
                    cube.rotation.x += 0.05;
                    
                    const angleToCube = Math.atan2(cube.position.x, 3) * 57.3;
                    if (Math.abs(saberAngle - angleToCube) < 25 && cube.position.z > -2 && cube.position.z < 3) {
                        scene.remove(cube);
                        cubes.splice(i,1);
                        score += 10;
                        scoreDiv.innerHTML = score;
                        statusDiv.innerHTML = `⚡ SLICE!`;
                        setTimeout(() => statusDiv.innerHTML = 'BEAT SABER', 300);
                    }
                    if (cube.position.z > 4) {
                        scene.remove(cube);
                        cubes.splice(i,1);
                    }
                }
                saberGroup.rotation.z = -saberAngle * Math.PI / 180 * 0.8;
                stars.rotation.y += 0.002;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // === ВЕБ СОКЕТ ЧЕРЕЗ PUBLIC СЕРВЕР ===
        function startWebSocketServer() {
            const wsUrl = `wss://echo.websocket.org`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                screenStatus.innerHTML = '✅ Пульт подключён! Наклоняйте второй телефон';
                statusDiv.innerHTML = '🎯 ПУЛЬТ ПОДКЛЮЧЁН';
            };
            ws.onmessage = (e) => {
                const angle = parseFloat(e.data);
                if (!isNaN(angle)) saberAngle = Math.max(-45, Math.min(45, angle));
            };
            ws.onerror = () => {
                screenStatus.innerHTML = '⚠️ Нет интернета. Используй локальный режим.';
            };
        }

        function startWebSocketClient() {
            const wsUrl = `wss://echo.websocket.org`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                controllerStatus.innerHTML = '✅ ПОДКЛЮЧЕНО! Наклоняй телефон';
                startGyro();
            };
            ws.onerror = () => {
                controllerStatus.innerHTML = '❌ Нет интернета. Включи Wi-Fi.';
            };
        }

        function startGyro() {
            const sendAngle = (angle) => {
                if (ws && ws.readyState === WebSocket.OPEN) ws.send(angle.toString());
            };
            if (typeof DeviceOrientationEvent !== 'undefined') {
                const handleGyro = (e) => {
                    const gamma = e.gamma || 0;
                    const angle = Math.max(-45, Math.min(45, gamma));
                    gyroAngleSpan.innerHTML = `${Math.round(angle)}°`;
                    sendAngle(angle);
                };
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    controllerStatus.innerHTML = '🎮 Нажми для разрешения гироскопа';
                    const request = () => {
                        DeviceOrientationEvent.requestPermission().then(() => {
                            window.addEventListener('deviceorientation', handleGyro);
                            controllerStatus.innerHTML = '✅ ГИРОСКОП АКТИВЕН';
                        });
                        document.removeEventListener('click', request);
                    };
                    document.addEventListener('click', request);
                } else {
                    window.addEventListener('deviceorientation', handleGyro);
                }
            }
        }

        // === QR КОД ===
        function showQR() {
            qrContainer.innerHTML = '';
            const url = window.location.href.split('?')[0] + '?mode=controller';
            new QRCode(qrContainer, { text: url, width: 200, height: 200 });
        }

        // === ВЫБОР РЕЖИМА ===
        document.getElementById('screenBtn').onclick = () => {
            mode = 'screen';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'block';
            controllerPanel.style.display = 'none';
            init3D();
            showQR();
            startWebSocketServer();
            statusDiv.innerHTML = '🖥️ ЭКРАН';
        };

        document.getElementById('controllerBtn').onclick = () => {
            mode = 'controller';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'none';
            controllerPanel.style.display = 'block';
            statusDiv.innerHTML = '🎮 ПУЛЬТ';
            
            document.getElementById('scanQrBtn').onclick = () => {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    window.location.href = window.location.href.split('?')[0] + '?mode=controller';
                    startWebSocketClient();
                } else {
                    controllerStatus.innerHTML = '❌ Камера не поддерживается. Введи адрес вручную.';
                }
            };
        };

        // Автозапуск если есть параметр
        if (window.location.search.includes('mode=controller')) {
            document.getElementById('controllerBtn').click();
        }
    </script>
</body>
</html>
