<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BLUETOOTH SABER — полный контроль</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .status {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
        }
        .score {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ff44cc;
            font-weight: bold;
            font-size: 20px;
        }
        .panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            z-index: 200;
            border: 1px solid rgba(255,255,255,0.2);
        }
        button {
            background: linear-gradient(135deg, #ff3366, #ff6699);
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 18px;
            margin: 8px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 0 12px rgba(255,51,102,0.5);
        }
        button:active { transform: scale(0.96); }
        .btn-green { background: linear-gradient(135deg, #33cc66, #66ff99); box-shadow: 0 0 12px rgba(51,204,102,0.5); }
        .btn-blue { background: linear-gradient(135deg, #3399ff, #66ccff); box-shadow: 0 0 12px rgba(51,153,255,0.5); }
        .mode-selector {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            z-index: 300;
        }
        .gyro-value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffaa33, #ffdd88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 10px 0;
        }
        .device-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 15px 0;
            text-align: left;
        }
        .device-item {
            background: #1a1a2e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            cursor: pointer;
            color: white;
        }
        .device-item:hover { background: #2a2a4e; }
        .instruction {
            font-size: 11px;
            color: #aaa;
            margin-top: 12px;
        }
        @media (max-width: 600px) {
            .gyro-value { font-size: 36px; }
            button { padding: 10px 18px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">⚡ BLUETOOTH SABER</div>
        <div class="score" id="score">💥 0</div>
    </div>

    <div id="modeSelector" class="mode-selector">
        <button id="screenBtn" class="btn-green">🖥️ Я ЭКРАН (игра)</button>
        <button id="controllerBtn" class="btn-blue">🎮 Я ПУЛЬТ (гироскоп)</button>
    </div>

    <!-- Панель экрана -->
    <div id="screenPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🖥️ РЕЖИМ ЭКРАНА</div>
        <button id="startServerBtn" class="btn-green">📡 ЗАПУСТИТЬ BLUETOOTH СЕРВЕР</button>
        <div id="screenStatus">⏳ Ожидание подключения пульта...</div>
        <div class="instruction">🔹 На пульте нажмите "Поиск устройств" и выберите этот телефон</div>
    </div>

    <!-- Панель пульта -->
    <div id="controllerPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🎮 РЕЖИМ ПУЛЬТА</div>
        <button id="scanBtn" class="btn-blue">🔍 ПОИСК BLUETOOTH УСТРОЙСТВ</button>
        <div id="deviceList" class="device-list" style="display: none;"></div>
        <div id="controllerStatus"></div>
        <div class="gyro-value" id="gyroAngle">0°</div>
        <div class="instruction">📱 НАКЛОНЯЙТЕ ТЕЛЕФОН ВЛЕВО/ВПРАВО → луч двигается</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let mode = null;  // 'screen' или 'controller'
        let score = 0;
        let cubes = [];
        let saberAngle = 0;
        
        // Bluetooth
        let bluetoothDevice = null;
        let bluetoothServer = null;
        let bluetoothService = null;
        let bluetoothCharacteristic = null;
        let isConnected = false;
        
        // DOM
        const statusDiv = document.getElementById('status');
        const scoreDiv = document.getElementById('score');
        const modeSelector = document.getElementById('modeSelector');
        const screenPanel = document.getElementById('screenPanel');
        const controllerPanel = document.getElementById('controllerPanel');
        const screenStatus = document.getElementById('screenStatus');
        const controllerStatus = document.getElementById('controllerStatus');
        const gyroAngleSpan = document.getElementById('gyroAngle');
        const scanBtn = document.getElementById('scanBtn');
        const startServerBtn = document.getElementById('startServerBtn');
        const deviceListDiv = document.getElementById('deviceList');
        
        // ========== 3D СЦЕНА (ТОЛЬКО ДЛЯ ЭКРАНА) ==========
        let scene, camera, renderer, saberGroup, ring;
        
        function initGameScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.02);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2.5, 8);
            camera.lookAt(0, 1.5, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Неоновое освещение
            const ambient = new THREE.AmbientLight(0x111122);
            scene.add(ambient);
            const light = new THREE.PointLight(0xff66cc, 0.7);
            light.position.set(2, 4, 3);
            scene.add(light);
            
            // Сетка
            const grid = new THREE.GridHelper(20, 20, 0xff33cc, 0x33ff66);
            grid.position.y = -1.8;
            grid.material.transparent = true;
            grid.material.opacity = 0.5;
            scene.add(grid);
            
            // Кольцо
            ring = new THREE.Mesh(
                new THREE.TorusGeometry(3.8, 0.08, 64, 200),
                new THREE.MeshStandardMaterial({ color: 0xff33cc, emissive: 0xff1199, emissiveIntensity: 0.7 })
            );
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -1.6;
            scene.add(ring);
            
            // ЛУЧ (яркий)
            const saberGroupObj = new THREE.Group();
            const blade = new THREE.Mesh(
                new THREE.CylinderGeometry(0.07, 0.12, 1.8, 16),
                new THREE.MeshStandardMaterial({ color: 0xff2266, emissive: 0xff0044, emissiveIntensity: 1.2 })
            );
            blade.position.y = 0.9;
            saberGroupObj.add(blade);
            
            const core = new THREE.Mesh(
                new THREE.CylinderGeometry(0.04, 0.07, 1.75, 8),
                new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0xff6600, emissiveIntensity: 1.5 })
            );
            core.position.y = 0.9;
            saberGroupObj.add(core);
            
            const handle = new THREE.Mesh(
                new THREE.CylinderGeometry(0.14, 0.14, 0.5, 8),
                new THREE.MeshStandardMaterial({ color: 0xccaa88, metalness: 0.8 })
            );
            handle.position.y = -0.2;
            saberGroupObj.add(handle);
            
            saberGroupObj.position.set(0, 0.8, 3.5);
            scene.add(saberGroupObj);
            saberGroup = saberGroupObj;
            
            // Звёзды
            const stars = new THREE.Points(
                new THREE.BufferGeometry(),
                new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 })
            );
            const starPos = [];
            for (let i = 0; i < 1500; i++) {
                starPos.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 100, (Math.random() - 0.5) * 80 - 30);
            }
            stars.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
            scene.add(stars);
            
            // Генерация кубов (летят снизу вверх)
            setInterval(() => {
                if (mode === 'screen') spawnCube();
            }, 650);
            
            function animate() {
                if (mode !== 'screen') return;
                
                // Обновляем кубы
                for (let i = cubes.length-1; i >= 0; i--) {
                    const cube = cubes[i];
                    cube.position.y += cube.userData.speed * 0.035;
                    cube.rotation.x += 0.05;
                    cube.rotation.z += 0.06;
                    
                    // Попадание лучом
                    const cubeX = cube.position.x;
                    const cubeY = cube.position.y;
                    const angleToCube = Math.atan2(cubeX, 2) * 57.3;
                    const distance = Math.abs(cubeX) + Math.abs(cubeY - 1);
                    
                    if (Math.abs(saberAngle - angleToCube) < 28 && distance < 1.3 && cube.position.y > -1 && cube.position.y < 2.8) {
                        scene.remove(cube);
                        cubes.splice(i,1);
                        score += 10;
                        scoreDiv.innerHTML = `💥 ${score}`;
                        statusDiv.innerHTML = `⚡ РАЗРУБ! +10`;
                        setTimeout(() => statusDiv.innerHTML = '🖥️ BLUETOOTH SABER', 500);
                        continue;
                    }
                    
                    if (cube.position.y > 4.5) {
                        scene.remove(cube);
                        cubes.splice(i,1);
                    }
                }
                
                // Вращение луча
                if (saberGroup) {
                    saberGroup.rotation.z = -saberAngle * Math.PI / 180 * 0.8;
                }
                if (ring) ring.rotation.z += 0.008;
                stars.rotation.y += 0.002;
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function spawnCube() {
            const size = 0.5 + Math.random() * 0.45;
            const colors = [0xff3366, 0x33ff66, 0xffaa33, 0xaa44ff, 0xff44aa];
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(size, size, size),
                new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], emissive: 0x331100, emissiveIntensity: 0.4 })
            );
            cube.position.set((Math.random() - 0.5) * 5, -2.8, (Math.random() - 0.5) * 3);
            cube.userData = { speed: 1.2 + Math.random() * 1.8 };
            scene.add(cube);
            cubes.push(cube);
        }
        
        // ========== BLUETOOTH ДЛЯ ЭКРАНА (СЕРВЕР) ==========
        // ВНИМАНИЕ: Web Bluetooth НЕ может быть сервером. Поэтому используем альтернативу:
        // Экран будет подключаться к пульту как клиент, а пульт будет сервером.
        // Но для простоты: экран ищет пульт и подключается к нему.
        
        async function startBluetoothServer() {
            screenStatus.innerHTML = '🔍 Поиск пульта...';
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Saber' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                
                screenStatus.innerHTML = `🔗 Подключение к ${device.name}...`;
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = event.target.value;
                    if (value) {
                        const angle = value.getUint8(0);
                        const mappedAngle = (angle / 180) * 100 - 50;
                        saberAngle = Math.max(-50, Math.min(50, mappedAngle));
                        statusDiv.innerHTML = `🎯 Луч: ${Math.round(saberAngle)}°`;
                    }
                });
                
                isConnected = true;
                screenStatus.innerHTML = '✅ ПУЛЬТ ПОДКЛЮЧЁН! Наклоняйте второй телефон';
                statusDiv.innerHTML = '✅ Пульт подключён';
            } catch (error) {
                screenStatus.innerHTML = `❌ Ошибка: ${error.message}`;
                console.error(error);
            }
        }
        
        // ========== BLUETOOTH ДЛЯ ПУЛЬТА (КЛИЕНТ) ==========
        let bluetoothInterval = null;
        
        async function startBluetoothController() {
            controllerStatus.innerHTML = '🔍 Поиск экрана...';
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Saber' }],
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                
                controllerStatus.innerHTML = `🔗 Подключение к ${device.name}...`;
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                const characteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                isConnected = true;
                controllerStatus.innerHTML = '✅ ПОДКЛЮЧЕНО! Наклоняйте телефон';
                
                // Запускаем гироскоп
                startGyroForController(characteristic);
            } catch (error) {
                controllerStatus.innerHTML = `❌ Ошибка: ${error.message}`;
                console.error(error);
            }
        }
        
        function startGyroForController(characteristic) {
            let lastAngle = 0;
            
            const sendAngle = (angle) => {
                if (characteristic && isConnected) {
                    const byteValue = Math.floor(((angle + 50) / 100) * 180);
                    characteristic.writeValue(new Uint8Array([byteValue])).catch(e => {});
                }
            };
            
            if (typeof DeviceOrientationEvent !== 'undefined') {
                const handleGyro = (e) => {
                    if (!isConnected) return;
                    const gamma = e.gamma || 0;
                    const angle = Math.max(-50, Math.min(50, gamma));
                    gyroAngleSpan.innerHTML = `${Math.round(angle)}°`;
                    lastAngle = angle;
                    sendAngle(angle);
                };
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    controllerStatus.innerHTML = '🎮 Нажмите для разрешения гироскопа';
                    const requestGyro = () => {
                        DeviceOrientationEvent.requestPermission().then(() => {
                            window.addEventListener('deviceorientation', handleGyro);
                            controllerStatus.innerHTML = '✅ ГИРОСКОП АКТИВЕН! Наклоняйте телефон';
                        }).catch(() => {
                            controllerStatus.innerHTML = '❌ Нет доступа к гироскопу';
                        });
                        document.removeEventListener('click', requestGyro);
                    };
                    document.addEventListener('click', requestGyro);
                } else {
                    window.addEventListener('deviceorientation', handleGyro);
                    controllerStatus.innerHTML = '✅ ГИРОСКОП АКТИВЕН! Наклоняйте телефон';
                }
            } else {
                controllerStatus.innerHTML = '❌ Гироскоп не поддерживается';
            }
        }
        
        // ========== ВЫБОР РЕЖИМА ==========
        document.getElementById('screenBtn').onclick = () => {
            mode = 'screen';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'block';
            controllerPanel.style.display = 'none';
            initGameScene();
            statusDiv.innerHTML = '🖥️ Режим экрана';
        };
        
        document.getElementById('controllerBtn').onclick = () => {
            mode = 'controller';
            modeSelector.style.display = 'none';
            screenPanel.style.display = 'none';
            controllerPanel.style.display = 'block';
            statusDiv.innerHTML = '🎮 Режим пульта';
            
            // Показываем кнопку сканирования
            scanBtn.onclick = () => {
                startBluetoothController();
            };
        };
        
        startServerBtn.onclick = () => {
            startBluetoothServer();
        };
        
        console.log('=== BLUETOOTH SABER ===');
        console.log('');
        console.log('ИНСТРУКЦИЯ:');
        console.log('1. На телефоне-ЭКРАНЕ нажмите "Я ЭКРАН" → "ЗАПУСТИТЬ BLUETOOTH СЕРВЕР"');
        console.log('2. На телефоне-ПУЛЬТЕ нажмите "Я ПУЛЬТ" → "ПОИСК BLUETOOTH УСТРОЙСТВ"');
        console.log('3. Выберите экран из списка');
        console.log('4. НАКЛОНЯЙТЕ ПУЛЬТ — ЛУЧ ДВИГАЕТСЯ!');
        console.log('');
        console.log('⚠️ ВАЖНО: Телефоны должны быть предварительно СОПРЯЖЕНЫ через настройки Bluetooth!');
        console.log('⚠️ Имя Bluetooth устройства должно начинаться с "Saber" (можно переименовать в настройках)');
    </script>
</body>
</html>
