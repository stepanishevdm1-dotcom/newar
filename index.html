<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bluetooth VR Saber</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #mode-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            gap: 12px;
            pointer-events: auto;
            font-size: 14px;
        }
        button {
            background: #ff3366;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.96); }
        .btn-green { background: #33cc66; }
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        #controller-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 30px;
            text-align: center;
            pointer-events: none;
            z-index: 200;
            font-size: 1.2rem;
            white-space: nowrap;
        }
        @media (max-width: 600px) {
            #mode-panel { top: 10px; left: 10px; padding: 6px 12px; }
            button { padding: 5px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="mode-panel">
        <button id="screenModeBtn" class="btn-green">🎮 Режим экрана</button>
        <button id="controllerModeBtn">🕹️ Режим контроллера</button>
    </div>
    <div id="status" class="status">⚡ Ожидание режима</div>
    <div id="controller-screen" style="display:none;">
        📱 Режим КОНТРОЛЛЕРА<br>
        Наклоняйте телефон → рубим кубы
    </div>

    <!-- Three.js библиотеки -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Глобальное состояние ---
        let mode = null;           // 'screen' или 'controller'
        let cubeList = [];         // массив активных кубов { mesh, speed, hit }
        let lastTilt = { gamma: 0, beta: 0 };
        let sliceThreshold = 35;    // градусы наклона для "удара"
        let lastSliceTime = 0;
        const sliceCooldown = 180;  // мс между ударами
        
        // --- Настройки сцены (только для экрана) ---
        let scene, camera, renderer, clock;
        let animationId = null;
        
        // --- Коммуникация (эмуляция Bluetooth через BroadcastChannel, легко заменить на реальный BLE) ---
        let channel = null;
        let isConnected = false;
        
        // DOM элементы
        const screenBtn = document.getElementById('screenModeBtn');
        const controllerBtn = document.getElementById('controllerModeBtn');
        const statusDiv = document.getElementById('status');
        const controllerScreenDiv = document.getElementById('controller-screen');
        
        // --- Функции для режима ЭКРАНА ---
        function initScreen() {
            // Убираем подсказку контроллера
            controllerScreenDiv.style.display = 'none';
            
            // Сцена
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
            
            // Камера (вид от первого лица)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 5);
            camera.lookAt(0, 0, -10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Освещение
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 5, 3);
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x3366ff, 0.5);
            backLight.position.set(0, 2, -4);
            scene.add(backLight);
            
            // Пол / линии для ощущения скорости
            const gridHelper = new THREE.GridHelper(30, 20, 0x88aaff, 0x335588);
            gridHelper.position.y = -1.5;
            gridHelper.position.z = -5;
            scene.add(gridHelper);
            
            // Вспомогательные звезды
            const starGeometry = new THREE.BufferGeometry();
            const starCount = 800;
            const starPositions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPositions[i*3] = (Math.random() - 0.5) * 200;
                starPositions[i*3+1] = (Math.random() - 0.5) * 100;
                starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
            }
            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
            
            clock = new THREE.Clock();
            
            // Генерация кубов
            setInterval(() => {
                if (mode !== 'screen') return;
                spawnCube();
            }, 700);
            
            // Анимация
            function animate() {
                if (mode !== 'screen') return;
                const delta = clock.getDelta();
                updateCubes(delta);
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            statusDiv.innerHTML = '🖥️ Режим экрана | Ожидание контроллера...';
        }
        
        function spawnCube() {
            const size = 0.7 + Math.random() * 0.3;
            const geometry = new THREE.BoxGeometry(size, size, size);
            const colors = [0xff3366, 0x33ff66, 0xffaa33, 0xaa44ff, 0x33ccff];
            const material = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], emissive: 0x331100, metalness: 0.7 });
            const cube = new THREE.Mesh(geometry, material);
            
            // Позиция: случайная по X, летит на нас
            const xPos = (Math.random() - 0.5) * 3.5;
            cube.position.set(xPos, (Math.random() - 0.5) * 2.5, -12);
            cube.userData = { speed: 4.5 + Math.random() * 2.5, hit: false };
            scene.add(cube);
            cubeList.push(cube);
        }
        
        function updateCubes(delta) {
            for (let i = cubeList.length-1; i >= 0; i--) {
                const cube = cubeList[i];
                if (!cube) continue;
                // движение вперёд
                cube.position.z += cube.userData.speed * delta;
                // легкое вращение
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.03;
                
                // если ушёл за камеру или уже разрублен
                if (cube.position.z > 3.5 || cube.userData.hit) {
                    scene.remove(cube);
                    cubeList.splice(i,1);
                }
            }
            
            // обрабатываем удар по ближайшему кубу по направлению взмаха
            if (mode === 'screen' && lastTilt && (Date.now() - lastSliceTime) > sliceCooldown) {
                const absGamma = Math.abs(lastTilt.gamma);
                const absBeta = Math.abs(lastTilt.beta);
                // Если резкий наклон (как рубка)
                if (absGamma > sliceThreshold || absBeta > sliceThreshold) {
                    // Найти ближайший куб по центру экрана (X, Y)
                    let closest = null;
                    let minDist = 1.2;
                    for (let cube of cubeList) {
                        if (cube.userData.hit) continue;
                        const distX = Math.abs(cube.position.x);
                        const distY = Math.abs(cube.position.y);
                        const distZ = Math.abs(cube.position.z + 3);
                        if (distX < 1.3 && distY < 1.3 && distZ < 1.5) {
                            const scoreDist = Math.abs(distX) + Math.abs(distY);
                            if (scoreDist < minDist) {
                                minDist = scoreDist;
                                closest = cube;
                            }
                        }
                    }
                    if (closest) {
                        closest.userData.hit = true;
                        // эффект разрушения
                        const particles = new THREE.Points(
                            new THREE.BufferGeometry(),
                            new THREE.PointsMaterial({ color: 0xff6600, size: 0.1 })
                        );
                        const posArray = [];
                        for (let i=0;i<30;i++) {
                            posArray.push((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
                        }
                        particles.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(posArray), 3));
                        particles.position.copy(closest.position);
                        scene.add(particles);
                        setTimeout(() => scene.remove(particles), 200);
                        scene.remove(closest);
                        const index = cubeList.indexOf(closest);
                        if (index !== -1) cubeList.splice(index,1);
                        
                        statusDiv.innerHTML = `⚡ РАЗРУБИЛ!  (наклон ${Math.round(absGamma)}°)`;
                        setTimeout(() => {
                            if(mode==='screen') statusDiv.innerHTML = '🖥️ Экран | Контроллер активен';
                        }, 500);
                        lastSliceTime = Date.now();
                    }
                }
            }
        }
        
        // --- Функции для режима КОНТРОЛЛЕРА (отправляет наклон через Bluetooth эмуляцию) ---
        function initController() {
            controllerScreenDiv.style.display = 'block';
            statusDiv.innerHTML = '🎮 Контроллер | Инициализация гироскопа...';
            
            // запрашиваем доступ к ориентации устройства
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                // iOS требует разрешения
                statusDiv.innerHTML = '🎮 Нажмите на экран для запроса разрешения на гироскоп';
                const requestPermissionHandler = () => {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') {
                                window.addEventListener('deviceorientation', handleOrientation);
                                statusDiv.innerHTML = '🎮 Контроллер | Гироскоп активен | Отправка наклона...';
                            }
                        })
                        .catch(console.error);
                    document.removeEventListener('click', requestPermissionHandler);
                };
                document.addEventListener('click', requestPermissionHandler);
            } else {
                // Android и другие
                window.addEventListener('deviceorientation', handleOrientation);
                statusDiv.innerHTML = '🎮 Контроллер | Передаю наклон через Bluetooth (эмуляция)';
            }
            
            // Создаём канал для "Bluetooth" - эмуляция через BroadcastChannel (работает между вкладками/телефонами в одной сети через один и тот же файл)
            // В реальном мире здесь был бы Bluetooth GATT сервер, но для демо используем BroadcastChannel + localStorage событие
            // Чтобы связать два телефона, нужно, чтобы оба открыли этот HTML. Контроллер будет отправлять сообщения в канал "saber_channel"
            channel = new BroadcastChannel('saber_bt_channel');
            
            // Отправляем тестовое сообщение о подключении
            setInterval(() => {
                if (mode === 'controller' && lastTilt) {
                    const msg = {
                        type: 'tilt',
                        gamma: lastTilt.gamma,
                        beta: lastTilt.beta,
                        alpha: lastTilt.alpha,
                        timestamp: Date.now()
                    };
                    channel.postMessage(msg);
                    // визуальная индикация
                    statusDiv.innerHTML = `🎮 Отправлено: наклон ${Math.round(lastTilt.gamma)}°`;
                }
            }, 50);  // 20fps передачи
            
            channel.onmessage = (e) => {
                if (e.data && e.data.type === 'pong') {
                    isConnected = true;
                    statusDiv.innerHTML = '🎮 Связь по Bluetooth (канал) установлена';
                }
            };
            // подтверждение связи
            setTimeout(() => {
                channel.postMessage({ type: 'ping' });
            }, 500);
        }
        
        function handleOrientation(event) {
            if (mode !== 'controller') return;
            // gamma: наклон влево/вправо, beta: вперёд/назад
            let gamma = event.gamma || 0;
            let beta = event.beta || 0;
            // ограничим для чувствительности
            lastTilt = { gamma: gamma, beta: beta, alpha: event.alpha };
            
            // Обновляем отображение на экране контроллера
            const angleIndicator = document.getElementById('controller-screen');
            if (angleIndicator) {
                angleIndicator.innerHTML = `🎮 КОНТРОЛЛЕР<br>Наклон: ${Math.round(gamma)}°<br>👆 РУБИТЕ движением!`;
            }
        }
        
        // --- Приём сообщений на экране ---
        function startScreenReceiver() {
            if (channel) channel.close();
            channel = new BroadcastChannel('saber_bt_channel');
            channel.onmessage = (e) => {
                if (mode !== 'screen') return;
                if (e.data && e.data.type === 'tilt') {
                    // получаем данные наклона с контроллера
                    lastTilt = { gamma: e.data.gamma, beta: e.data.beta };
                    // небольшая индикация приёма
                    statusDiv.innerHTML = `🖥️ Принят наклон: ${Math.round(e.data.gamma)}°`;
                    setTimeout(() => {
                        if(mode==='screen') statusDiv.innerHTML = '🖥️ Экран | Контроллер активен';
                    }, 300);
                } else if (e.data && e.data.type === 'ping') {
                    channel.postMessage({ type: 'pong' });
                }
            };
        }
        
        // --- Переключение режимов ---
        screenBtn.addEventListener('click', () => {
            if (mode === 'screen') return;
            // очищаем предыдущую сцену если была
            if (renderer && renderer.domElement) {
                renderer.domElement.remove();
            }
            mode = 'screen';
            cubeList = [];
            lastTilt = { gamma: 0, beta: 0 };
            initScreen();
            startScreenReceiver();
            statusDiv.innerHTML = '🖥️ Экран | Ждём сигнала от контроллера...';
        });
        
        controllerBtn.addEventListener('click', () => {
            if (mode === 'controller') return;
            mode = 'controller';
            // если экранная сцена была - очистим
            if (renderer && renderer.domElement) {
                renderer.domElement.remove();
            }
            initController();
        });
        
        // Стартовое состояние - предложим выбрать режим
        statusDiv.innerHTML = '📱 Выберите режим: экран или контроллер';
        
        // маленький help
        console.log('Приложение готово. Для реального Bluetooth потребуется BLE периферия, но связка через BroadcastChannel работает между двумя телефонами в одной сети, открывшими эту же страницу.');
    </script>
</body>
</html>
