<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BEAT SABER VR — Улучшенный</title>
<style>
body{margin:0;overflow:hidden;font-family:Segoe UI,Arial,sans-serif;background:#000;touch-action:none;}
#ui{position:absolute;top:20px;left:20px;right:20px;z-index:100;display:flex;justify-content:space-between;pointer-events:none;}
.status{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);padding:8px 16px;border-radius:30px;color:#0f0;font-family:monospace;font-size:11px;font-weight:bold;border-left:3px solid #0f0;}
.score-board{background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);padding:8px 16px;border-radius:30px;text-align:center;}
.score-value{color:#ff44cc;font-weight:bold;font-size:22px;text-shadow:0 0 5px #ff44cc;}
.combo-value{color:#ffaa33;font-size:16px;}
.panel{position:absolute;bottom:30px;left:20px;right:20px;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);border-radius:40px;padding:20px;text-align:center;z-index:200;border:1px solid rgba(255,255,255,0.2);}
button{background:linear-gradient(135deg,#ff3366,#ff6699);border:none;color:white;padding:14px 24px;border-radius:60px;font-weight:bold;font-size:18px;margin:8px;cursor:pointer;transition:0.1s;box-shadow:0 0 12px rgba(255,51,102,0.5);}
button:active{transform:scale(0.96);}
.btn-green{background:linear-gradient(135deg,#33cc66,#66ff99);box-shadow:0 0 12px rgba(51,204,102,0.5);}
.btn-blue{background:linear-gradient(135deg,#3399ff,#66ccff);box-shadow:0 0 12px rgba(51,153,255,0.5);}
.mode-selector{position:absolute;bottom:30px;left:20px;right:20px;display:flex;gap:15px;justify-content:center;z-index:300;}
.gyro-value{font-size:48px;font-weight:bold;background:linear-gradient(135deg,#ffaa33,#ffdd88);-webkit-background-clip:text;background-clip:text;color:transparent;margin:10px 0;}
.device-list{max-height:200px;overflow-y:auto;margin:15px 0;text-align:left;}
.device-item{background:#1a1a2e;padding:12px;margin:8px 0;border-radius:30px;cursor:pointer;color:white;}
.device-item:hover{background:#2a2a4e;}
.instruction{font-size:11px;color:#aaa;margin-top:12px;}
.red-saber-panel,.blue-saber-panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(0,0,0,0.7);border-radius:30px;padding:10px;font-size:10px;text-align:center;z-index:150;}
.red-saber-panel{border-left:4px solid #ff3366;bottom:80px;}
.blue-saber-panel{border-left:4px solid #3399ff;bottom:40px;}
@media(max-width:600px){.gyro-value{font-size:36px;}button{padding:10px 18px;font-size:14px;}}
</style>
</head>
<body>
<div id="ui">
<div class="status" id="status">⚡ BEAT SABER VR</div>
<div class="score-board">
<div class="score-value" id="score">0</div>
<div class="combo-value" id="combo">COMBO x1</div>
</div>
</div>

<div id="modeSelector" class="mode-selector">
<button id="screenBtn" class="btn-green">🕶️ ЭКРАН VR</button>
<button id="controllerBtn" class="btn-blue">🎮 ПУЛЬТ</button>
</div>

<div id="screenPanel" class="panel" style="display:none;">
<div style="font-size:20px;margin-bottom:10px;">🕶️ BEAT SABER VR</div>
<button id="startServerBtn" class="btn-green">🔗 ПОДКЛЮЧИТЬ ПУЛЬТ</button>
<div id="screenStatus">⏳ Ожидание пульта...</div>
<div class="instruction">🔹 На пульте нажмите "ПОИСК BLUETOOTH" и выберите этот телефон</div>
</div>

<div id="controllerPanel" class="panel" style="display:none;">
<div style="font-size:20px;margin-bottom:10px;">🎮 ПУЛЬТ УПРАВЛЕНИЯ</div>
<button id="scanBtn" class="btn-blue">🔍 ПОИСК BLUETOOTH</button>
<div id="controllerStatus"></div>
<div class="gyro-value" id="gyroAngle">0°</div>
<div class="instruction">📱 НАКЛОНЯЙТЕ ТЕЛЕФОН → МЕЧ ДВИГАЕТСЯ</div>
</div>

<div id="redPanel" class="red-saber-panel" style="display:none;">🔴 КРАСНЫЙ МЕЧ — НАКЛОНЯЙТЕ ПУЛЬТ</div>
<div id="bluePanel" class="blue-saber-panel" style="display:none;">🔵 СИНИЙ МЕЧ — ПОЗЖЕ</div>

<script type="importmap">
{
"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js"}
}
</script>

<script type="module">
import * as THREE from 'three';

let mode = null, score=0, combo=1, maxCombo=0;
let cubes=[], particles=[];
let redSaberAngle = {x:0,y:0}, blueSaberAngle = {x:0,y:0};

let bluetoothCharacteristic = null, isConnected=false;

// DOM
const statusDiv = document.getElementById('status');
const scoreDiv = document.getElementById('score');
const comboDiv = document.getElementById('combo');
const modeSelector = document.getElementById('modeSelector');
const screenPanel = document.getElementById('screenPanel');
const controllerPanel = document.getElementById('controllerPanel');
const screenStatus = document.getElementById('screenStatus');
const controllerStatus = document.getElementById('controllerStatus');
const gyroAngleSpan = document.getElementById('gyroAngle');
const scanBtn = document.getElementById('scanBtn');
const startServerBtn = document.getElementById('startServerBtn');
const redPanel = document.getElementById('redPanel');
const bluePanel = document.getElementById('bluePanel');

// 3D сцена
let scene, camera, renderer, clock, redSaber, blueSaber;

function initGameScene(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x050510);
    scene.fog=new THREE.FogExp2(0x050510,0.015);

    camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.set(0,1.7,5);
    camera.lookAt(0,1.7,0);

    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled=true;
    document.body.appendChild(renderer.domElement);

    const ambient=new THREE.AmbientLight(0x222233);
    scene.add(ambient);
    const mainLight=new THREE.DirectionalLight(0xffffff,0.8);
    mainLight.position.set(1,3,2); mainLight.castShadow=true; scene.add(mainLight);

    const grid=new THREE.GridHelper(12,12,0xff33cc,0x33ff66);
    grid.position.y=-1.2; grid.material.transparent=true; grid.material.opacity=0.5; scene.add(grid);

    // Мечи
    redSaber=createSaber(0.6,0.6,2.5,0xff3366); scene.add(redSaber);
    blueSaber=createSaber(-0.6,0.6,2.5,0x3399ff); scene.add(blueSaber);

    clock=new THREE.Clock();

    setInterval(()=>{ if(mode==='screen') spawnCube(); },500);

    animate();
    window.addEventListener('resize',()=>{
        camera.aspect=window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth,window.innerHeight);
    });
}

function createSaber(x,y,z,color){
    const group=new THREE.Group();
    const blade=new THREE.Mesh(
        new THREE.CylinderGeometry(0.06,0.1,1.4,12),
        new THREE.MeshStandardMaterial({color:color,emissive:color,emissiveIntensity:1.2})
    ); blade.position.y=0.7; group.add(blade);
    const handle=new THREE.Mesh(
        new THREE.CylinderGeometry(0.12,0.12,0.4,8),
        new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7})
    ); handle.position.y=-0.15; group.add(handle);
    group.position.set(x,y,z);
    return group;
}

function spawnCube(){
    const isRed=Math.random()>0.5;
    const color=isRed?0xff3366:0x3399ff;
    const cube=new THREE.Mesh(
        new THREE.BoxGeometry(0.6,0.6,0.6),
        new THREE.MeshStandardMaterial({color:color,emissive:color,emissiveIntensity:0.4,metalness:0.3})
    );
    cube.position.set(isRed?1: -1,1.5, -8);
    cube.userData={speed:4+Math.random()*2, hit:false,color:isRed?'red':'blue'};
    scene.add(cube);
    cubes.push(cube);
}

function animate(){
    if(mode!=='screen') return;
    const delta=Math.min(clock.getDelta(),0.033);
    updateCubes(delta);
    updateSabers();
    updateParticles(delta);
    renderer.render(scene,camera);
    requestAnimationFrame(animate);
}

function updateCubes(delta){
    for(let i=cubes.length-1;i>=0;i--){
        const c=cubes[i]; c.position.z+=c.userData.speed*delta;
        c.rotation.x+=0.05; c.rotation.y+=0.05;

        if(!c.userData.hit && c.position.z>-2 && c.position.z<2){
            let hit=false;
            if(c.userData.color==='red'){
                const dx=Math.abs(c.position.x - redSaber.position.x);
                const dy=Math.abs(c.position.y - redSaber.position.y);
                if(dx<0.8 && dy<1.2) hit=true;
            }
            if(hit){
                c.userData.hit=true; score+=10*combo; combo++; if(combo>maxCombo) maxCombo=combo;
                scoreDiv.innerHTML=score; comboDiv.innerHTML=`COMBO x${combo}`;
                statusDiv.innerHTML=`⚡ SLICE! x${combo}`;
                setTimeout(()=>statusDiv.innerHTML='BEAT SABER VR',300);
                createSliceEffect(c.position, c.userData.color);
                scene.remove(c); cubes.splice(i,1); continue;
            }
        }
        if(c.position.z>4){scene.remove(c); cubes.splice(i,1); combo=1; comboDiv.innerHTML='COMBO x1';}
    }
}

function createSliceEffect(pos,color){
    const count=30;
    const geo=new THREE.BufferGeometry();
    const positions=new Float32Array(count*3);
    const colorsArr=new Float32Array(count*3);
    for(let i=0;i<count;i++){
        positions[i*3]=(Math.random()-0.5)*0.6;
        positions[i*3+1]=(Math.random()-0.5)*0.6;
        positions[i*3+2]=(Math.random()-0.5)*0.6;
        const col=color==='red'?[1,0.2,0.4]:[0.2,0.4,1];
        colorsArr[i*3]=col[0]; colorsArr[i*3+1]=col[1]; colorsArr[i*3+2]=col[2];
    }
    geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
    geo.setAttribute('color',new THREE.BufferAttribute(colorsArr,3));
    const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:0.08,vertexColors:true}));
    pts.position.copy(pos);
    scene.add(pts);
    particles.push({mesh:pts,life:0.3});
}

function updateParticles(delta){
    for(let i=particles.length-1;i>=0;i--){
        particles[i].life-=delta;
        if(particles[i].life<=0){ scene.remove(particles[i].mesh); particles.splice(i,1); }
    }
}

function updateSabers(){
    if(redSaber){
        redSaber.rotation.z=-redSaberAngle.y*Math.PI/180*0.9;
        redSaber.rotation.x=redSaberAngle.x*Math.PI/180*0.5;
    }
}

// ========== BLUETOOTH ПОДКЛЮЧЕНИЕ ==========
async function startBluetoothServer(){
    screenStatus.innerHTML='🔍 Поиск пульта...';
    try{
        const device=await navigator.bluetooth.requestDevice({filters:[{namePrefix:'Saber'}],optionalServices:['0000ffe0-0000-1000-8000-00805f9b34fb']});
        screenStatus.innerHTML='🔗 Подключение...';
        const server=await device.gatt.connect();
        const service=await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
        const characteristic=await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged',e=>{
            const val=e.target.value; if(val){
                const gamma=val.getInt8(0);
                const beta=val.getInt8(1);
                redSaberAngle.y=Math.max(-45,Math.min(45,gamma));
                redSaberAngle.x=Math.max(-45,Math.min(45,beta));
                statusDiv.innerHTML=`🔴 УГОЛ Y:${Math.round(redSaberAngle.y)}° X:${Math.round(redSaberAngle.x)}°`;
            }
        });
        isConnected=true; screenStatus.innerHTML='✅ ПУЛЬТ ПОДКЛЮЧЕН! Рубите кубы!';
        redPanel.style.display='block';
    }catch(err){screenStatus.innerHTML=`❌ Ошибка: ${err.message}`;}
}

function startGyroController(characteristic){
    const sendAngle=angle=>{
        if(characteristic && isConnected){
            const byteX=Math.floor(angle.x+45);
            const byteY=Math.floor(angle.y+45);
            characteristic.writeValue(new Uint8Array([byteX,byteY])).catch(()=>{});
        }
    };
    if(typeof DeviceOrientationEvent!=='undefined'){
        const handleGyro=e=>{
            if(!isConnected)return;
            const gamma=e.gamma||0; const beta=e.beta||0;
            const angle={y:Math.max(-45,Math.min(45,gamma)),x:Math.max(-45,Math.min(45,beta))};
            gyroAngleSpan.innerHTML=`Y:${Math.round(angle.y)}° X:${Math.round(angle.x)}°`;
            sendAngle(angle);
        };
        if(typeof DeviceOrientationEvent.requestPermission==='function'){
            controllerStatus.innerHTML='🎮 Нажмите для разрешения гироскопа';
            const requestGyro=()=>{
                DeviceOrientationEvent.requestPermission().then(()=>{window.addEventListener('deviceorientation',handleGyro); controllerStatus.innerHTML='✅ ГИРОСКОП АКТИВЕН!';}).catch(()=>{controllerStatus.innerHTML='❌ Нет доступа к гироскопу';});
                document.removeEventListener('click',requestGyro);
            };
            document.addEventListener('click',requestGyro);
        }else{window.addEventListener('deviceorientation',handleGyro); controllerStatus.innerHTML='✅ ГИРОСКОП АКТИВЕН!';}
    }else{controllerStatus.innerHTML='❌ Гироскоп не поддерживается';}
}

// ========== КНОПКИ ==========
document.getElementById('screenBtn').onclick=()=>{
    mode='screen'; modeSelector.style.display='none';
    screenPanel.style.display='block'; controllerPanel.style.display='none';
    initGameScene(); statusDiv.innerHTML='🕶️ BEAT SABER VR';
};
document.getElementById('controllerBtn').onclick=()=>{
    mode='controller'; modeSelector.style.display='none';
    screenPanel.style.display='none'; controllerPanel.style.display='block';
    statusDiv.innerHTML='🎮 ПУЛЬТ АКТИВЕН';
    scanBtn.onclick=()=>startGyroController();
};
startServerBtn.onclick=()=>startBluetoothServer();

</script>
</body>
</html>
