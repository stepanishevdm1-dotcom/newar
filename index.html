<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saber Controller — отладочная версия</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .card {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        button {
            background: #ff3366;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.97); }
        .btn-green { background: #33cc66; }
        .btn-blue { background: #3399ff; }
        .status {
            background: #000000aa;
            padding: 15px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 14px;
            margin: 10px 0;
            word-break: break-all;
        }
        .status-connected { border-left: 4px solid #33ff66; }
        .status-error { border-left: 4px solid #ff3366; }
        .status-warning { border-left: 4px solid #ffaa33; }
        .gyro-box {
            background: #000000aa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            margin-top: 15px;
        }
        .gyro-value {
            font-size: 48px;
            font-weight: bold;
            color: #ffaa33;
        }
        .log {
            font-family: monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            background: #000000aa;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
        }
        .ip-box {
            font-family: monospace;
            font-size: 20px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin: 10px 0;
        }
        input {
            padding: 15px;
            font-size: 18px;
            border-radius: 30px;
            width: 80%;
            margin: 10px 0;
            text-align: center;
            background: #333;
            color: white;
            border: none;
        }
        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        h2 { margin: 0 0 15px 0; font-size: 22px; }
        hr { border-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-buttons">
            <button id="screenModeBtn" class="btn-green">🖥️ РЕЖИМ ЭКРАНА</button>
            <button id="controllerModeBtn" style="background:#ff3366">🎮 РЕЖИМ КОНТРОЛЛЕРА</button>
        </div>

        <!-- Режим ЭКРАНА -->
        <div id="screenPanel" style="display: none;">
            <div class="card">
                <h2>🖥️ РЕЖИМ ЭКРАНА</h2>
                <div class="ip-box" id="localIp">🔍 Определение IP...</div>
                <button id="createRoomBtn" class="btn-green">🚀 СОЗДАТЬ КОМНАТУ</button>
                <div id="roomCodeDisplay" class="status" style="display: none;"></div>
                <div id="screenStatus" class="status status-warning">⚡ Ожидание действия</div>
                <div id="screenLog" class="log">📋 Лог событий:\n</div>
            </div>
        </div>

        <!-- Режим КОНТРОЛЛЕРА -->
        <div id="controllerPanel" style="display: none;">
            <div class="card">
                <h2>🎮 РЕЖИМ КОНТРОЛЛЕРА</h2>
                <input type="text" id="roomCodeInput" maxlength="6" placeholder="Введите 6-значный код">
                <button id="joinRoomBtn" class="btn-blue">🔗 ПОДКЛЮЧИТЬСЯ</button>
                <div id="controllerStatus" class="status status-warning">⚡ Ожидание подключения</div>
                <div class="gyro-box">
                    <div>🎯 Угол наклона (влево-вправо)</div>
                    <div class="gyro-value" id="gyroAngle">0°</div>
                    <div style="font-size: 12px; margin-top: 10px;" id="gyroPermission">⚡ Ожидание разрешения гироскопа...</div>
                </div>
                <div id="controllerLog" class="log">📋 Лог событий:\n</div>
            </div>
        </div>

        <!-- 3D превью для экрана -->
        <canvas id="previewCanvas" style="display: none; width: 100%; height: 300px; border-radius: 20px; margin-top: 20px;"></canvas>
    </div>

    <script>
        // === ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ===
        let mode = null;
        let ws = null;
        let currentRoomId = null;
        
        // DOM элементы
        const screenPanel = document.getElementById('screenPanel');
        const controllerPanel = document.getElementById('controllerPanel');
        const screenModeBtn = document.getElementById('screenModeBtn');
        const controllerModeBtn = document.getElementById('controllerModeBtn');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const joinRoomBtn = document.getElementById('joinRoomBtn');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const screenStatus = document.getElementById('screenStatus');
        const controllerStatus = document.getElementById('controllerStatus');
        const screenLog = document.getElementById('screenLog');
        const controllerLog = document.getElementById('controllerLog');
        const localIpSpan = document.getElementById('localIp');
        const gyroAngleSpan = document.getElementById('gyroAngle');
        const gyroPermissionSpan = document.getElementById('gyroPermission');
        const previewCanvas = document.getElementById('previewCanvas');
        
        // Функция логирования
        function addLog(element, message) {
            const timestamp = new Date().toLocaleTimeString();
            element.innerHTML += `[${timestamp}] ${message}\n`;
            element.scrollTop = element.scrollHeight;
            console.log(message);
        }
        
        // === ПОЛУЧЕНИЕ ЛОКАЛЬНОГО IP ===
        async function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(offer => pc.setLocalDescription(offer));
                pc.onicecandidate = (event) => {
                    if (event && event.candidate && event.candidate.candidate) {
                        const ip = event.candidate.candidate.match(/([0-9]{1,3}\.){3}[0-9]{1,3}/)?.[0];
                        if (ip && !ip.startsWith('0.0.0.0')) {
                            resolve(ip);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => {
                    resolve('192.168.1.xxx (проверьте Wi-Fi)');
                    pc.close();
                }, 2000);
            });
        }
        
        // === ПРОСТОЙ WEBRTC БЕЗ SIGNALING СЕРВЕРА ===
        // Используем обмен через копирование текста
        
        let peerConnection = null;
        let dataChannel = null;
        let isConnected = false;
        
        // Для экрана (создатель)
        async function createOffer() {
            addLog(screenLog, '🔄 Создание WebRTC offer...');
            
            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(config);
            
            dataChannel = peerConnection.createDataChannel('control');
            setupDataChannel(true);
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    addLog(screenLog, `📡 ICE кандидат: ${event.candidate.candidate.substring(0, 50)}...`);
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Показываем offer для копирования
            const offerText = JSON.stringify(offer);
            roomCodeDisplay.innerHTML = `
                <strong>🔑 КОД КОМНАТЫ (скопируйте и отправьте на контроллер):</strong><br>
                <span style="font-size: 24px; letter-spacing: 2px;">${generateShortCode(offerText)}</span><br>
                <button id="copyFullOfferBtn" style="margin-top: 10px; padding: 8px 16px; font-size: 14px;">📋 Скопировать полные данные</button>
            `;
            roomCodeDisplay.style.display = 'block';
            
            document.getElementById('copyFullOfferBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(offerText);
                addLog(screenLog, '📋 Данные скопированы в буфер обмена');
                screenStatus.innerHTML = '✅ Данные скопированы! Отправьте их на контроллер';
            });
            
            addLog(screenLog, `✅ Offer создан, ждём ответ...`);
            screenStatus.innerHTML = '⏳ Ожидание подключения контроллера...';
            
            // Ждём answer
            window.pendingAnswerCallback = null;
            window.receiveAnswer = (answerText) => {
                try {
                    const answer = JSON.parse(answerText);
                    peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                    addLog(screenLog, '✅ Answer получен и установлен!');
                    screenStatus.innerHTML = '✅ Подключено! Ждём данные от контроллера...';
                } catch(e) {
                    addLog(screenLog, `❌ Ошибка: ${e.message}`);
                }
            };
        }
        
        function generateShortCode(text) {
            // Генерируем короткий код из первых символов
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString().substring(0, 6);
        }
        
        function setupDataChannel(isHost) {
            if (!dataChannel) return;
            
            dataChannel.onopen = () => {
                isConnected = true;
                addLog(screenLog, '🔗 DataChannel открыт! Связь установлена');
                screenStatus.innerHTML = '✅ Контроллер подключён! Луч активен';
                start3DPreview();
            };
            
            dataChannel.onmessage = (event) => {
                addLog(screenLog, `📥 Получено: ${event.data}`);
                const angle = parseFloat(event.data);
                if (!isNaN(angle)) {
                    updateSaberAngle(angle);
                }
            };
            
            dataChannel.onerror = (err) => {
                addLog(screenLog, `❌ Ошибка: ${err.message}`);
            };
        }
        
        // Для контроллера (подключение)
        async function handleOffer(offerText) {
            addLog(controllerLog, '🔄 Обработка offer...');
            
            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(config);
            
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                addLog(controllerLog, '📡 DataChannel получен');
                dataChannel.onopen = () => {
                    isConnected = true;
                    addLog(controllerLog, '🔗 Соединение установлено!');
                    controllerStatus.innerHTML = '✅ Подключено к экрану! Наклоняйте телефон';
                    startSendingGyro();
                };
                dataChannel.onmessage = (e) => {
                    addLog(controllerLog, `📥 Получено: ${e.data}`);
                };
            };
            
            const offer = JSON.parse(offerText);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            addLog(controllerLog, '✅ RemoteDescription установлен');
            
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            addLog(controllerLog, '✅ Answer создан');
            
            // Показываем answer для копирования
            const answerText = JSON.stringify(answer);
            controllerStatus.innerHTML = `
                ✅ Offer принят! Скопируйте эти данные и отправьте на экран:<br>
                <textarea id="answerData" rows="4" style="width:100%; margin-top:10px; background:#333; color:white; border-radius:10px; padding:8px;" readonly>${answerText}</textarea>
                <button id="copyAnswerBtn" style="margin-top:10px;">📋 Скопировать ответ</button>
            `;
            
            document.getElementById('copyAnswerBtn')?.addEventListener('click', () => {
                navigator.clipboard.writeText(answerText);
                addLog(controllerLog, '📋 Ответ скопирован в буфер обмена');
            });
            
            // Сохраняем в глобальную переменную для автоматического получения
            window.pendingAnswer = answerText;
        }
        
        // === ОБНОВЛЕНИЕ ЛУЧА (простая 3D визуализация) ===
        let saberAngle = 0;
        let ctx = null;
        let animationId = null;
        
        function start3DPreview() {
            previewCanvas.style.display = 'block';
            ctx = previewCanvas.getContext('2d');
            previewCanvas.width = previewCanvas.clientWidth;
            previewCanvas.height = 300;
            drawSaber();
        }
        
        function updateSaberAngle(angle) {
            saberAngle = angle;
            drawSaber();
            screenStatus.innerHTML = `✅ Луч: ${Math.round(angle)}°`;
        }
        
        function drawSaber() {
            if (!ctx) return;
            const w = previewCanvas.clientWidth || 600;
            const h = 300;
            previewCanvas.width = w;
            previewCanvas.height = h;
            
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, w, h);
            
            // Рисуем луч
            const centerX = w / 2;
            const centerY = h / 2;
            const angleRad = saberAngle * Math.PI / 180;
            const length = 100;
            const endX = centerX + Math.sin(angleRad) * length;
            const endY = centerY - Math.cos(angleRad) * length;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = '#ff3366';
            ctx.lineWidth = 8;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
            ctx.fillStyle = '#33cc66';
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.font = '16px monospace';
            ctx.fillText(`${Math.round(saberAngle)}°`, endX + 5, endY);
        }
        
        // === ГИРОСКОП ДЛЯ КОНТРОЛЛЕРА ===
        let lastAngle = 0;
        
        function startGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                gyroPermissionSpan.innerHTML = '📱 Нажмите на экран для разрешения гироскопа';
                const requestGyro = async () => {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleGyro);
                            gyroPermissionSpan.innerHTML = '✅ Гироскоп активен! Наклоняйте телефон';
                            addLog(controllerLog, '✅ Гироскоп разрешён');
                        } else {
                            gyroPermissionSpan.innerHTML = '❌ Доступ к гироскопу запрещён';
                        }
                    } catch(e) {
                        gyroPermissionSpan.innerHTML = `❌ Ошибка: ${e.message}`;
                        addLog(controllerLog, `❌ Ошибка гироскопа: ${e.message}`);
                    }
                    document.removeEventListener('click', requestGyro);
                };
                document.addEventListener('click', requestGyro);
            } else {
                window.addEventListener('deviceorientation', handleGyro);
                gyroPermissionSpan.innerHTML = '✅ Гироскоп активен!';
                addLog(controllerLog, '✅ Гироскоп инициализирован');
            }
        }
        
        function handleGyro(event) {
            if (mode !== 'controller') return;
            const gamma = event.gamma || 0;
            const angle = Math.max(-60, Math.min(60, gamma));
            gyroAngleSpan.innerHTML = `${Math.round(angle)}°`;
            lastAngle = angle;
            
            // Отправляем через dataChannel если подключены
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(angle.toString());
            }
        }
        
        function startSendingGyro() {
            setInterval(() => {
                if (dataChannel && dataChannel.readyState === 'open' && mode === 'controller') {
                    dataChannel.send(lastAngle.toString());
                }
            }, 50);
        }
        
        // === ПРОВЕРКА WEBRTC ===
        function checkWebRTC() {
            if (!window.RTCPeerConnection) {
                addLog(screenLog, '❌ WebRTC не поддерживается в этом браузере! Используйте Chrome или Edge');
                return false;
            }
            addLog(screenLog, '✅ WebRTC поддерживается');
            return true;
        }
        
        // === РЕЖИМЫ ===
        screenModeBtn.onclick = async () => {
            mode = 'screen';
            screenPanel.style.display = 'block';
            controllerPanel.style.display = 'none';
            addLog(screenLog, '🖥️ Режим экрана активирован');
            
            const ip = await getLocalIP();
            localIpSpan.innerHTML = `📡 Ваш IP адрес: ${ip}<br><span style="font-size: 12px;">Для контроллера: подключитесь к той же Wi-Fi сети</span>`;
            
            checkWebRTC();
        };
        
        controllerModeBtn.onclick = () => {
            mode = 'controller';
            screenPanel.style.display = 'none';
            controllerPanel.style.display = 'block';
            addLog(controllerLog, '🎮 Режим контроллера активирован');
            startGyro();
            checkWebRTC();
        };
        
        createRoomBtn.onclick = () => {
            createOffer();
        };
        
        joinRoomBtn.onclick = () => {
            const roomCode = roomCodeInput.value.trim();
            if (!roomCode) {
                controllerStatus.innerHTML = '❌ Введите код комнаты';
                return;
            }
            
            controllerStatus.innerHTML = '⏳ Ожидание offer... Вставьте offer из буфера обмена';
            
            // Ждём вставку offer
            const pastedText = prompt('Вставьте offer данные (скопированные с экрана):');
            if (pastedText) {
                handleOffer(pastedText);
            }
        };
        
        // Альтернативный метод: создаём простой WebSocket тест
        addLog(screenLog, '=== ИНСТРУКЦИЯ ===');
        addLog(screenLog, '1. Убедитесь, что оба телефона в ОДНОЙ Wi-Fi сети');
        addLog(screenLog, '2. На телефоне-ЭКРАНЕ нажмите "СОЗДАТЬ КОМНАТУ"');
        addLog(screenLog, '3. Скопируйте offer данные и отправьте на контроллер (через мессенджер или по SMS)');
        addLog(screenLog, '4. На контроллере вставьте offer и нажмите OK');
        addLog(screenLog, '5. Контроллер сгенерирует answer — скопируйте его и отправьте обратно на экран');
        addLog(screenLog, '6. Вставьте answer в экран через консоль: receiveAnswer("...")');
        
        // Глобальная функция для приёма answer на экране
        window.receiveAnswer = (answerText) => {
            if (mode === 'screen' && window.pendingAnswerCallback) {
                window.pendingAnswerCallback(answerText);
            } else {
                addLog(screenLog, '⚠️ Нет ожидающего answer или не режим экрана');
            }
        };
        
        // Упрощённый способ: используем localStorage для обмена (работает между вкладками на одном телефоне)
        // Для двух телефонов в одной сети можно использовать BroadcastChannel
        function setupLocalStorageBridge() {
            const channel = new BroadcastChannel('saber_bridge');
            channel.onmessage = (e) => {
                if (e.data.type === 'offer' && mode === 'controller') {
                    handleOffer(e.data.data);
                } else if (e.data.type === 'answer' && mode === 'screen') {
                    if (peerConnection && window.pendingAnswer) {
                        try {
                            const answer = JSON.parse(e.data.data);
                            peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
                            addLog(screenLog, '✅ Answer получен через BroadcastChannel!');
                        } catch(err) {
                            addLog(screenLog, `❌ Ошибка: ${err.message}`);
                        }
                    }
                }
            };
            
            // Сохраняем метод для отправки
            window.broadcastOffer = (offer) => {
                channel.postMessage({ type: 'offer', data: JSON.stringify(offer) });
            };
            window.broadcastAnswer = (answer) => {
                channel.postMessage({ type: 'answer', data: JSON.stringify(answer) });
            };
        }
        
        setupLocalStorageBridge();
        addLog(screenLog, '✅ BroadcastChannel создан для обмена данными');
    </script>
</body>
</html>
