<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>REAL AR | Окна закреплены в пространстве | Жесты рук | Скелет</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
            background: #000;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Камера фон */
        #cameraVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* AR объекты - контейнер */
        .ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        /* AR окно - закреплено в пространстве */
        .ar-window {
            position: absolute;
            background: rgba(25, 30, 45, 0.92);
            backdrop-filter: blur(50px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
            transform-origin: center center;
            min-width: 280px;
            min-height: 240px;
        }

        .ar-window.active {
            border-color: #00ff88;
            box-shadow: 0 0 35px rgba(0, 255, 136, 0.5);
            transform: scale(1.02);
        }

        .window-header {
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
            cursor: move;
        }

        .window-title {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .window-controls {
            display: flex;
            gap: 14px;
        }

        .window-controls span {
            cursor: pointer;
            font-size: 16px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .window-controls span:hover {
            opacity: 1;
        }

        .close-btn { color: #ff6b6b; }
        .minimize-btn { color: #ffd93d; }

        .window-content {
            flex: 1;
            padding: 12px;
            overflow: auto;
            min-height: 180px;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
        }

        video {
            object-fit: contain;
        }

        .note-editor {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            padding: 12px;
            border-radius: 16px;
            border: 0.5px solid rgba(0, 255, 0, 0.3);
            resize: none;
            font-family: monospace;
            font-size: 12px;
        }

        /* Canvas для скелета руки */
        #handCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* UI элементы */
        .ui-bar {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .ui-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border-radius: 30px;
            padding: 8px 16px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn {
            padding: 6px 14px;
            border-radius: 30px;
            background: transparent;
            border: none;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: rgba(0, 170, 255, 0.6);
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            transition: all 0.3s;
        }

        .led.active {
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .action-buttons {
            position: fixed;
            bottom: 25px;
            left: 25px;
            display: flex;
            gap: 10px;
            z-index: 200;
            pointer-events: auto;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(40px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .action-btn:active, .fullscreen-btn:active {
            transform: scale(0.92);
        }

        .status-text {
            position: fixed;
            bottom: 100px;
            left: 25px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 24px;
            color: #0f0;
            font-size: 12px;
            z-index: 200;
            pointer-events: none;
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-size: 20px;
            text-align: center;
        }

        @media (orientation: portrait) {
            .orientation-warning {
                display: flex;
            }
        }

        /* Загрузочный экран */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a1a, #1a1a2e);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            transition: opacity 0.8s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 170, 255, 0.3);
            border-top: 3px solid #00aaff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 200px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00aaff;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Инициализация AR пространства...</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <video id="cameraVideo" autoplay playsinline muted></video>
    
    <div class="orientation-warning">
        <div>📱 Поверните телефон горизонтально</div>
        <div style="font-size: 48px; margin-top: 20px;">↻</div>
    </div>

    <div class="ar-container" id="arContainer"></div>
    <canvas id="handCanvas"></canvas>

    <div class="ui-bar">
        <div class="ui-card">
            <span>👓 REAL AR</span>
        </div>
        <div class="ui-card">
            <button class="mode-btn active" data-mode="gesture">✋ Жесты</button>
            <button class="mode-btn" data-mode="touch">👆 Тачпад</button>
        </div>
        <div class="ui-card">
            <div class="led" id="handLed"></div>
            <span id="modeText">Режим: Жесты</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" id="addBrowser">🌐</button>
        <button class="action-btn" id="addVideo">🎬</button>
        <button class="action-btn" id="addNotes">📝</button>
        <button class="action-btn" id="resetView">🔄</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⤢</button>
    <div class="status-text" id="statusText">🤚 Ожидание жеста...</div>

    <input type="file" id="videoUpload" accept="video/*" style="display: none">

    <script>
        // ==================== ПРОГРЕСС ЗАГРУЗКИ ====================
        let progress = 0;
        const progressFill = document.getElementById('progressFill');
        const loaderText = document.getElementById('loaderText');
        const texts = [
            'Запуск AR движка...',
            'Активация камеры...',
            'Калибровка гироскопа...',
            'Настройка отслеживания жестов...',
            'Закрепление окон в пространстве...',
            'Готово! Поворачивайте телефон - окна остаются на месте'
        ];
        
        const progressInterval = setInterval(() => {
            progress += 10;
            progressFill.style.width = Math.min(100, progress) + '%';
            const idx = Math.min(Math.floor(progress / 17), texts.length - 1);
            loaderText.textContent = texts[idx];
            
            if (progress >= 100) {
                clearInterval(progressInterval);
                setTimeout(() => {
                    const loader = document.getElementById('loader');
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }, 500);
            }
        }, 200);

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            windows: [],
            activeWindowId: null,
            controlMode: 'gesture',
            cursorX: window.innerWidth / 2,
            cursorY: window.innerHeight / 2,
            isPinching: false,
            // Гироскоп - для AR фиксации окон
            orientation: { alpha: 0, beta: 0, gamma: 0 },
            // Позиция камеры в пространстве
            cameraPos: { x: 0, y: 0, z: 0 },
            nextId: 1,
            // Джойстик
            gamepad: null,
            gamepadConnected: false,
            lastButtons: {}
        };

        // ==================== КАМЕРА ====================
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                const video = document.getElementById('cameraVideo');
                video.srcObject = stream;
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('statusText').innerHTML = '⚠️ Камера недоступна';
                return false;
            }
        }

        // ==================== ГИРОСКОП - АР ФИКСАЦИЯ ОКОН ====================
        function setupGyroscope() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    state.orientation = {
                        alpha: e.alpha || 0,
                        beta: e.beta || 0,
                        gamma: e.gamma || 0
                    };
                    updateAllWindowPositions();
                });
            }
        }

        // ==================== АР ОКНА (ЗАКРЕПЛЕНЫ В ПРОСТРАНСТВЕ) ====================
        function createARWindow(worldX, worldY, worldZ, title, content, width = 320, height = 280) {
            const div = document.createElement('div');
            div.className = 'ar-window';
            div.style.width = `${width}px`;
            div.style.height = `${height}px`;
            div.dataset.id = state.nextId;
            
            const contentId = `win-${Date.now()}`;
            div.innerHTML = `
                <div class="window-header">
                    <span class="window-title">${title}</span>
                    <div class="window-controls">
                        <span class="minimize-btn">−</span>
                        <span class="close-btn">✕</span>
                    </div>
                </div>
                <div class="window-content" id="${contentId}"></div>
            `;
            document.getElementById('arContainer').appendChild(div);
            
            const contentDiv = document.getElementById(contentId);
            
            if (content.type === 'browser') {
                const iframe = document.createElement('iframe');
                iframe.src = 'https://www.apple.com/visionos/';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.borderRadius = '16px';
                contentDiv.appendChild(iframe);
            } else if (content.type === 'video') {
                const video = document.createElement('video');
                if (content.file) {
                    video.src = URL.createObjectURL(content.file);
                } else {
                    video.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                }
                video.controls = true;
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.borderRadius = '16px';
                contentDiv.appendChild(video);
                video.play().catch(() => {});
            } else if (content.type === 'notes') {
                const textarea = document.createElement('textarea');
                textarea.className = 'note-editor';
                textarea.value = '✨ REAL AR ЗАМЕТКИ\n\n📌 ЭТО ОКНО ЗАКРЕПЛЕНО В ПРОСТРАНСТВЕ!\n\n• Поворачивайте телефон\n• Окно останется на месте\n• Как в настоящих AR очках\n\nЖесты:\n• Палец = курсор\n• Pinch = выбор окна';
                contentDiv.appendChild(textarea);
            }
            
            const closeBtn = div.querySelector('.close-btn');
            closeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                div.remove();
                state.windows = state.windows.filter(w => w.id !== state.nextId);
            });
            
            const minimizeBtn = div.querySelector('.minimize-btn');
            let minimized = false;
            minimizeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                minimized = !minimized;
                div.style.display = minimized ? 'none' : 'flex';
            });
            
            const windowObj = {
                id: state.nextId,
                div,
                worldX, worldY, worldZ,
                width, height,
                title
            };
            state.windows.push(windowObj);
            state.nextId++;
            
            updateWindowPosition(windowObj);
            
            div.style.opacity = '0';
            div.style.transform = 'scale(0.9)';
            setTimeout(() => {
                div.style.opacity = '1';
                div.style.transform = 'scale(1)';
            }, 50);
            
            return windowObj;
        }
        
        function updateWindowPosition(win) {
            // КЛЮЧЕВАЯ ФУНКЦИЯ AR ФИКСАЦИИ
            // Окна закреплены в мировых координатах, их экранная позиция зависит от поворота телефона
            
            const { alpha, beta, gamma } = state.orientation;
            
            // Преобразуем мировые координаты окна в экранные с учетом поворота телефона
            // Горизонтальный поворот (alpha) влияет на X
            // Вертикальный наклон (beta) влияет на Y
            
            const rotX = (alpha / 180) * Math.PI;
            const rotY = (beta / 90) * Math.PI;
            
            // Базовое смещение от центра экрана
            let screenX = window.innerWidth / 2;
            let screenY = window.innerHeight / 2;
            
            // Применяем мировые координаты окна
            screenX += win.worldX;
            screenY += win.worldY;
            
            // Применяем поворот телефона - окна остаются на месте в пространстве!
            screenX += Math.sin(rotX) * 150;
            screenY += Math.sin(rotY) * 100;
            
            // Добавляем смещение камеры от джойстика
            screenX -= state.cameraPos.x;
            screenY -= state.cameraPos.y;
            
            win.div.style.left = `${screenX}px`;
            win.div.style.top = `${screenY}px`;
        }
        
        function updateAllWindowPositions() {
            state.windows.forEach(win => updateWindowPosition(win));
            requestAnimationFrame(updateAllWindowPositions);
        }
        
        function selectWindowAtPosition(x, y) {
            for (let i = state.windows.length - 1; i >= 0; i--) {
                const win = state.windows[i];
                const rect = win.div.getBoundingClientRect();
                if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                    if (state.activeWindowId) {
                        const prev = state.windows.find(w => w.id === state.activeWindowId);
                        if (prev) prev.div.classList.remove('active');
                    }
                    state.activeWindowId = win.id;
                    win.div.classList.add('active');
                    document.getElementById('modeText').innerHTML = `✅ ${win.title}`;
                    setTimeout(() => {
                        document.getElementById('modeText').innerHTML = `Режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                    }, 1500);
                    return;
                }
            }
        }

        // ==================== ЖЕСТЫ И СКЕЛЕТ РУКИ ====================
        function setupGestures() {
            const canvas = document.getElementById('handCanvas');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            let touchActive = false;
            let touchX = window.innerWidth / 2;
            let touchY = window.innerHeight / 2;
            let lastPinchTime = 0;
            
            // Отслеживание касаний
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) {
                    touchActive = true;
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                    state.cursorX = touchX;
                    state.cursorY = touchY;
                    document.getElementById('handLed').classList.add('active');
                    document.getElementById('statusText').innerHTML = '✋ Палец отслеживается | Сведите пальцы для выбора';
                    
                    if (e.touches.length >= 2) {
                        const now = Date.now();
                        if (now - lastPinchTime > 300) {
                            lastPinchTime = now;
                            handlePinch(touchX, touchY);
                        }
                    }
                }
            });
            
            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    touchX = e.touches[0].clientX;
                    touchY = e.touches[0].clientY;
                    state.cursorX = touchX;
                    state.cursorY = touchY;
                    
                    // Двумя пальцами - перемещение камеры
                    if (e.touches.length === 2 && state.controlMode === 'gesture') {
                        const deltaX = (e.touches[0].clientX - touchX) * 0.3;
                        const deltaY = (e.touches[0].clientY - touchY) * 0.3;
                        state.cameraPos.x += deltaX;
                        state.cameraPos.y += deltaY;
                        updateAllWindowPositions();
                    }
                }
            });
            
            document.addEventListener('touchend', (e) => {
                if (e.touches.length === 0) {
                    touchActive = false;
                    document.getElementById('handLed').classList.remove('active');
                    document.getElementById('statusText').innerHTML = '🤚 Ожидание жеста...';
                }
            });
            
            document.addEventListener('mousemove', (e) => {
                if (state.controlMode === 'gesture') {
                    touchX = e.clientX;
                    touchY = e.clientY;
                    state.cursorX = touchX;
                    state.cursorY = touchY;
                    touchActive = true;
                    document.getElementById('handLed').classList.add('active');
                    document.getElementById('statusText').innerHTML = '✋ Курсор активен | Клик для выбора';
                }
            });
            
            document.addEventListener('click', (e) => {
                if (state.controlMode === 'gesture') {
                    handlePinch(e.clientX, e.clientY);
                }
            });
            
            function handlePinch(x, y) {
                if (!state.isPinching) {
                    state.isPinching = true;
                    document.getElementById('statusText').innerHTML = '🤏 PINCH! Выбор объекта';
                    selectWindowAtPosition(x, y);
                    
                    const ripple = document.createElement('div');
                    ripple.style.position = 'fixed';
                    ripple.style.left = x + 'px';
                    ripple.style.top = y + 'px';
                    ripple.style.width = '60px';
                    ripple.style.height = '60px';
                    ripple.style.borderRadius = '50%';
                    ripple.style.border = '2px solid #0f0';
                    ripple.style.transform = 'translate(-50%, -50%)';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.zIndex = '1000';
                    ripple.style.animation = 'ripple 0.3s ease-out';
                    document.body.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 300);
                    
                    setTimeout(() => {
                        state.isPinching = false;
                        document.getElementById('statusText').innerHTML = '✋ Жест завершен';
                        setTimeout(() => {
                            if (touchActive) {
                                document.getElementById('statusText').innerHTML = '✋ Палец отслеживается';
                            }
                        }, 800);
                    }, 300);
                }
            }
            
            // Отрисовка скелета руки
            function drawSkeleton() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if ((touchActive || state.controlMode === 'gesture') && state.cursorX) {
                    const x = state.cursorX;
                    const y = state.cursorY;
                    
                    ctx.save();
                    
                    // Ладонь
                    ctx.beginPath();
                    ctx.ellipse(x - 8, y + 20, 28, 38, 0, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 170, 255, 0.25)';
                    ctx.fill();
                    ctx.strokeStyle = '#00aaff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Пальцы
                    const fingers = [
                        { angle: -0.4, length: 58, offsetX: -18, offsetY: 8 },
                        { angle: -0.18, length: 68, offsetX: -10, offsetY: 4 },
                        { angle: 0, length: 65, offsetX: 0, offsetY: 0 },
                        { angle: 0.18, length: 60, offsetX: 10, offsetY: 4 },
                        { angle: 0.4, length: 52, offsetX: 18, offsetY: 8 }
                    ];
                    
                    fingers.forEach((finger, idx) => {
                        const startX = x + finger.offsetX;
                        const startY = y + 18 + finger.offsetY;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        const endX = startX + Math.sin(finger.angle) * finger.length;
                        const endY = startY - Math.cos(finger.angle) * finger.length;
                        ctx.lineTo(endX, endY);
                        ctx.strokeStyle = '#00aaff';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        
                        for (let j = 1; j <= 3; j++) {
                            const jointX = startX + Math.sin(finger.angle) * (finger.length * j / 3);
                            const jointY = startY - Math.cos(finger.angle) * (finger.length * j / 3);
                            ctx.beginPath();
                            ctx.arc(jointX, jointY, j === 3 ? 7 : 5, 0, Math.PI * 2);
                            ctx.fillStyle = j === 3 && idx === 1 ? '#ffaa44' : '#00aaff';
                            ctx.fill();
                            ctx.shadowBlur = 8;
                            ctx.shadowColor = '#00aaff';
                        }
                    });
                    
                    // Указательный палец - курсор
                    const idxStartX = x - 10;
                    const idxStartY = y + 22;
                    const idxEndX = idxStartX + Math.sin(-0.18) * 68;
                    const idxEndY = idxStartY - Math.cos(-0.18) * 68;
                    
                    ctx.beginPath();
                    ctx.arc(idxEndX, idxEndY, 18, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 136, 0.5)';
                    ctx.fill();
                    ctx.strokeStyle = '#0f0';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.arc(idxEndX, idxEndY, 9, 0, Math.PI * 2);
                    ctx.fillStyle = '#0f0';
                    ctx.fill();
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#0f0';
                    
                    ctx.restore();
                }
                
                requestAnimationFrame(drawSkeleton);
            }
            
            drawSkeleton();
        }
        
        // ==================== PS4 ДЖОЙСТИК ====================
        function setupGamepad() {
            function update() {
                const gamepads = navigator.getGamepads();
                for (let i = 0; i < gamepads.length; i++) {
                    const gp = gamepads[i];
                    if (gp && (gp.id.includes('PS4') || gp.id.includes('Wireless') || gp.id.includes('DualShock'))) {
                        if (!state.gamepadConnected) {
                            state.gamepadConnected = true;
                            document.getElementById('statusText').innerHTML = '🎮 PS4 подключен';
                        }
                        state.gamepad = gp;
                        
                        if (state.controlMode === 'touch') {
                            const leftX = gp.axes[0] || 0;
                            const leftY = gp.axes[1] || 0;
                            if (Math.abs(leftX) > 0.1 || Math.abs(leftY) > 0.1) {
                                state.cameraPos.x += leftX * 5;
                                state.cameraPos.y += leftY * 5;
                                updateAllWindowPositions();
                            }
                            
                            const rightX = gp.axes[2] || 0;
                            const rightY = gp.axes[3] || 0;
                            if (Math.abs(rightX) > 0.1 || Math.abs(rightY) > 0.1) {
                                state.cursorX += rightX * 12;
                                state.cursorY += rightY * 12;
                                state.cursorX = Math.max(0, Math.min(window.innerWidth, state.cursorX));
                                state.cursorY = Math.max(0, Math.min(window.innerHeight, state.cursorY));
                            }
                            
                            const buttons = gp.buttons;
                            if (buttons[0] && buttons[0].pressed && !state.lastButtons[0]) {
                                selectWindowAtPosition(state.cursorX, state.cursorY);
                            }
                            state.lastButtons[0] = buttons[0] && buttons[0].pressed;
                        }
                        break;
                    }
                }
                requestAnimationFrame(update);
            }
            update();
        }
        
        // ==================== UI ====================
        function setupUI() {
            document.getElementById('addBrowser').onclick = () => {
                const x = (Math.random() - 0.5) * 500;
                const y = (Math.random() - 0.5) * 400;
                createARWindow(x, y, 0, '🌐 Браузер', { type: 'browser' }, 360, 320);
            };
            
            document.getElementById('addVideo').onclick = () => {
                const input = document.getElementById('videoUpload');
                input.onchange = (e) => {
                    if (e.target.files[0]) {
                        const x = (Math.random() - 0.5) * 500;
                        const y = (Math.random() - 0.5) * 400;
                        createARWindow(x, y, 0, '🎬 Видео', { type: 'video', file: e.target.files[0] }, 340, 300);
                    } else {
                        const x = (Math.random() - 0.5) * 500;
                        const y = (Math.random() - 0.5) * 400;
                        createARWindow(x, y, 0, '🎬 Демо', { type: 'video' }, 340, 300);
                    }
                };
                input.click();
            };
            
            document.getElementById('addNotes').onclick = () => {
                const x = (Math.random() - 0.5) * 500;
                const y = (Math.random() - 0.5) * 400;
                createARWindow(x, y, 0, '📝 AR Заметки', { type: 'notes' }, 320, 280);
            };
            
            document.getElementById('resetView').onclick = () => {
                state.cameraPos = { x: 0, y: 0, z: 0 };
                updateAllWindowPositions();
                const flash = document.createElement('div');
                flash.style.position = 'fixed';
                flash.style.top = '0';
                flash.style.left = '0';
                flash.style.width = '100%';
                flash.style.height = '100%';
                flash.style.background = 'rgba(0, 170, 255, 0.3)';
                flash.style.pointerEvents = 'none';
                flash.style.zIndex = '1000';
                flash.style.animation = 'fadeOut 0.3s ease-out';
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 300);
            };
            
            const modeBtns = document.querySelectorAll('.mode-btn');
            modeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    state.controlMode = btn.dataset.mode;
                    modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('modeText').innerHTML = `Режим: ${state.controlMode === 'gesture' ? 'Жесты' : 'Тачпад'}`;
                });
            });
            
            document.getElementById('fullscreenBtn').onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    document.getElementById('fullscreenBtn').innerHTML = '✕';
                } else {
                    document.exitFullscreen();
                    document.getElementById('fullscreenBtn').innerHTML = '⤢';
                }
            };
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
                100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
            }
            @keyframes fadeOut {
                0% { opacity: 1; }
                100% { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            await setupCamera();
            setupGyroscope();
            setupGestures();
            setupGamepad();
            setupUI();
            updateAllWindowPositions();
            
            setTimeout(() => {
                createARWindow(-200, -80, 0, '🌐 Apple Vision', { type: 'browser' }, 380, 340);
                createARWindow(220, -60, 0, '🎬 4K Видео', { type: 'video' }, 360, 320);
                createARWindow(50, 180, 0, '📝 AR Заметки', { type: 'notes' }, 340, 300);
                createARWindow(-250, 150, 0, '🌐 Wikipedia', { type: 'browser' }, 360, 320);
                createARWindow(280, -150, 0, '🎬 Трейлер', { type: 'video' }, 350, 310);
                createARWindow(-80, -220, 0, '📝 Быстрые заметки', { type: 'notes' }, 320, 280);
            }, 800);
            
            function checkOrientation() {
                const warning = document.querySelector('.orientation-warning');
                if (window.innerHeight > window.innerWidth) {
                    warning.style.display = 'flex';
                } else {
                    warning.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            checkOrientation();
        }
        
        init();
    </script>
</body>
