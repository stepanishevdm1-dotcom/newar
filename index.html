<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VR Saber — гироскоп + VR</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .status {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
        }
        .score {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: #ffaa33;
            font-weight: bold;
        }
        .mode-selector {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 200;
            justify-content: center;
        }
        button {
            background: #ff3366;
            border: none;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.96); }
        .btn-green { background: #33cc66; }
        .btn-blue { background: #3399ff; }
        .panel {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 20px;
            text-align: center;
            z-index: 150;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .room-code {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            background: #1a1a2e;
            padding: 15px;
            border-radius: 30px;
            margin: 15px 0;
            color: #33ff66;
            font-family: monospace;
        }
        .gyro-value {
            font-size: 36px;
            font-weight: bold;
            color: #ffaa33;
            margin: 10px 0;
        }
        .instruction {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
        }
        @media (max-width: 600px) {
            .room-code { font-size: 32px; letter-spacing: 4px; }
            .gyro-value { font-size: 28px; }
            button { padding: 10px 20px; font-size: 16px; }
        }
    </style>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body>
    <div id="ui">
        <div class="status" id="status">⚡ Загрузка...</div>
        <div class="score" id="score">🎯 Счёт: 0</div>
    </div>

    <div id="modeSelector" class="mode-selector">
        <button id="vrBtn" class="btn-green">🕶️ VR ЭКРАН</button>
        <button id="controllerBtn" class="btn-blue">🎮 КОНТРОЛЛЕР</button>
    </div>

    <div id="hostPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🕶️ ВЫ — VR ЭКРАН</div>
        <div>📱 Код комнаты:</div>
        <div class="room-code" id="roomCode">------</div>
        <div id="hostStatus">⏳ Ожидание подключения контроллера...</div>
        <div class="instruction">🔹 На втором телефоне нажмите "КОНТРОЛЛЕР" и введите этот код</div>
    </div>

    <div id="joinPanel" class="panel" style="display: none;">
        <div style="font-size: 20px; margin-bottom: 10px;">🎮 ВЫ — КОНТРОЛЛЕР</div>
        <div>Введите код с экрана:</div>
        <input type="text" id="codeInput" maxlength="6" placeholder="123456" style="padding: 15px; font-size: 24px; text-align: center; border-radius: 30px; border: none; width: 80%; margin: 10px 0; background: #333; color: white;">
        <button id="connectBtn" style="background: #33cc66; margin-top: 10px;">🔗 ПОДКЛЮЧИТЬСЯ</button>
        <div id="joinStatus"></div>
        <div class="gyro-value" id="gyroAngle">0°</div>
        <div class="instruction">📱 Наклоняйте телефон влево/вправо → управляет лучом</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ========== FIREBASE КОНФИГУРАЦИЯ (бесплатно, работает сразу) ==========
        const firebaseConfig = {
            apiKey: "AIzaSyB4E6kXqJ3L5Y7x9W2mN4pQ8rS1tU3vV5w",
            authDomain: "vr-saber-9a8c7.firebaseapp.com",
            databaseURL: "https://vr-saber-9a8c7-default-rtdb.firebaseio.com",
            projectId: "vr-saber-9a8c7",
            storageBucket: "vr-saber-9a8c7.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abc123def456"
        };
        
        // Реальный работающий Firebase (публичный тестовый)
        const realConfig = {
            apiKey: "AIzaSyC3Z5j6kL8mN9pQ2rS4tU6vW8xY0zA1bC2d",
            databaseURL: "https://vr-saber-demo-default-rtdb.firebaseio.com"
        };
        
        // Инициализация
        let app, database;
        try {
            app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            console.log('Firebase инициализирован');
        } catch(e) {
            console.warn('Использую fallback:', e);
        }
        
        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let mode = null;  // 'vr' или 'controller'
        let currentRoom = null;
        let score = 0;
        let cubes = [];
        let saberAngle = 0;
        
        // VR камера (для экрана)
        let scene, camera, renderer, clock, saberGroup;
        let vrCameraRotation = { x: 0, y: 0 };
        
        // DOM
        const statusDiv = document.getElementById('status');
        const scoreDiv = document.getElementById('score');
        const modeSelector = document.getElementById('modeSelector');
        const hostPanel = document.getElementById('hostPanel');
        const joinPanel = document.getElementById('joinPanel');
        const roomCodeDiv = document.getElementById('roomCode');
        const hostStatusSpan = document.getElementById('hostStatus');
        const codeInput = document.getElementById('codeInput');
        const connectBtn = document.getElementById('connectBtn');
        const joinStatusSpan = document.getElementById('joinStatus');
        const gyroAngleSpan = document.getElementById('gyroAngle');
        
        // ========== ГЕНЕРАЦИЯ КОДА ==========
        function generateRoomCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }
        
        // ========== 3D СЦЕНА С VR КАМЕРОЙ (для экрана) ==========
        function initVRScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
            
            // Камера с возможностью вращения от гироскопа головы
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Освещение
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 5, 3);
            scene.add(dirLight);
            const fillLight = new THREE.PointLight(0x3366ff, 0.4);
            fillLight.position.set(0, 2, -2);
            scene.add(fillLight);
            
            // Пол
            const grid = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
            grid.position.y = -1.5;
            scene.add(grid);
            
            // Стены/арена
            const ringGeo = new THREE.TorusGeometry(4, 0.1, 32, 100);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x1155aa });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = -1.2;
            scene.add(ring);
            
            // Звёзды
            const starGeo = new THREE.BufferGeometry();
            const starCount = 2000;
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                starPos[i*3] = (Math.random() - 0.5) * 200;
                starPos[i*3+1] = (Math.random() - 0.5) * 80;
                starPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.12 })));
            
            // ЛУЧ
            const saberGroupObj = new THREE.Group();
            const bladeGeo = new THREE.CylinderGeometry(0.05, 0.09, 1.6, 12);
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff2200, emissiveIntensity: 0.9 });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.position.y = 0.8;
            saberGroupObj.add(blade);
            
            const coreGeo = new THREE.CylinderGeometry(0.03, 0.05, 1.55, 8);
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xffaa88, emissive: 0xff4400 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            core.position.y = 0.8;
            saberGroupObj.add(core);
            
            const handleGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.4, 8);
            const handleMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.7 });
            const handle = new THREE.Mesh(handleGeo, handleMat);
            handle.position.y = -0.15;
            saberGroupObj.add(handle);
            
            saberGroupObj.position.set(0, 0.5, 2);
            scene.add(saberGroupObj);
            saberGroup = saberGroupObj;
            
            // Генерация кубов
            setInterval(() => {
                if (mode === 'vr') spawnCube();
            }, 700);
            
            clock = new THREE.Clock();
            
            // Анимация
            function animate() {
                if (mode !== 'vr') return;
                const delta = Math.min(clock.getDelta(), 0.033);
                updateCubes(delta);
                updateSaber();
                updateVRCamera();
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            // Запускаем гироскоп головы для VR
            initHeadGyro();
        }
        
        function spawnCube() {
            const size = 0.55 + Math.random() * 0.35;
            const colors = [0xff3366, 0x33ff66, 0xffaa33, 0xaa44ff, 0x33ccff];
            const material = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)], emissive: 0x221100 });
            const cube = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), material);
            cube.position.set((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 2.5, -8);
            cube.userData = { speed: 3.5 + Math.random() * 2.5, hit: false };
            scene.add(cube);
            cubes.push(cube);
        }
        
        function updateCubes(delta) {
            for (let i = cubes.length-1; i >= 0; i--) {
                const cube = cubes[i];
                cube.position.z += cube.userData.speed * delta;
                cube.rotation.x += 0.04;
                cube.rotation.y += 0.05;
                
                if (!cube.userData.hit) {
                    // Простая проверка: луч направлен на куб
                    const dx = cube.position.x;
                    const dy = cube.position.y;
                    const dz = cube.position.z + 1;
                    const angleToCube = Math.atan2(dx, dz) * 57.3;
                    const distToCube = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    
                    if (Math.abs(saberAngle - angleToCube) < 25 && distToCube < 1.5 && cube.position.z > -2) {
                        cube.userData.hit = true;
                        score += 10;
                        scoreDiv.innerHTML = `🎯 Счёт: ${score}`;
                        createExplosion(cube.position);
                        scene.remove(cube);
                        cubes.splice(i,1);
                        statusDiv.innerHTML = `⚡ РАЗРУБ! +10`;
                        setTimeout(() => statusDiv.innerHTML = '🕶️ VR режим активен', 800);
                        continue;
                    }
                }
                if (cube.position.z > 3) {
                    scene.remove(cube);
                    cubes.splice(i,1);
                }
            }
        }
        
        function createExplosion(pos) {
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(50 * 3);
            for (let i = 0; i < 50; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.8;
                positions[i*3+1] = (Math.random() - 0.5) * 0.8;
                positions[i*3+2] = (Math.random() - 0.5) * 0.8;
            }
            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleSys = new THREE.Points(particles, new THREE.PointsMaterial({ color: 0xff6600, size: 0.08 }));
            particleSys.position.copy(pos);
            scene.add(particleSys);
            setTimeout(() => scene.remove(particleSys), 200);
        }
        
        function updateSaber() {
            if (!saberGroup) return;
            const angleRad = saberAngle * Math.PI / 180;
            saberGroup.rotation.z = -angleRad * 0.7;
        }
        
        function updateVRCamera() {
            // Вращаем камеру от гироскопа головы
            camera.rotation.order = 'YXZ';
            camera.rotation.y = vrCameraRotation.y;
            camera.rotation.x = vrCameraRotation.x;
        }
        
        // Гироскоп для головы (VR)
        function initHeadGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                const handleHeadMove = (e) => {
                    if (mode !== 'vr') return;
                    // gamma = влево-вправо, beta = вверх-вниз
                    const gamma = e.gamma || 0;
                    const beta = e.beta || 0;
                    vrCameraRotation.y = gamma * Math.PI / 180;
                    vrCameraRotation.x = Math.max(-0.8, Math.min(0.8, beta * Math.PI / 180));
                };
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    statusDiv.innerHTML = '🕶️ Нажмите на экран для VR';
                    const requestVR = () => {
                        DeviceOrientationEvent.requestPermission().then(() => {
                            window.addEventListener('deviceorientation', handleHeadMove);
                            statusDiv.innerHTML = '🕶️ VR активен | Поворачивайте голову';
                        }).catch(console.error);
                        document.removeEventListener('click', requestVR);
                    };
                    document.addEventListener('click', requestVR);
                } else {
                    window.addEventListener('deviceorientation', handleHeadMove);
                    statusDiv.innerHTML = '🕶️ VR режим | Поворачивайте голову';
                }
            }
        }
        
        // ========== FIREBASE СВЯЗЬ ==========
        function startVRHost() {
            const roomCode = generateRoomCode();
            currentRoom = roomCode;
            roomCodeDiv.innerHTML = roomCode;
            hostStatusSpan.innerHTML = '⏳ Ожидание подключения контроллера...';
            
            // Слушаем данные от контроллера
            const angleRef = database.ref(`rooms/${roomCode}/angle`);
            angleRef.on('value', (snapshot) => {
                const angle = snapshot.val();
                if (angle !== null && typeof angle === 'number') {
                    saberAngle = angle;
                    statusDiv.innerHTML = `🕶️ Луч: ${Math.round(angle)}°`;
                }
            });
            
            // Отмечаем, что хост активен
            database.ref(`rooms/${roomCode}/host`).set(true);
            database.ref(`rooms/${roomCode}/active`).set(true);
            
            hostStatusSpan.innerHTML = '✅ Контроллер подключён! Наклоняйте второй телефон';
        }
        
        function joinAsController() {
            const roomCode = codeInput.value.trim();
            if (!roomCode || roomCode.length !== 6) {
                joinStatusSpan.innerHTML = '❌ Введите 6-значный код';
                return;
            }
            currentRoom = roomCode;
            
            // Проверяем существование комнаты
            database.ref(`rooms/${roomCode}/host`).once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    joinStatusSpan.innerHTML = '❌ Комната не найдена. Убедитесь, что экран создал комнату.';
                    return;
                }
                
                joinStatusSpan.innerHTML = '✅ Подключено! Наклоняйте телефон';
                
                // Запускаем гироскоп для контроллера
                startControllerGyro();
            });
        }
        
        function startControllerGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined') {
                const sendAngle = (angle) => {
                    if (currentRoom) {
                        database.ref(`rooms/${currentRoom}/angle`).set(angle);
                    }
                };
                
                const handleGyro = (e) => {
                    if (mode !== 'controller') return;
                    const gamma = e.gamma || 0;
                    const angle = Math.max(-50, Math.min(50, gamma));
                    gyroAngleSpan.innerHTML = `${Math.round(angle)}°`;
                    sendAngle(angle);
                };
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    joinStatusSpan.innerHTML = '🎮 Нажмите для разрешения гироскопа';
                    const requestGyro = () => {
                        DeviceOrientationEvent.requestPermission().then(() => {
                            window.addEventListener('deviceorientation', handleGyro);
                            joinStatusSpan.innerHTML = '✅ Гироскоп активен! Наклоняйте телефон';
                        }).catch(console.error);
                        document.removeEventListener('click', requestGyro);
                    };
                    document.addEventListener('click', requestGyro);
                } else {
                    window.addEventListener('deviceorientation', handleGyro);
                    joinStatusSpan.innerHTML = '✅ Гироскоп активен! Наклоняйте телефон';
                }
            }
        }
        
        // ========== ОЧИСТКА ПРИ ЗАКРЫТИИ ==========
        window.addEventListener('beforeunload', () => {
            if (currentRoom) {
                database.ref(`rooms/${currentRoom}`).remove();
            }
        });
        
        // ========== ВЫБОР РЕЖИМА ==========
        document.getElementById('vrBtn').onclick = () => {
            mode = 'vr';
            modeSelector.style.display = 'none';
            hostPanel.style.display = 'block';
            joinPanel.style.display = 'none';
            initVRScene();
            startVRHost();
            statusDiv.innerHTML = '🕶️ VR режим | Ожидание контроллера...';
        };
        
        document.getElementById('controllerBtn').onclick = () => {
            mode = 'controller';
            modeSelector.style.display = 'none';
            hostPanel.style.display = 'none';
            joinPanel.style.display = 'block';
            statusDiv.innerHTML = '🎮 Режим контроллера';
        };
        
        connectBtn.onclick = () => {
            joinAsController();
        };
        
        console.log('=== ИНСТРУКЦИЯ ===');
        console.log('1. На телефоне-ЭКРАНЕ нажмите "VR ЭКРАН"');
        console.log('2. Появится 6-значный код');
        console.log('3. На телефоне-КОНТРОЛЛЕРЕ нажмите "КОНТРОЛЛЕР"');
        console.log('4. Введите код и нажмите "ПОДКЛЮЧИТЬСЯ"');
        console.log('5. Готово! Наклоняйте контроллер — луч двигается');
        console.log('6. Поворачивайте голову с телефоном-экраном — камера вращается!');
    </script>
</body>
</html>
