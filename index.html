<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Google App 3D</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }
  video#camera { position:absolute; width:100%; height:100%; object-fit:cover; z-index:-3; }
  #slider { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); z-index:10; width:80%; }
  iframe#googleApp { position:absolute; width:600px; height:400px; border:none; left:50%; top:50%; transform:translate(-50%,-50%); z-index:5; box-shadow:0 0 20px rgba(0,255,255,0.5); }
</style>
</head>
<body>

<video id="camera" autoplay playsinline></video>
<input type="range" id="slider" min="-5" max="5" step="0.01" value="0">
<iframe id="googleApp" src="https://www.google.com"></iframe>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script>
// ======= 1. AR фон =======
const video = document.getElementById("camera");
navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" } })
  .then(stream => video.srcObject = stream);

// ======= 2. Three.js сцена =======
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.z = 2;

const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Свет (для будущих объектов)
scene.add(new THREE.AmbientLight(0xffffff,1));

// ======= 3. Создаём “3D плоскость” для Google iframe =======
const geometry = new THREE.PlaneGeometry(1.5,1);
const material = new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
const plane = new THREE.Mesh(geometry, material);
plane.position.set(0,0,-2); // закрепляем в сцене
scene.add(plane);

const googleIframe = document.getElementById("googleApp");

// ======= 4. Ползунок движения камеры =======
const slider = document.getElementById("slider");
slider.addEventListener("input", e => {
  camera.position.z = 2 + parseFloat(e.target.value);
});

// ======= 5. Обновление позиции iframe под 3D объект =======
function updateIframePosition() {
  const vector = plane.position.clone();
  vector.project(camera);

  const x = (vector.x + 1) / 2 * window.innerWidth;
  const y = (-vector.y + 1) / 2 * window.innerHeight;

  googleIframe.style.left = x + "px";
  googleIframe.style.top = y + "px";
}

// ======= 6. Анимация =======
function animate() {
  requestAnimationFrame(animate);
  updateIframePosition();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
