<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionOS 3D WebAR V5 MAX</title>
<style>
  body { margin:0; overflow:hidden; background:black; }
  video { position:absolute; width:100%; height:100%; object-fit:cover; z-index:-2; }
  canvas { position:absolute; top:0; left:0; z-index:-1; }
  .cursor { position:absolute; width:20px; height:20px; border-radius:50%; background:cyan; pointer-events:none; z-index:10; }
</style>
</head>
<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div class="cursor" id="cursor"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ====== 1. Камера ======
const video = document.getElementById("video");
navigator.mediaDevices.getUserMedia({ video:{ facingMode:"environment" }})
  .then(s=>video.srcObject=s);

// ====== 2. Canvas / Cursor ======
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const cursor = document.getElementById("cursor");

// ====== 3. Three.js сцена ======
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Свет
const light = new THREE.AmbientLight(0xffffff,1);
scene.add(light);

// ====== 4. Окна 3D ======
function createWindow(color,text,x,y,z){
  const geometry = new THREE.BoxGeometry(1,0.6,0.05);
  const material = new THREE.MeshStandardMaterial({ color:color, transparent:true, opacity:0.25 });
  const mesh = new THREE.Mesh(geometry,material);
  mesh.position.set(x,y,z);
  scene.add(mesh);
  return mesh;
}

const window1 = createWindow(0xff5555,"App1",-1,0, -2);
const window2 = createWindow(0x5555ff,"App2",1,0, -2);

// ====== 5. MediaPipe Hands ======
const hands = new Hands({ locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({ maxNumHands:1, minDetectionConfidence:0.6, minTrackingConfidence:0.6 });

hands.onResults(results=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!results.multiHandLandmarks.length) return;
  const lm = results.multiHandLandmarks[0];

  // Курсор (кончик указательного)
  const x = lm[8].x*innerWidth;
  const y = lm[8].y*innerHeight;
  cursor.style.left = x+"px";
  cursor.style.top = y+"px";

  // Рисуем кости
  ctx.strokeStyle="lime"; ctx.lineWidth=3;
  const connections=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20]];
  connections.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo(lm[a].x*innerWidth,lm[a].y*innerHeight);
    ctx.lineTo(lm[b].x*innerWidth,lm[b].y*innerHeight);
    ctx.stroke();
  });

  // Pinch
  const dx = lm[4].x-lm[8].x;
  const dy = lm[4].y-lm[8].y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist<0.07){
    // Grab окно
    window1.position.x = (lm[8].x-0.5)*5;
    window1.position.y = -(lm[8].y-0.5)*5;
    window2.position.x = (lm[12].x-0.5)*5;
    window2.position.y = -(lm[12].y-0.5)*5;
  }
});

// ====== 6. Камера MediaPipe ======
const cam = new Camera(video,{ onFrame: async ()=>await hands.send({image:video}), width:640, height:480 });
cam.start();

// ====== 7. Псевдо AR закрепление (гироскоп) ======
window.addEventListener("deviceorientation", e=>{
  const x = e.gamma||0;
  const y = e.beta||0;
  window1.rotation.y = x/50; window1.rotation.x = y/50;
  window2.rotation.y = -x/50; window2.rotation.x = -y/50;
});

// ====== 8. Анимация Three.js ======
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
